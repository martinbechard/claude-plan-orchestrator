    description: >
      Implement P1, P2, P3, FR1, FR2, FR3, FR4 per D1, D2, D3, D4, D5
      from work item: tmp/plans/.claimed/85-completions-upsert-by-slug.md
      Design: docs/plans/2026-03-31-85-completions-upsert-by-slug-design.md
      Requirements: docs/plans/2026-03-31-85-completions-upsert-by-slug-requirements.md

      All changes in langgraph_pipeline/web/proxy.py and
      langgraph_pipeline/web/completion_grouping.py:

      D1: Add _ALTER_ADD_COMPLETIONS_ATTEMPTS_HISTORY_SQL constant. Execute
      in _init_db with try/except OperationalError, following the existing
      ALTER TABLE migration pattern.

      D2: Add _migrate_completion_duplicates(self, conn) method called from
      _init_db after D1 and before D3. For each slug with COUNT(*) > 1:
      fetch all rows ordered by finished_at ASC, compute cost_usd = SUM,
      duration_s = SUM, build attempts_history JSON array from all rows
      (each entry: outcome, cost_usd, duration_s, finished_at, run_id,
      tokens_per_minute), update the row with latest finished_at (MAX(id)
      tiebreaker) with accumulated values and history, delete other rows.
      For non-duplicate rows with NULL attempts_history, set it to a
      single-entry JSON array. Must be idempotent.

      D3: Add _CREATE_UNIQUE_INDEX_SLUG_SQL constant with CREATE UNIQUE INDEX
      IF NOT EXISTS idx_completions_slug_unique ON completions (slug). Execute
      in _init_db after D2 migration.

      D4: Replace the plain INSERT in record_completion with INSERT INTO
      completions (..., attempts_history) VALUES (..., ?) ON CONFLICT(slug)
      DO UPDATE SET item_type=excluded.item_type, outcome=excluded.outcome,
      cost_usd=completions.cost_usd + excluded.cost_usd,
      duration_s=completions.duration_s + excluded.duration_s,
      finished_at=excluded.finished_at, run_id=excluded.run_id,
      tokens_per_minute=excluded.tokens_per_minute,
      verification_notes=excluded.verification_notes,
      attempts_history=json_insert(completions.attempts_history, '$[#]', json(?)).
      On first insert, initialize attempts_history to a single-entry JSON array.

      D5: Update SELECT queries in list_completions, list_completions_grouped,
      and list_completions_by_slug to include attempts_history. Update
      completion_grouping.py to parse attempts_history JSON from each row
      and derive attempt_count (len) and retries (all but last entry) from it,
      instead of building retries from multiple database rows.

      Write tests in tests/langgraph/web/test_proxy.py covering:
      - Upsert accumulates cost/duration on same slug (AC9, AC10)
      - Upsert replaces outcome/finished_at/run_id/tpm/notes (AC11-AC15)
      - First insert creates row with single-entry attempts_history (AC7, AC18)
      - Retry appends to attempts_history (AC19, AC20)
      - Only one row exists after upsert (AC1, AC8)
      - Migration merges duplicates with correct accumulation (AC21-AC28)
      - Migration builds attempts_history from all rows (AC27)
      - Migration is idempotent (AC30)
      - UNIQUE constraint raises IntegrityError on raw duplicate INSERT (AC4, AC32)
      - Grouped query returns attempts_history (AC33-AC35)

