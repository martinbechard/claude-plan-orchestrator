        description: "Implement UC1 per D5 from work item: tmp/plans/.claimed/85-completions-upsert-by-slug.md Design: docs/plans/2026-04-02-85-completions-upsert-by-slug-design.md Requirements: docs/plans/2026-04-02-85-completions-upsert-by-slug-requirements.md

          Update SELECT queries in list_completions, list_completions_grouped, and list_completions_by_slug in proxy.py to include the attempts_history column.

          Update completion_grouping.py to parse attempts_history JSON from each row and derive attempt_count (len of array) and retries (all but last entry) from it, instead of building retries from multiple database rows. The dashboard already has retry drill-down UI (toggleRetryRows, tpl-retry-row template) that renders per-attempt details -- no template changes needed.

          Since the DB now has one row per slug, list_completions_grouped no longer needs to over-fetch by GROUPED_QUERY_MULTIPLIER. Simplify the query to use limit directly.

          Update tests in tests/langgraph/web/test_completion_grouping.py for the new single-row-with-history data format. Verify that attempt_count and retries are correctly derived from attempts_history (AC18, AC19, AC20)."
