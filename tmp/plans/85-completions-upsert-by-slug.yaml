sections:
- id: '0'
  name: 'Phase 0: Attempt History Drill-Down UI Design'
  status: pending
  tasks:
  - id: '0.1'
    name: Systems design for attempt history drill-down
    agent: systems-designer
    parallel_group: design-phase0
    status: pending
    target_acs:
    - AC36
    description: >
      Produce a systems/architecture design for the attempt history drill-down
      in the dashboard completions display. Covers UC1 per D6 from work item:
      tmp/plans/.claimed/85-completions-upsert-by-slug.md
      Design: docs/plans/2026-03-31-85-completions-upsert-by-slug-design.md
      Requirements: docs/plans/2026-03-31-85-completions-upsert-by-slug-requirements.md

      Focus on: data flow from attempts_history JSON column through the
      list_completions_grouped response to the dashboard template, SSE event
      payload shape, and how the drill-down data integrates with the existing
      completion row rendering. The backend changes (D1-D5) provide a single
      row per slug with an attempts_history JSON array; this design determines
      how the frontend consumes and displays that data.

  - id: '0.2'
    name: UX design for attempt history drill-down
    agent: ux-designer
    parallel_group: design-phase0
    status: pending
    target_acs:
    - AC36
    description: >
      Produce a UX design for the attempt history drill-down on completion
      rows in the dashboard. Covers UC1 per D6 from work item:
      tmp/plans/.claimed/85-completions-upsert-by-slug.md
      Design: docs/plans/2026-03-31-85-completions-upsert-by-slug-design.md
      Requirements: docs/plans/2026-03-31-85-completions-upsert-by-slug-requirements.md

      Focus on: interaction pattern for expanding/collapsing attempt history
      on a completion row, visual hierarchy between the summary row and
      per-attempt details, information density (showing outcome, cost, duration,
      timestamp, run_id, tokens_per_minute per attempt), accessibility
      (keyboard navigation, ARIA attributes), and how to indicate that
      history is available (attempt count badge, expand icon).

  - id: '0.3'
    name: Frontend implementation design for attempt history drill-down
    agent: frontend-coder
    parallel_group: design-phase0
    status: pending
    target_acs:
    - AC36
    description: >
      Produce a concrete frontend implementation design for the attempt
      history drill-down. Covers UC1 per D6 from work item:
      tmp/plans/.claimed/85-completions-upsert-by-slug.md
      Design: docs/plans/2026-03-31-85-completions-upsert-by-slug-design.md
      Requirements: docs/plans/2026-03-31-85-completions-upsert-by-slug-requirements.md

      Focus on: HTML structure for expandable attempt rows using vanilla JS,
      CSS classes for expand/collapse transitions, how to render the
      attempts_history array from the SSE payload, integration with the
      existing dashboard completion table markup, and the existing
      vanilla JS + Jinja2 stack conventions used in this project.

  - id: '0.4'
    name: Judge attempt history drill-down design competition
    agent: design-judge
    dependencies:
    - '0.1'
    - '0.2'
    - '0.3'
    status: pending
    target_acs:
    - AC36
    description: >
      Evaluate the three competing designs for the attempt history drill-down.
      Score each against AC36 from work item:
      tmp/plans/.claimed/85-completions-upsert-by-slug.md
      Requirements: docs/plans/2026-03-31-85-completions-upsert-by-slug-requirements.md
      Design: docs/plans/2026-03-31-85-completions-upsert-by-slug-design.md

      Key criteria: ability to view per-attempt history with all six fields
      (outcome, cost_usd, duration_s, finished_at, run_id, tokens_per_minute),
      usability of the drill-down interaction, accessibility, visual clarity,
      and implementation feasibility with the existing vanilla JS + Jinja2 stack.
      Select the winner with written rationale.

  - id: '0.5'
    name: Bridge winning design to implementation tasks
    agent: planner
    dependencies:
    - '0.4'
    status: pending
    description: >
      Read the winning UI design from the design competition (task 0.4)
      and extend this YAML plan with concrete implementation details for
      the frontend task in section 2. Work item:
      tmp/plans/.claimed/85-completions-upsert-by-slug.md
      Requirements: docs/plans/2026-03-31-85-completions-upsert-by-slug-requirements.md
      Design: docs/plans/2026-03-31-85-completions-upsert-by-slug-design.md

      The frontend task 2.1 should be refined with specifics from the
      winning design. Backend tasks in section 1 are already specified.

