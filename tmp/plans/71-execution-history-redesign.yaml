  # ── Section 1: Backend — Recursive Tree Infrastructure ──────────────────
  # P1, FR1: Full recursive tree fetch with no depth limit.

  - id: '1'
    name: "Recursive tree infrastructure"
    status: pending
    tasks:
      - id: '1.1'
        name: "Implement recursive full-subtree fetch and tree model"
        agent: coder
        description: >
          Implement D1 for requirements P1, FR1 from work item:
          tmp/plans/.claimed/71-execution-history-redesign.md
          Design: docs/plans/2026-03-28-71-execution-history-redesign-design.md

          Add get_full_subtree(run_id) to TracingProxy in proxy.py using a
          WITH RECURSIVE CTE to fetch all descendants in one query. Return flat
          rows with parent_run_id linkage. Add a Python helper to assemble
          flat rows into a nested tree dict structure (TreeNode with children).

          Rework trace_narrative.py to accept the full recursive tree instead
          of the current 2-level (children + grandchildren) model. The new
          build_execution_tree() replaces build_execution_view(). Include unit
          tests for the recursive fetch and tree assembly.
        status: pending
        target_acs:
          - AC1
          - AC2
          - AC18
          - AC19
          - AC20
          - AC21
          - AC22
          - AC23
          - AC24
          - AC25

  # ── Section 2: Backend — Real Cost & Duration ───────────────────────────
  # P2, P3, FR2, FR3: Eliminate placeholder costs, fix wall-clock duration.

  - id: '2'
    name: "Real cost aggregation and wall-clock duration"
    status: pending
    tasks:
      - id: '2.1'
        name: "Implement real cost aggregation and recursive wall-clock duration"
        agent: coder
        description: >
          Implement D2, D3 for requirements P2, P3, FR2, FR3 from work item:
          tmp/plans/.claimed/71-execution-history-redesign.md
          Design: docs/plans/2026-03-28-71-execution-history-redesign-design.md

          (1) Cost: Ensure the tree model uses get_child_costs_batch() recursive
          CTE to compute aggregated cost at every node. Filter zero-cost
          placeholders (0.0 or absent total_cost_usd) from aggregation so 0.01
          placeholders never appear.

          (2) Duration: Upgrade _CHILD_TIME_SPANS_BATCH_SQL_TEMPLATE to use a
          WITH RECURSIVE CTE (like _CHILD_COSTS_BATCH_SQL_TEMPLATE) so it
          computes MIN(start_time)/MAX(end_time) across the full descendant
          subtree, not just direct children. Replace near-zero root timestamps
          with the computed wall-clock durations using _NEAR_ZERO_DURATION_S.

          Include unit tests for both the upgraded SQL and the view model cost/
          duration computation.
        status: pending
        target_acs:
          - AC3
          - AC4
          - AC5
          - AC26
          - AC27
          - AC28
          - AC29
          - AC30
          - AC31

  # ── Section 3: Backend — Data Quality ───────────────────────────────────
  # FR4, FR5: Slug resolution, deduplication.

  - id: '3'
    name: "Slug resolution and deduplication"
    status: pending
    tasks:
      - id: '3.1'
        name: "Implement slug resolution and UI-layer deduplication"
        agent: coder
        description: >
          Implement D4, D5 for requirements FR4, FR5 from work item:
          tmp/plans/.claimed/71-execution-history-redesign.md
          Design: docs/plans/2026-03-28-71-execution-history-redesign-design.md

          (1) Slug resolution (D4): In the tree model layer, apply multi-tier
          resolution: metadata item_slug -> child span metadata lookup via
          existing resolve_child_slugs_batch() -> run_id prefix fallback.
          Ensure "LangGraph" is never displayed as an item name.

          (2) Deduplication (D5): When assembling the tree from flat rows,
          group by run_id and keep only the most complete row (prefer the one
          with end_time). This is a UI-layer safety net atop the existing DB
          INSERT OR REPLACE.

          Include unit tests for slug resolution tiers and dedup logic.
        status: pending
        target_acs:
          - AC32
          - AC33
          - AC34
          - AC35
          - AC36
          - AC37
