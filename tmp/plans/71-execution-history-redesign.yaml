- id: '1'
  name: Backend - Recursive Tree and Data Quality
  status: pending
  tasks:
  - id: '1.1'
    name: Implement recursive tree fetch and tree model
    agent: coder
    description: 'Implement D1 (recursive tree fetch) for requirements P1, UC2 from
      work item: tmp/plans/.claimed/71-execution-history-redesign.md Design: docs/plans/2026-03-28-71-execution-history-redesign-design.md

      (1) Add get_full_tree(run_id) to TracingProxy in proxy.py using iterative breadth-first
      traversal with get_children_batch(). Return nested tree structure with no depth
      limit.

      (2) Create langgraph_pipeline/web/helpers/execution_tree.py with TreeNode dataclass
      and build_tree() function that assembles flat DB rows into nested tree. Include
      node_type classification (graph_node, subgraph, agent, tool_call).

      (3) Integrate D2 (three-tier name resolution): resolve_display_name() with fallback
      chain: metadata slug -> child span scan -> run_id prefix. Ensure "LangGraph"
      never appears as item name (FR3).

      (4) Integrate D3 (UI-level deduplication): deduplicate by run_id during tree
      construction, keeping most complete row (FR4).

      Include unit tests for recursive fetch, tree assembly, name resolution tiers,
      and dedup logic.

      '
    status: in_progress
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC11
    - AC12
    - AC13
    - AC14
    - AC15
    - AC16
    - AC37
    - AC38
    - AC39
    - AC40
    - AC41
    - AC42
    last_attempt: '2026-03-28T18:43:38.083285'
    attempts: 1
    model_used: opus
  - id: '1.2'
    name: Implement real cost aggregation and wall-clock duration
    agent: coder
    dependencies:
    - '1.1'
    description: 'Implement D4 (real cost aggregation) and D5 (wall-clock duration)
      for requirements P2, P3, FR5, FR6 from work item: tmp/plans/.claimed/71-execution-history-redesign.md
      Design: docs/plans/2026-03-28-71-execution-history-redesign-design.md

      (1) Cost (D4): Integrate get_child_costs_batch() recursive CTE into tree construction.
      Attach aggregated cost to each intermediate node. Leaf nodes display own cost
      from metadata_json. Nodes without cost show zero or "---", never placeholder
      0.01.

      (2) Duration (D5): Use get_child_time_spans_batch() to compute real wall-clock
      duration for phase-level nodes. Replace near-zero durations (< 1.0s) with earliest-descendant-start
      to latest-descendant-end span. Ensure phases that took minutes display real
      minutes.

      Include unit tests for cost aggregation (no placeholders) and duration computation
      (near-zero replacement).

      '
    status: pending
    target_acs:
    - AC4
    - AC5
    - AC6
    - AC7
    - AC43
    - AC44
    - AC45
    - AC46
    - AC47
    - AC48
    - AC49
  - id: '1.3'
    name: Create execution history API endpoint
    agent: coder
    dependencies:
    - '1.2'
    description: 'Implement D6 (execution history API) for requirements UC2, UC3,
      UC5, UC6 from work item: tmp/plans/.claimed/71-execution-history-redesign.md
      Design: docs/plans/2026-03-28-71-execution-history-redesign-design.md

      (1) Create langgraph_pipeline/web/routes/execution_history.py with: - GET /execution-history/{run_id}
      (HTML page shell) - GET /api/execution-tree/{run_id} (JSON API returning full
      recursive tree)

      (2) JSON response includes per-node: run_id, name, display_name, node_type,
      status, duration, cost, model, token_count, inputs_json, outputs_json, metadata_json,
      children[].

      (3) Mount the new router in server.py.

      Include unit tests for the JSON API endpoint.

      '
