    description: >
      Implement requirements P1, UC1 (D1, D2, D3) from work item:
      tmp/plans/.claimed/01-during-the-execution-of-a-work-item-there-is-a-view-trace-link-in-the-workitem.md
      Design: docs/plans/2026-04-02-01-during-the-execution-of-a-work-item-there-is-a-view-trace-link-in-the-workitem-design.md

      In server.py create_app(), add a GET /proxy endpoint that reads the trace_id
      query parameter, validates the trace exists via proxy.get_run(trace_id), and
      returns a RedirectResponse(302) to /execution-history/{trace_id}. Return 400
      if trace_id is missing, 404 with a user-friendly message if the trace is not
      found. Add unit tests in tests/langgraph/web/test_proxy_redirect.py covering
      valid redirect, missing param, and unknown trace scenarios.
