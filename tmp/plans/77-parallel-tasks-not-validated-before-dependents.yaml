      -> NODE_VALIDATE_TASK in _route_after_find_next_task and add_conditional_edges
      (graph.py). Added 20 new tests across test_task_selector.py (TestFindValidationPendingTask,
      TestFindNextTaskValidationPriority) and test_edges.py (TestParallelCheck new
      cases, TestRouteAfterFindNextTaskNeedsValidation, ROUTE_NEEDS_VALIDATION constant
      test). Fixed existing test_completed_blocks_dependent_when_validation_enabled
      to reflect correct new behavior. All 1670 tests pass.
    validation_attempts: 1
    validation_findings: All 10 acceptance criteria (AC1-AC10) for D1 and D2 are satisfied.
      Validation-pending scan in find_next_task correctly prioritizes unvalidated
      completed tasks over new work. ROUTE_NEEDS_VALIDATION routing in parallel_check
      and _route_after_find_next_task correctly directs to existing validate_task
      node. 1696 tests pass, no regressions, no placeholders.
  - id: '1.2'
    name: Verify FR2 status contract with targeted tests
    agent: coder
    status: completed
    target_acs:
    - AC11
    - AC12
    - AC13
    description: 'Verify D3 for requirement FR2 from work item: tmp/plans/.claimed/77-parallel-tasks-not-validated-before-dependents.md
      Design: docs/plans/2026-03-30-77-parallel-tasks-not-validated-before-dependents-design.md
      Requirements: docs/plans/2026-03-30-77-parallel-tasks-not-validated-before-dependents-requirements.md

      Add targeted tests to tests/langgraph/executor/test_edges.py or tests/langgraph/executor/nodes/test_task_selector.py
      confirming:

      (a) AC11: For a task with status="completed", agent in run_after, validation_attempts=0
      -- effective_status returns "completed" (non-terminal) and _completed_task_ids
      excludes it, so dependents remain blocked.

      (b) AC12: For a task with status="completed", agent NOT in run_after -- effective_status
      returns "verified" (terminal) and _completed_task_ids includes it, so dependents
      can proceed.

      (c) AC13: A dependent task with a prerequisite in "completed" (needing validation)
      is not selected by _find_eligible_task until the prerequisite reaches "verified"
      status.

      These tests document the existing behavior as a regression safety net.

      '
    last_attempt: '2026-03-30T13:02:25.975789'
    attempts: 1
