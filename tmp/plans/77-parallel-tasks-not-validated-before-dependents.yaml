    description: 'Implement D1 and D2 for requirements P1, P2, FR1 from work item:
      tmp/plans/.claimed/77-parallel-tasks-not-validated-before-dependents.md Design:
      docs/plans/2026-03-30-77-parallel-tasks-not-validated-before-dependents-design.md
      Requirements: docs/plans/2026-03-30-77-parallel-tasks-not-validated-before-dependents-requirements.md

      Three files to modify:

      (1) langgraph_pipeline/executor/nodes/task_selector.py -- In find_next_task,
      before the pending_tasks scan, add a scan for tasks with status="completed",
      agent in validation run_after list, and validation_attempts==0. If found, return
      the first as current_task_id (with appropriate trace metadata and logging).

      (2) langgraph_pipeline/executor/edges.py -- Add ROUTE_NEEDS_VALIDATION constant.
      Modify parallel_check() to return ROUTE_NEEDS_VALIDATION when the current task
      has status="completed" (selected for validation, not execution).

      (3) langgraph_pipeline/executor/graph.py -- In _route_after_find_next_task(),
      add handling for ROUTE_NEEDS_VALIDATION to route to NODE_VALIDATE_TASK. Import
      the new constant. Update the docstring topology diagram.

      Include unit tests in tests/langgraph/executor/nodes/test_task_selector.py and
      tests/langgraph/executor/test_edges.py covering: (a) find_next_task selects
      unvalidated completed task over pending tasks, (b) parallel_check returns ROUTE_NEEDS_VALIDATION
      for completed tasks, (c) the full routing path from find_next_task through validate_task
      works for the reproduction scenario.

      '
    last_attempt: '2026-03-30T12:46:34.052902'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-30T12:59:29.111574'
    result_message: Implemented D1 and D2 from design doc. Added _find_validation_pending_task
      helper and validation-pending scan in find_next_task (task_selector.py already
      had this from plan-80 overlap — verified clean). Added ROUTE_NEEDS_VALIDATION
