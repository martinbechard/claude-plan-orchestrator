- id: '1'
  name: Backend - Dynamic JSON Endpoint
  status: pending
  tasks:
  - id: '1.1'
    name: Add GET /item/{slug}/dynamic JSON endpoint
    agent: coder
    dependencies:
    - '0.5'
    description: 'Implement D2 for requirements FR1, FR2 from work item: tmp/plans/.claimed/72-item-page-auto-refresh-collapses-sections.md
      Design: docs/plans/2026-03-28-72-item-page-auto-refresh-collapses-sections-design.md

      Add a new GET /item/{slug}/dynamic endpoint to item.py that returns JSON with:
      pipeline_stage, active_worker (dict or null), total_cost_usd, total_duration_s,
      total_tokens, avg_velocity, plan_tasks (list of {id, name, status, agent}),
      and validation_results. Reuse existing helper functions (_derive_pipeline_stage,
      _get_active_worker, _load_plan_tasks, _load_completions, _compute_total_tokens,
      _compute_avg_velocity, _load_validation_results). Include unit tests for the
      new endpoint.

      '
    status: pending
    target_acs:
    - AC6
    - AC10
- id: '2'
  name: Frontend - Selective Refresh Mechanism
  status: pending
  tasks:
  - id: '2.1'
    name: Replace meta refresh with JS selective DOM updates
    agent: coder
    dependencies:
    - '1.1'
    description: 'Implement D1, D3, D4, D5, D6 for requirements P1, P2, UC1, FR1,
      FR2, FR3 from work item: tmp/plans/.claimed/72-item-page-auto-refresh-collapses-sections.md
      Design: docs/plans/2026-03-28-72-item-page-auto-refresh-collapses-sections-design.md

      (1) Remove the meta http-equiv refresh tag from the extra_head block (D1).

      (2) Add data-dynamic attributes to dynamic elements: cost, tokens, duration,
      velocity, stage badge, velocity badge, worker banner, plan tasks list, plan
      task count, validation results (D3).

      (3) Add a JS script that uses setInterval at 10-second intervals to fetch /item/{slug}/dynamic
      and update only data-dynamic elements. Use textContent for simple values and
      innerHTML for complex sections like badges, worker banner, plan tasks, and validation
      results (D4).

      (4) Never touch static content sections (raw input, clause register, 5 whys,
      structured requirements, design, validation reports), preserving all details/summary
      open/closed state (D5).

      (5) Stop the interval when pipeline_stage is "completed" or "unknown". Only
      start the timer when the initial stage indicates the item is active (D6).

      '
    status: pending
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC4
    - AC5
    - AC7
    - AC8
    - AC9
    - AC11
    - AC12
    - AC13
    - AC14
    - AC15
