    description: 'Implement P1, UC1, FR1 per D1, D2, D3, D4, D5 from work item: tmp/plans/.claimed/84-item-page-missing-outcome-badge.md
      Design: docs/plans/2026-03-31-84-item-page-missing-outcome-badge-design.md Requirements:
      docs/plans/2026-03-31-84-item-page-missing-outcome-badge-requirements.md

      In langgraph_pipeline/web/routes/item.py: D1: Add _derive_outcome(completions:
      list[dict]) -> Optional[str] that returns the outcome from the most recent completion
      record (highest finished_at), or None if completions is empty. D2: In item_detail(),
      call _derive_outcome(completions) and add "outcome" to the template context.
      In item_dynamic(), call _derive_outcome(completions) and add "outcome" to the
      JSON response.

      In langgraph_pipeline/web/templates/item.html: D3: Inside the item-badges div,
      insert a new outcome badge BEFORE the item_type badge. Use data-dynamic="outcome-badge"
      wrapper. Render only when outcome is not None. Badge text is the outcome value.
      Add CSS class outcome-{{ outcome }}. D4: Add CSS classes: outcome-success (green),
      outcome-warn (amber), outcome-fail (red). Use font-weight 700 for prominence.
      Follow the winning design from Phase 0 for exact color values. D5: In the selective-refresh
      JS, add a handler for data.outcome that updates the outcome-badge element.

      Write tests in tests/langgraph/web/test_item_outcome_badge.py covering: _derive_outcome
      returns latest completion outcome, returns None for empty list, and handles
      multiple completions correctly.

      '
