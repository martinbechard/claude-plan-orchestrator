    description: 'Produce a UX design for the outcome badge on the work item detail
      page. Covers UC1, FR1 per D3, D4 from work item: tmp/plans/.claimed/84-item-page-missing-outcome-badge.md
      Design: docs/plans/2026-03-31-84-item-page-missing-outcome-badge-design.md Requirements:
      docs/plans/2026-03-31-84-item-page-missing-outcome-badge-requirements.md

      Context: The item detail page shows badges for item type, pipeline stage, and
      velocity in an item-badges div. The outcome badge must be the first badge (most
      prominent) and represent three states: success, warn, fail.

      Focus on: visual hierarchy and placement as first badge, color coding for the
      three outcome values (success=green, warn=amber, fail=red), font weight and
      sizing to make outcome the primary visual indicator, graceful absence when no
      completion exists (in-progress items), accessibility (color contrast ratios,
      screen reader text), and consistency with the existing badge styling conventions
      in the project.

      '
