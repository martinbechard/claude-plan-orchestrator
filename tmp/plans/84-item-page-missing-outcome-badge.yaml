      Context: The work item detail page (item.py route + item.html template) already
      fetches completion records via proxy.list_completions_by_slug(). The completions
      contain an outcome field (success/warn/fail). The page renders status badges
      in an item-badges div but does not display the outcome.

      Focus on: data flow from completions list through a derivation helper to the
      template context and dynamic JSON response, how the outcome integrates with
      the existing badge rendering pipeline, the contract between item_detail()/item_dynamic()
      and the template, and the edge case when no completion record exists.

      '
