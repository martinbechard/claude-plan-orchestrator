      work item detail page. Covers P1, UC1, FR1 per D1, D2, D3 from work item: tmp/plans/.claimed/84-item-page-missing-outcome-badge.md
      Design: docs/plans/2026-03-31-84-item-page-missing-outcome-badge-design.md Requirements:
