      Context: The page uses Jinja2 templates with vanilla CSS and JS. The item_detail()
      route passes template context, and item_dynamic() returns JSON for auto-refresh.
      Existing badges use span elements with CSS classes inside a div.item-badges.

      Focus on: the _derive_outcome() helper function signature and logic in item.py,
      Jinja2 template markup for the badge with data-dynamic="outcome-badge" wrapper,
      CSS class definitions for outcome-success/outcome-warn/outcome-fail, the JS
      handler in the selective-refresh block to update the badge on dynamic refresh,
      and the empty/null handling for in-progress items without completions.

