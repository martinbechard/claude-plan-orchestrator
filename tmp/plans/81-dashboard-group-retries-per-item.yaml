- id: '1'
  name: Backend - Grouped Completions Query
  status: pending
  tasks:
  - id: '1.1'
    name: Add list_completions_grouped to proxy and grouping utility
    agent: coder
    dependencies:
    - '0.5'
    status: pending
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC4
    description: 'Implement D1, D2 for requirements P1, FR1, FR2 from work item: tmp/plans/.claimed/81-dashboard-group-retries-per-item.md
      Design: docs/plans/2026-03-30-81-dashboard-group-retries-per-item-design.md

      Add list_completions_grouped() method to TracingProxy that queries completions
      ordered by finished_at DESC and groups by slug. The most recent row per slug
      becomes the primary record; older rows become the retries list. Also add a shared
      grouping utility function and update dashboard_state.py snapshot() to use it
      for the in-memory fallback path. Include unit tests for both the proxy method
      and the grouping utility.

      '
