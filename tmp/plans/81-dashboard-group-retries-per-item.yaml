- id: '1'
  name: Backend completion grouping layer
  status: pending
  tasks:
  - id: '1.1'
    name: Create shared grouping utility and integrate into proxy and dashboard_state
    agent: coder
    status: verified
    target_acs:
    - AC1
    - AC2
    - AC5
    - AC6
    - AC7
    - AC8
    description: 'Implement requirements P1, P3, FR1 and design decisions D1, D2 from
      work item: tmp/plans/.claimed/81-dashboard-group-retries-per-item.md Design:
      docs/plans/2026-03-30-81-dashboard-group-retries-per-item-design.md Systems
      design: docs/plans/2026-03-30-81-dashboard-group-retries-per-item-design-1-systems.md
      Requirements: docs/plans/2026-03-30-81-dashboard-group-retries-per-item-requirements.md

      D1: Create langgraph_pipeline/web/completion_grouping.py with group_completions_by_slug()
      pure function. Takes flat list of completion dicts sorted by finished_at DESC,
      groups by slug. Primary entry is the most recent per slug; retries list contains
      prior attempts (oldest-first) with fields: outcome, cost_usd, duration_s, finished_at,
      run_id. Each entry gets attempt_count (int, 1 for no retries) and retries (list,
      empty for no retries). Limit is applied to grouped entries, not raw rows. Create
      tests/langgraph/web/test_completion_grouping.py with tests: empty list, single
      item, two rows same slug, three rows same slug, mixed slugs, limit applied,
      retry dict field filtering.

      D2: Add list_completions_grouped() to TracingProxy in langgraph_pipeline/web/proxy.py
      that over-fetches (limit * 3) and passes through the grouping function. In langgraph_pipeline/web/dashboard_state.py
      snapshot(), switch proxy path to proxy.list_completions_grouped() and apply
      grouping to the in-memory fallback path. Update tests/langgraph/web/test_dashboard_state.py
      to verify snapshot() returns grouped entries with attempt_count and retries
      fields.'
    last_attempt: '2026-03-30T13:07:10.133335'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-30T13:10:29.924219'
    result_message: Created completion_grouping.py with group_completions_by_slug()
      pure function. Added list_completions_grouped() to TracingProxy (over-fetches
      limit*3, groups via utility). Updated DashboardState.snapshot() to use grouped
      proxy path and apply grouping to in-memory fallback. Added 7 unit tests for
      grouping utility and 2 snapshot integration tests. 1714 tests passing.
    validation_attempts: 1
    validation_findings: All 6 target ACs verified. D1 (completion_grouping.py) and
      D2 (proxy + dashboard_state integration) fully implemented per systems design.
      1714 tests passing, 0 regressions. 7 grouping unit tests + 2 snapshot integration
      tests cover all specified cases.
