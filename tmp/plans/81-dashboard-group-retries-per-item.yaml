      D3: In dashboard.html tpl-completion-row template, add a retry-toggle button
      (hidden by default, disclosure triangle char) before the slug link, and a retry-count-badge
      span (hidden by default) after the outcome badge. In dashboard.js renderCompletions(),
      show the toggle and badge when attempt_count > 1. Badge text is "x" + attempt_count.
      In style.css, add CSS for .retry-count-badge (neutral gray pill, 10px font)
      and .retry-toggle (borderless button, 9px triangle, rotates 90deg when aria-expanded=true).
      Items with attempt_count=1 must render identically to before (no badge, no toggle,
      no visual noise).

      D4: Add tpl-retry-row template in dashboard.html for sub-rows showing attempt
      label, outcome badge, cost, duration, finished, trace link. Add toggleRetryRows()
      function in dashboard.js that inserts/removes sub-rows after the primary row.
      Add expandedRetrySlugs Set to preserve expanded state across SSE re-renders.
      Wire toggle click handlers in renderCompletions(). Add CSS for .retry-sub-row
      (indented, muted bg, smaller font), .retry-sub-slug, .retry-attempt-label. Ensure
      keyboard accessibility (button element, aria-expanded, aria-label).'
    last_attempt: '2026-03-30T13:14:01.865507'
    attempts: 1
