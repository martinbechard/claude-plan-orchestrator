  - id: '2'
    name: "Data Layer: Backfill and Status Resolution"
    status: pending
    tasks:
      - id: '2.1'
        name: "Backfill run names and fix stale RUNNING status"
        agent: coder
        description: "Implement D2 and D3 for requirements P1, P6 from work item: tmp/plans/.claimed/70-traces-page-usability-overhaul.md — Add backfill_root_run_slugs() to TracingProxy in proxy.py that queries root runs where name='LangGraph', resolves correct slugs from child span metadata using the existing _CHILD_SLUGS_BATCH_SQL pattern, and updates name+metadata_json. Add backfill_stale_status() that finds root runs with no end_time but with completed children, infers end_time from MAX(children.end_time), and updates status. Call both during proxy init in server.py. Include tests in tests/langgraph/web/test_proxy_backfill.py."
        status: pending
        target_acs:
          - AC1
          - AC2
          - AC3
          - AC9
          - AC10

  - id: '3'
    name: "Data Layer: Metrics Computation Fixes"
    status: pending
    tasks:
      - id: '3.1'
        name: "Fix duration computation for list and detail pages"
        agent: coder
        description: "Implement D4 for requirements P3, P10, P11 from work item: tmp/plans/.claimed/70-traces-page-usability-overhaul.md — Fix duration display to use child span aggregation (get_child_time_spans_batch) instead of near-zero root span timestamps. In routes/proxy.py proxy_list handler, ensure child time span data computes real wall-clock duration. In helpers/trace_narrative.py build_execution_view(), fix total duration and per-phase durations to use child run timestamps. Include tests."
        status: pending
        target_acs:
          - AC5
          - AC6
          - AC14
          - AC15
          - AC27

      - id: '3.2'
        name: "Fix cost and model data aggregation"
        agent: coder
        description: "Implement D5 for requirements P4, P5 from work item: tmp/plans/.claimed/70-traces-page-usability-overhaul.md — Fix cost extraction via get_child_costs_batch() recursive CTE to properly sum total_cost_usd from metadata_json across the run subtree. Fix model resolution via get_child_models_batch() to extract the most common model name from child spans. Ensure both cost and model are passed to list page template context in routes/proxy.py. Include tests."
        status: pending
        target_acs:
          - AC7
          - AC8
          - AC28

