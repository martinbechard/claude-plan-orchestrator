  - id: '1.1'
    name: Add batch child time-span aggregation to TracingProxy
    agent: coder
    description: 'Implement P3 from the work item: tmp/plans/.claimed/69-traces-page-complete-redesign.md
      — Add a TracingProxy method that, given a list of root run_ids, returns the
      earliest child start_time and latest child end_time for each parent. This enables
      computing real pipeline duration (minutes, not 0.01s) for list view rows. Use
      a single SQL query with GROUP BY parent_run_id for efficiency.'
    status: completed
    last_attempt: '2026-03-28T10:50:47.286724'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-28T10:55:13.375685'
    result_message: Added ChildTimeSpan dataclass and get_child_time_spans_batch method
      to TracingProxy. Uses a single GROUP BY SQL query via _CHILD_TIME_SPANS_BATCH_SQL_TEMPLATE
      to return earliest child start_time and latest child end_time per parent run_id.
      Added 5 tests covering empty input, no-children case, single parent, multiple
      parents batch, and NULL end_time handling. All 1457 tests pass.
    validation_attempts: 1
    validation_findings: 'All task-level requirements met. ChildTimeSpan dataclass
      and get_child_time_spans_batch method correctly implemented with single GROUP
      BY SQL query. 5 targeted tests all pass. Full suite: 1457 passed.'
  - id: '1.2'
    name: Add batch child cost and model aggregation to TracingProxy
    agent: coder
    description: 'Implement P4 and P5 from the work item: tmp/plans/.claimed/69-traces-page-complete-redesign.md
      — Add TracingProxy methods to aggregate cost (summed from metadata_json across
      children and grandchildren) and resolve model (most common non-empty model among
      children) for a batch of root run_ids. Return as dicts keyed by parent_run_id.'
    status: completed
    last_attempt: '2026-03-28T10:58:11.154810'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-28T11:05:06.769419'
    result_message: Added get_child_costs_batch and get_child_models_batch to TracingProxy.
      Cost uses recursive CTE (children + grandchildren), model uses CTE + ROW_NUMBER
      window function (most common non-empty model among direct children, alphabetical
      tiebreak). Added 10 tests. All 1467 tests pass.
    validation_attempts: 1
    validation_findings: Both TracingProxy batch methods implemented correctly. Build
      clean. All 1467 tests pass including 10 new tests for this task.
  - id: '1.3'
    name: Add batch child slug resolution to TracingProxy
    agent: coder
    description: 'Implement P1 from the work item: tmp/plans/.claimed/69-traces-page-complete-redesign.md
      — Add a TracingProxy method that, for root runs whose name is ''LangGraph''
      or has no slug in metadata, resolves the slug by scanning child run metadata_json
      for slug or item_slug fields. Return a dict of run_id -> resolved_slug for a
      batch of run_ids.'
    status: in_progress
    last_attempt: '2026-03-28T11:08:06.551900'
    attempts: 1
    model_used: sonnet
