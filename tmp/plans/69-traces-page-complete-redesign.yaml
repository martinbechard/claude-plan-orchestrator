    - '1.2'
    - '1.3'
    last_attempt: '2026-03-28T11:14:42.160518'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-28T11:21:11.759915'
    result_message: Integrated batch child aggregation into proxy_list endpoint. Added
      ChildAggregation dataclass; updated _enrich_run to use child-derived duration
