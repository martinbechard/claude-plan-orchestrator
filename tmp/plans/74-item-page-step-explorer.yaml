    - AC20
    - AC21
    - AC22
    - AC23
    - AC24
    description: 'Implement P1, P2, FR1, FR2, FR3, FR5 per D1, D2, D3, D6 from work
      item: tmp/plans/.claimed/74-item-page-step-explorer.md Design: docs/plans/2026-03-31-74-item-page-step-explorer-design.md
      Requirements: docs/plans/2026-03-31-74-item-page-step-explorer-requirements.md

      D1: Create StageInfo and ArtifactInfo TypedDicts. Implement build_stages() mapping
      artifact discovery into six ordered stages per STAGE_ORDER constant. Omit Verification
      stage for feature items (AC5). Label raw request as "User Request" (AC18, AC19).
      Map artifacts to stages: Intake (AC1), Requirements (AC2), Planning (AC3), Execution
      (AC4), Verification (AC5), Archive (AC6). Display six stages in order (AC7,
      AC8). Group under stage headings (AC20) with visual hierarchy (AC21, AC22).

      D2: Implement _compute_stage_statuses() with lookup matrix for three-state status
      (AC9). Compute completion timestamps from latest artifact mtime (AC10).

      D3: Each artifact gets file mtime as timestamp (AC11, AC12). Timestamps on both
      stages and artifacts (AC23, AC24).

      D6: "User Request" label (AC18) within Intake stage (AC19).

      Extend /item/{slug}/dynamic to include stages array with status, completion_ts,
      completion_epoch, artifact_count for live polling.

      '
