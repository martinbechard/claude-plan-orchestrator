    - AC25
    - AC26
    - AC29
    - AC30
    description: 'Implement P1, P2, FR1, FR2, FR3, FR4, FR6 per D1, D2, D3, D4, D7
      from work item: tmp/plans/.claimed/74-item-page-step-explorer.md Design: docs/plans/2026-04-02-74-item-page-step-explorer-design.md
      Requirements: docs/plans/2026-04-02-74-item-page-step-explorer-requirements.md

      D1: Create StageInfo and ArtifactInfo TypedDicts. Implement build_stages() mapping
      artifact discovery into six ordered stages per STAGE_ORDER constant. Omit Verification
      stage for feature items (AC19). Label raw request as "User Request" (AC29, AC30).
      Map artifacts to stages: Intake (AC15), Requirements (AC16), Planning (AC17),
      Execution (AC18), Verification (AC19), Archive (AC20). Display six stages in
      order (AC9, AC10). Group under stage headings (AC1) with visual hierarchy (AC2,
      AC3).

      D2: Implement _compute_stage_statuses() with lookup matrix for three-state status
      (AC21). Ensure status accurately reflects actual state (AC22).

      D3: Compute completion timestamps from latest artifact mtime per stage (AC23).
      Hide timestamps for incomplete stages (AC24). Timestamps on stages (AC4) show
      temporal sequence (AC6).

      D4: Each artifact gets file mtime as timestamp (AC25, AC26).

      D7: "User Request" label replaces "Raw Input" (AC29); no "Raw Input" label anywhere
      on item page (AC30).

      Extend /item/{slug}/dynamic to include stages array with status, completion_ts,
      completion_epoch, artifact_count for live polling.

      '
