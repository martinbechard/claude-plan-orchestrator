    - AC24
    description: >-
      Implement P2, P4, FR2 per D2, D3, D5 from work item:
      tmp/plans/.claimed/74-item-page-step-explorer.md Design:
      docs/plans/2026-03-29-74-item-page-step-explorer-design.md Requirements:
      docs/plans/2026-03-29-74-item-page-step-explorer-requirements.md Add
      status computation to each stage (not_started / in_progress / done) based
      on pipeline_stage and artifact presence per the status matrix in the
      design. Add completion timestamps (latest artifact mtime when done, None
      when not done). Extend the /item/{slug}/dynamic endpoint to include stages
      array with status, timestamps, and artifact_count for live polling
      updates. Pass stages to the Jinja2 template context in item_detail().
