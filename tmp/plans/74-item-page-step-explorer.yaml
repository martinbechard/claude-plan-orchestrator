- id: '1'
  name: 'Backend: Stage Data Model, Status Computation, and API'
  status: pending
  tasks:
  - id: '1.1'
    name: Implement stage data model, build_stages(), status matrix, and /dynamic
      extension
    agent: coder
    status: pending
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC4
    - AC5
    - AC6
    - AC7
    - AC8
