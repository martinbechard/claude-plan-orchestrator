    description: 'Implement P1, P2, P3, P4, P5, FR1, FR2, FR3, FR4 per D1, D3, D4,
      D5, D6, D7 from work item: tmp/plans/.claimed/74-item-page-step-explorer.md
      Design: docs/plans/2026-04-02-74-item-page-step-explorer-design.md Requirements:
      docs/plans/2026-04-02-74-item-page-step-explorer-requirements.md

      D6: Replace layout in item.html with step explorer accordion. Each stage renders
      as collapsible section with button header (aria-expanded, aria-controls), stage
      name, status badge (AC18), completion timestamp (AC5, AC19), artifact count.
      CSS "collapsed" class hides body. localStorage persists expand/collapse state
      per slug+stageId. Users can collapse sections (AC7) that remain collapsed (AC8).
      Each stage independently collapsible/expandable (AC22). Chevron icon indicates
      state.

      D1: Render six stages in order (AC17) with artifacts nested under each stage
      (AC1, AC3, AC20), showing stage timestamps (AC4, AC5) and artifact timestamps
      (AC6, AC21). Visual hierarchy (AC2, AC3). Temporal sequence apparent (AC4).
      Stage contents: Intake (AC11), Requirements (AC12), Planning (AC13), Execution
      (AC14), Verification (AC15), Archive (AC16).

      D5: Artifact content not rendered at page load (AC9, AC24). On stage expand,
      JS fetches each artifact via /item/{slug}/artifact-content?path= (AC23). Expand
      loads without full page refresh (AC25). Page loads faster (AC10). Cache via
      data-loaded DOM attribute. /dynamic polling updates stage status badges and
      detects new artifacts.

      D4: Each artifact displays timestamp (AC6, AC21).

      D7: "User Request" label in Intake stage (AC26, AC27).'
