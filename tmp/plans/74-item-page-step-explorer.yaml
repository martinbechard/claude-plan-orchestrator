    description: 'Implement P1, P2, P3, FR1, FR2, FR3, FR4 per D1, D2, D3, D4, D5,
      D7 from work item: tmp/plans/.claimed/74-item-page-step-explorer.md Design:
      docs/plans/2026-04-02-74-item-page-step-explorer-design.md Requirements: docs/plans/2026-04-02-74-item-page-step-explorer-requirements.md

      D1: Create StageInfo and ArtifactInfo TypedDicts. Implement build_stages() mapping
      artifact discovery into six ordered stages per STAGE_ORDER constant. Omit Verification
      stage for feature items (AC15). Label raw request as "User Request" (AC26, AC27).
      Map artifacts to stages: Intake (AC11), Requirements (AC12), Planning (AC13),
      Execution (AC14), Verification (AC15), Archive (AC16). Display six stages in
      order (AC17). Group under stage headings (AC1) with visual hierarchy (AC2, AC3).
      Artifacts nested under parent stage (AC20).

      D2: Implement _compute_stage_statuses() with lookup matrix for three-state status
      (AC18).

      D3: Compute completion timestamps from latest artifact mtime per stage (AC5,
      AC19).

      D4: Each artifact gets file mtime as timestamp (AC6, AC21).

      D5: Extend /item/{slug}/dynamic to include stages array with status, completion_ts,
      completion_epoch, artifact_count for live polling (AC24). Page loads without
      fetching all content upfront (AC9, AC10).

      D7: "User Request" label replaces "Raw Input" (AC26); underlying data unchanged
      (AC27).'
