    description: >-
      Implement P1, FR1 per D1, D6 from work item:
      tmp/plans/.claimed/74-item-page-step-explorer.md Design:
      docs/plans/2026-03-29-74-item-page-step-explorer-design.md Requirements:
      docs/plans/2026-03-29-74-item-page-step-explorer-requirements.md Create
      StageInfo and ArtifactInfo TypedDicts in item.py. Implement build_stages()
      that maps existing artifact discovery (raw request, clause register, five
      whys, structured requirements, design doc, plan YAML, output files,
      validation results, verification report, completion records) into six
      ordered stages. Omit Verification stage for feature items. Label the raw
      request artifact as "User Request" (not "Raw Input"). Include file mtime
      timestamps for each artifact.
