    description: 'Implement P1, P2, P3, UC1, UC2, FR1, FR2, FR3, FR4, FR5, FR6 per
      D1, D3, D4, D5, D6, D7 from work item: tmp/plans/.claimed/74-item-page-step-explorer.md
      Design: docs/plans/2026-04-02-74-item-page-step-explorer-design.md Requirements:
      docs/plans/2026-04-02-74-item-page-step-explorer-requirements.md

      D6: Replace layout in item.html with step explorer accordion. Each stage renders
      as collapsible section with button header (aria-expanded, aria-controls), stage
      name, status badge (AC21), completion timestamp (AC23), artifact count. CSS
      "collapsed" class hides body. localStorage persists expand/collapse state per
      slug+stageId. Independent collapse/expand (AC14). Chevron icon indicates state.
      Users can collapse unneeded sections (AC5, AC12) and expand them (AC13). Navigate
      to specific stage quickly (AC11).

      D1: Render six stages in order (AC9, AC10) with artifacts nested under each
      stage (AC1, AC3, AC15-AC20), showing timestamps (AC4, AC25). Visual hierarchy
      (AC2, AC3). Temporal sequence apparent (AC6).

      D5: Artifact content not rendered at page load (AC7, AC8). On stage expand,
      JS fetches each artifact via /item/{slug}/artifact-content?path= (AC27). Show
      loading indicator (spinner) while fetching (AC28). Cache via data-loaded DOM
      attribute. /dynamic polling updates stage status badges and detects new artifacts.

      D4: Each artifact displays timestamp (AC25, AC26).

      D7: "User Request" label in Intake stage (AC29, AC30).

      '
