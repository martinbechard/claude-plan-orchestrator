    description: 'Implement P1, P2, P3, P4, FR1, FR2, FR3, FR4, FR5, UC1 per D1, D3,
      D4, D5, D6 from work item: tmp/plans/.claimed/74-item-page-step-explorer.md
      Design: docs/plans/2026-03-31-74-item-page-step-explorer-design.md Requirements:
      docs/plans/2026-03-31-74-item-page-step-explorer-requirements.md

      D5: Replace layout in item.html with step explorer accordion. Each stage renders
      as collapsible section with button header (aria-expanded, aria-controls), stage
      name, status badge (AC9), completion timestamp (AC10), artifact count. CSS "collapsed"
      class hides body. localStorage persists expand/collapse state per slug+stageId.
      Independent collapse/expand (AC16). Chevron icon indicates state (AC17). Users
      can collapse unneeded sections (AC25).

      D1: Render six stages in order (AC7, AC8) with artifacts nested under each stage
      (AC1-AC6, AC11, AC20), showing timestamps (AC12, AC23, AC24). Visual hierarchy
      (AC21, AC22).

      D4: Artifact content not rendered at page load (AC14). On stage expand, JS fetches
      each artifact via /item/{slug}/artifact-content?path= (AC13, AC15). Cache via
      data-loaded DOM attribute. Avoids loading all content simultaneously (AC26).
      /dynamic polling updates stage status badges and detects new artifacts.

      D6: "User Request" label in Intake stage (AC18, AC19).

      '
