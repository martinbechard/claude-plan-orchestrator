meta:
  name: 83-trace-links-empty-or-missing
  source_item: tmp/plans/.claimed/83-trace-links-empty-or-missing.md
  requirements_path: docs/plans/2026-03-31-83-trace-links-empty-or-missing-requirements.md
  validation:
