    description: 'Create langgraph_pipeline/web/static/execution-history.js implementing
      the core execution tree rendering. Also update the HTML template to load it.

      Winning design: tmp/worker-output/0.3-frontend-design.md (sections 3, 4).
      Style guide: docs/ui-style-guide.md.
      Design: docs/plans/2026-04-02-83-trace-links-empty-or-missing-design.md (D4).

      ## JavaScript file structure (execution-history.js)

      Follow the IIFE + "use strict" pattern from existing JS files (analysis.js).
      Constants at the top per CLAUDE.md conventions.

      Constants:
      - API_PREFIX = "/api/execution-tree/"
      - INDENT_PX_PER_LEVEL = 20
      - CHEVRON_RIGHT = "\u25B6" (right-pointing triangle)
      - CHEVRON_DOWN = "\u25BC" (down-pointing triangle)
      - DEFAULT_EXPAND_DEPTH = 1 (nodes at depth >= 2 start collapsed, per judge)
      - NODE_TYPE_LABELS = { graph_node: "Graph", subgraph: "Subgraph",
        agent: "Agent", tool_call: "Tool" }

      Entry point (IIFE):
      - Get #execution-tree container, read data-run-id, call fetchAndRender()

      fetchAndRender(container, runId):
      - fetch(API_PREFIX + encodeURIComponent(runId))
      - On success: clear container, if tree empty call renderEmptyTree(),
        else call renderTree()
      - On error: call renderError()

      renderTree(container, nodes):
      - Create ul.exec-tree with role="tree"
      - For each top-level node, call buildNodeEl(node, 0) and append to ul
      - Append ul to container

      buildNodeEl(node, depth):
      - Create li.exec-node with role="treeitem"
      - Set paddingLeft = depth * INDENT_PX_PER_LEVEL + "px"
      - Create div.exec-node-header containing:
        - Toggle button (if has children): button.exec-toggle with
          aria-expanded (true if depth < DEFAULT_EXPAND_DEPTH, false otherwise),
          aria-controls pointing to children id, aria-label "Toggle {display_name}",
          chevron text based on expanded state
        - Spacer span.exec-toggle-spacer (if leaf node)
        - Type badge: span.exec-type.exec-type-{node_type}
        - Name: span.exec-name with display_name text
        - Status badge: span.badge.badge-{status}
        - Conditional metrics: duration (fmtDuration), cost (fmtCost),
          tokens (fmtTokens), model -- only when > 0 or non-empty
      - If has children: create ul.exec-children with role="group",
        id=nodeId+"-children". If depth >= DEFAULT_EXPAND_DEPTH, set hidden=true.
        Recurse for each child with depth+1

      makeToggleHandler(toggleBtn, nodeId):
      - Toggle aria-expanded, swap chevron text, toggle hidden on children element

      renderEmptyTree(container):
      - Read data-run-name, data-run-status, data-run-start, data-run-end from container
      - Create div.exec-empty with: h2 "Run: {name}", status badge, start time + duration,
        explanatory note about synthetic traces

      renderError(container, message):
      - Create div.exec-error with role="alert", red circle icon, error text

      Formatters (fmtDuration, fmtCost, fmtTokens, makeMetric):
      - fmtDuration: seconds -> "Xs", "Xm Ys", or "Xh Ym"
      - fmtCost: "$0.0000" format, plain (no tilde prefix per project convention)
      - fmtTokens: "X tok" or "X.Xk tok" for >= 1000
      - makeMetric(className, text): create span with given class and text

      ## Template changes (execution_history.html)

      Update langgraph_pipeline/web/templates/execution_history.html:
      1. Add extra_head block with: <script src="/static/execution-history.js" defer></script>
      2. Add data attributes to #execution-tree div:
         data-run-name="{{ run.get(''name'', '''') }}"
         data-run-status="{{ run.get(''status'', ''unknown'') }}"
         data-run-start="{{ run.get(''start_time'', '''') }}"
         data-run-end="{{ run.get(''end_time'', '''') }}"
      3. Replace the <p class="empty-state"> loading text with:
         <div class="exec-loading" role="status" aria-live="polite">
           <span class="exec-spinner" aria-hidden="true"></span>
           Loading execution tree&hellip;
         </div>

      The route (execution_history.py) already passes run_id and run to the
      template context. No Python changes needed.

      Acceptance criteria:
      - Does langgraph_pipeline/web/static/execution-history.js exist and contain
        a fetchAndRender function that calls /api/execution-tree/{run_id}? YES = pass, NO = fail
      - Does the JS contain a recursive buildNodeEl function that creates nested
        li elements with role="treeitem"? YES = pass, NO = fail
      - Does the JS contain renderEmptyTree that reads data-run-* attributes and
        renders a fallback with run name and status? YES = pass, NO = fail
      - Does the JS contain renderError with role="alert"? YES = pass, NO = fail
      - Does execution_history.html include an extra_head block loading
        execution-history.js with defer? YES = pass, NO = fail
      - Does the #execution-tree div have data-run-name, data-run-status,
        data-run-start, data-run-end attributes? YES = pass, NO = fail
      - Do nodes at depth >= 2 start collapsed (hidden=true, aria-expanded=false)?
        YES = pass, NO = fail
      - Does clicking a toggle button flip aria-expanded and toggle the hidden
        attribute on the children container? YES = pass, NO = fail

      '
