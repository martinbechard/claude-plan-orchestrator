- id: '1'
  name: 'Backend: Trace ID Capture, Persistence, and Backfill'
  status: pending
  tasks:
  - id: '1.1'
    name: Always capture trace UUIDs and ensure trace rows exist in DB
    agent: coder
    status: pending
    target_acs:
    - AC1
    - AC2
    - AC5
    - AC6
    description: 'Implement P1, P2, FR1 per D1, D2, D3 from work item: tmp/plans/.claimed/83-trace-links-empty-or-missing.md
      Design: docs/plans/2026-04-02-83-trace-links-empty-or-missing-design.md Requirements:
      docs/plans/2026-04-02-83-trace-links-empty-or-missing-requirements.md

      D1: Modify create_root_run() in langgraph_pipeline/shared/langsmith.py so it
      always generates a UUID and writes the marker line to the item file, even when
      _tracing_active is False or langsmith is not installed. When tracing IS active,
      continue creating RunTree and posting. When inactive, generate UUID and write
      file marker only. Return (None, trace_id) instead of (None, None) in the inactive
      case.

      D2: Modify record_completion() in langgraph_pipeline/web/proxy.py to check whether
      a trace row exists for the given run_id (when non-null). If no trace row exists,
      insert a synthetic root trace row with: run_id, parent_run_id=NULL, name=slug,
      start_time and end_time from the completion timestamp, created_at from now,
      and metadata_json containing outcome and cost_usd. This prevents /execution-history/{run_id}
      from returning 404.

      D3: Add a migration in _init_db() that queries all completions with NULL run_id,
      generates a UUID for each, updates the completion row, and inserts a synthetic
      root trace row. The migration is idempotent.

      Write tests covering: create_root_run returns UUID when tracing inactive, record_completion
      creates synthetic trace row, backfill migration populates NULL run_ids.

      '
