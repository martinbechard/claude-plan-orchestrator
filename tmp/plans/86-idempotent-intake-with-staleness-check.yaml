      is_artifact_fresh(workspace, "five-whys.md", [item_path]). This fixes P2 by
      checking the workspace artifact directly. Retain _has_five_whys() as fallback
      only when sidecar has no entry. After saving new five-whys, call record_artifact().

      Update tests in tests/langgraph/pipeline/nodes/test_intake.py to cover: clause
      extraction skipped when fresh, 5 Whys skipped when fresh, both re-run when item
      changes, and _has_five_whys fallback behavior.'
