    description: "Implement FR4, FR5 per D4, D7 from work item: tmp/plans/.claimed/82-investigation-workflow-with-slack-proposals.md\
      \ Design: docs/plans/2026-03-31-82-investigation-workflow-with-slack-proposals-design.md\
      \ Requirements: docs/plans/2026-03-31-82-investigation-workflow-with-slack-proposals-requirements.md\n\
      D4: Create langgraph_pipeline/investigation/__init__.py (empty). Create langgraph_pipeline/investigation/proposals.py\
      \ with:\nProposal dataclass: number (int), proposal_type (Literal[\"defect\"\
      , \"enhancement\"]), title (str), description (str), severity (Literal[\"critical\"\
      , \"high\", \"medium\", \"low\"]), status (Literal[\"pending\", \"accepted\"\
      , \"rejected\"]) defaulting to \"pending\", filed_path (Optional[str]) defaulting\
      \ to None.\nProposalSet dataclass: slug (str), generated_at (str, ISO-8601),\
      \ status (Literal[\"pending\", \"approved\", \"rejected\", \"partial\"]) defaulting\
      \ to \"pending\", slack_channel_id (Optional[str]) defaulting to None, slack_thread_ts\
      \ (Optional[str]) defaulting to None, reply_text (Optional[str]) defaulting\
      \ to None, proposals (list[Proposal]).\nAdd save_proposals(proposal_set, workspace_dir)\
      \ that writes proposals.yaml using PyYAML safe_dump (convert dataclasses to\
      \ dicts first). Add load_proposals(workspace_dir) -> Optional[ProposalSet] that\
      \ reads proposals.yaml and reconstructs the dataclass. Returns None if file\
      \ missing.\nD7: Add parse_approval_response(text: str, proposal_count: int)\
      \ -> set[int] that returns accepted proposal numbers. Strategy chain: 1. Strip\
      \ whitespace, lowercase. \"all\" or \"yes\" ->\n   set(range(1, proposal_count+1))\n\
      2. \"none\" or \"no\" -> empty set 3. Regex for comma/space-separated numbers\
      \ (r\"^[\\d,\\s]+$\") -> parse\n   each number, validate in range 1..proposal_count\n\
      4. Regex for \"all except\" pattern\n   (r\"^all\\s+except\\s+([\\d,\\s]+)$\"\
      ) -> compute full set minus listed\n   numbers\n5. Fallback: call Claude Haiku\
      \ via\n   langgraph_pipeline/shared/claude_cli.py with a prompt asking it to\n\
      \   return accepted numbers as a JSON array given the response text and\n  \
      \ proposal count. Parse the JSON array from output.\n\nWrite comprehensive tests\
      \ in tests/langgraph/investigation/test_proposals.py (create tests/langgraph/investigation/__init__.py\
      \ too): - Proposal and ProposalSet serialization round-trip - save_proposals/load_proposals\
      \ with tmp_path - load_proposals returns None for missing file - parse_approval_response:\
      \ \"all\" -> all numbers, \"yes\" -> all numbers - parse_approval_response:\
      \ \"none\" -> empty, \"no\" -> empty - parse_approval_response: \"1, 3, 5\"\
      \ -> {1, 3, 5} - parse_approval_response: \"1 3 5\" -> {1, 3, 5} - parse_approval_response:\
      \ \"ALL EXCEPT 2\" -> all minus {2}\n  (case insensitive)\n- parse_approval_response:\
      \ \"all except 1, 4\" -> all minus {1, 4} - parse_approval_response: numbers\
      \ out of range are ignored - parse_approval_response: whitespace variations\
      \ handled\n"
