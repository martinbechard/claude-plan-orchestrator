    description: 'Implement FR2, FR4, FR5, UC3 per D1, D2 from work item: tmp/plans/.claimed/82-investigation-workflow-with-slack-proposals.md
      Design: docs/plans/2026-04-02-82-investigation-workflow-with-slack-proposals-design.md
      Requirements: docs/plans/2026-04-02-82-investigation-workflow-with-slack-proposals-requirements.md


      D1: Create langgraph_pipeline/investigation/__init__.py (empty). Create langgraph_pipeline/investigation/proposals.py
      with:

      Proposal dataclass: number (int), proposal_type (Literal["defect", "enhancement"]),
      title (str), description (str), severity (Literal["critical", "high", "medium",
      "low"]), status (Literal["pending", "accepted", "rejected"]) defaulting to "pending",
      filed_path (Optional[str]) defaulting to None.

      ProposalSet dataclass: slug (str), generated_at (str, ISO-8601), status (Literal["pending",
      "approved", "rejected", "partial"]) defaulting to "pending", slack_channel_id
      (Optional[str]) defaulting to None, slack_thread_ts (Optional[str]) defaulting
      to None, reply_text (Optional[str]) defaulting to None, proposals (list[Proposal]).

      Add save_proposals(proposal_set, workspace_dir) that writes proposals.yaml using
      PyYAML safe_dump (convert dataclasses to dicts first). Add load_proposals(workspace_dir)
      -> Optional[ProposalSet] that reads proposals.yaml and reconstructs the dataclass.
      Returns None if file missing.


      D2: Add parse_approval_response(text: str, proposal_count: int) -> set[int]
      that returns accepted proposal numbers. Strategy chain:

      1. Strip whitespace, lowercase. "all" or "yes" -> set(range(1, proposal_count+1))

      2. "none" or "no" -> empty set

      3. Regex for comma/space-separated numbers (r"^[\d,\s]+$") -> parse each number,
      validate in range 1..proposal_count

      4. Regex for "all except" pattern (r"^all\s+except\s+([\d,\s]+)$") -> compute
      full set minus listed numbers

      5. Fallback: call Claude Haiku via langgraph_pipeline/shared/claude_cli.py with
      a prompt asking it to return accepted numbers as a JSON array given the response
      text and proposal count. Parse the JSON array from output. If LLM call also
      fails, return empty set and log warning.


      Write comprehensive tests in tests/langgraph/investigation/test_proposals.py
      (create tests/langgraph/investigation/__init__.py too):

      - Proposal and ProposalSet serialization round-trip

      - save_proposals/load_proposals with tmp_path

      - load_proposals returns None for missing file

      - parse_approval_response: "all" -> all numbers, "yes" -> all numbers

      - parse_approval_response: "none" -> empty, "no" -> empty

      - parse_approval_response: "1, 3, 5" -> {1, 3, 5}

      - parse_approval_response: "1 3 5" -> {1, 3, 5}

      - parse_approval_response: "ALL EXCEPT 2" -> all minus {2} (case insensitive)

      - parse_approval_response: "all except 1, 4" -> all minus {1, 4}

      - parse_approval_response: numbers out of range are ignored

      - parse_approval_response: whitespace variations handled

      '
