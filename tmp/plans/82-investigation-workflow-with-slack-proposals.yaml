    description: 'Implement FR3, UC2, FR6, FR7 per D5, D6, D8, D9 from work item:
      tmp/plans/.claimed/82-investigation-workflow-with-slack-proposals.md Design:
      docs/plans/2026-03-31-82-investigation-workflow-with-slack-proposals-design.md
      Requirements: docs/plans/2026-03-31-82-investigation-workflow-with-slack-proposals-requirements.md

      D5: In langgraph_pipeline/slack/notifier.py, add "investigations" to SLACK_CHANNEL_ROLE_SUFFIXES
      mapping to "investigation". Add a post_proposals(slug, proposals, channel_role="investigations")
      method that formats proposals as a numbered Block Kit message. Each proposal
      shows: number, type badge (defect/enhancement), title, truncated description,
      severity. Post as top-level message. Return the message ts (thread_ts). Also
      update langgraph_pipeline/slack/poller.py to add "investigations" to its SLACK_CHANNEL_ROLE_SUFFIXES.

      D6: Replace the placeholder process_investigation function in langgraph_pipeline/pipeline/nodes/investigation.py
      with a state-machine:

      Phase 1 - Post proposals: If proposals.yaml exists but slack_thread_ts is None,
      instantiate SlackNotifier, call post_proposals() to send the numbered list to
      Slack, save the returned thread_ts and channel_id to proposals.yaml, set should_stop=True,
      return state.

      Phase 2 - Poll for reply: If slack_thread_ts exists but reply_text is None,
      call SlackNotifier''s check_suspension_reply() to check the thread for a human
      reply (skip bot messages). If no reply found, set should_stop=True, return state.
      If reply found, save reply_text to proposals.yaml and proceed to Phase 3.

      Phase 3 - Parse and file: Call parse_approval_response(reply_text, len(proposals)).
      For each accepted proposal, call file_accepted_proposals() to write the backlog
      markdown entry. Update each proposal status to accepted/rejected per D9. Save
      updated proposals.yaml. Return state with should_stop=False.

      D8: Add file_accepted_proposals(proposal_set) to proposals.py. For each accepted
      proposal: determine target directory (DEFECT_DIR for defects, FEATURE_DIR for
      enhancements). Find next available sequence number by scanning existing files.
      Write markdown using standard backlog format: title, status Open, priority from
      severity, summary from description, description with investigation evidence.
      Set proposal.filed_path.

      D9: After filing, update each proposal''s status field to "accepted" or "rejected".
      Set ProposalSet.status to "approved"/"rejected"/"partial". Save the final proposals.yaml.

      Write tests in tests/langgraph/pipeline/nodes/test_investigation.py (extend
      existing file): - process_investigation posts to Slack when no thread_ts (mock
      notifier) - process_investigation sets should_stop when no reply yet - process_investigation
      parses reply and files accepted proposals - file_accepted_proposals writes correct
      markdown format - file_accepted_proposals routes defects to defect-backlog/
      - file_accepted_proposals routes enhancements to feature-backlog/ - Outcome
      recording: accepted/rejected status persisted in proposals.yaml

      '
