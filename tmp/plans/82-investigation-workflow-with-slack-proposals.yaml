    description: 'Implement UC1, FR1 per D1, D2, D10 from work item: tmp/plans/.claimed/82-investigation-workflow-with-slack-proposals.md
      Design: docs/plans/2026-03-31-82-investigation-workflow-with-slack-proposals-design.md
      Requirements: docs/plans/2026-03-31-82-investigation-workflow-with-slack-proposals-requirements.md

      D1: In langgraph_pipeline/pipeline/state.py, add "investigation" to the ItemType
      Literal. In langgraph_pipeline/shared/paths.py, add INVESTIGATION_DIR = "docs/investigation-backlog"
      and COMPLETED_INVESTIGATIONS_DIR = "docs/completed-backlog/investigations".
      Add both to BACKLOG_DIRS and COMPLETED_DIRS dictionaries. Update langgraph_pipeline/supervisor.py
      to include investigation in the backlog scan order.

      D2: In langgraph_pipeline/pipeline/nodes/intake.py, handle item_type == "investigation"
      the same as "analysis" -- run clause extraction and 5-whys analysis to produce
      clause_register_path and five_whys_path.

      D10: In langgraph_pipeline/pipeline/edges.py, add NODE_RUN_INVESTIGATION and
      NODE_PROCESS_INVESTIGATION constants. Modify route_after_intake to check for
      item_type == "investigation" and return NODE_RUN_INVESTIGATION instead of NODE_STRUCTURE_REQS.
      Add route_after_investigation() that returns NODE_PROCESS_INVESTIGATION. Add
      route_after_process_investigation() that returns END if should_stop is True,
      else NODE_ARCHIVE.

      In langgraph_pipeline/pipeline/graph.py, import the two new investigation node
      functions (run_investigation, process_investigation) from nodes. Add them via
      add_node(). Wire conditional edges: run_investigation -> route_after_investigation
      -> process_investigation, process_investigation -> route_after_process_investigation
      -> archive | END. Update langgraph_pipeline/pipeline/nodes/__init__.py to export
      both.

      In langgraph_pipeline/pipeline/nodes/archival.py, ensure investigation type
      is handled (it should map to "completed" outcome like features/analyses).

      Create placeholder node functions in langgraph_pipeline/pipeline/nodes/investigation.py
      that return the state unchanged (to be implemented in later tasks). These must
      accept PipelineState and return a dict.

      Write tests in tests/langgraph/pipeline/test_edges.py for the new routing functions:
      route_after_intake returns NODE_RUN_INVESTIGATION for investigation type, route_after_process_investigation
      returns END when should_stop is True and NODE_ARCHIVE otherwise.

      '
