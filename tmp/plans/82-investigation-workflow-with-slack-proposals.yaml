    description: "Implement FR1, FR2 per D3 from work item: tmp/plans/.claimed/82-investigation-workflow-with-slack-proposals.md\
      \ Design: docs/plans/2026-03-31-82-investigation-workflow-with-slack-proposals-design.md\
      \ Requirements: docs/plans/2026-03-31-82-investigation-workflow-with-slack-proposals-requirements.md\n\
      D3: Replace the placeholder run_investigation function in langgraph_pipeline/pipeline/nodes/investigation.py\
      \ with a full implementation.\nThe node must be idempotent: first check if proposals.yaml\
      \ already exists in the workspace (via load_proposals). If it does, return state\
      \ unchanged.\nIf no proposals exist: 1. Read the original item content from\
      \ item_path 2. Read clause_register_path and five_whys_path from state (intake\
      \ output) 3. Spawn Claude (Opus model) via langgraph_pipeline/shared/claude_cli.py\n\
      \   with a structured prompt that:\n   - Provides the item content, clause register,\
      \ and 5-whys as context\n   - Instructs Claude to investigate the codebase,\
      \ reading relevant code,\n     logs, data, and traces referenced in the analysis\n\
      \   - Requires output as a JSON array of proposals, each with: type\n     (defect/enhancement),\
      \ title, description (with evidence citations),\n     severity (critical/high/medium/low)\n\
      4. Parse the JSON array from Claude's output 5. Construct Proposal objects (numbered\
      \ 1..N) and a ProposalSet 6. Save to workspace via save_proposals() 7. Return\
      \ state unchanged (process_investigation handles next steps)\nFollow the existing\
      \ node patterns in intake.py and plan_creation.py for Claude CLI invocation,\
      \ output parsing, and error handling. Use the \"planner\" permission profile\
      \ for the Claude call.\nWrite tests in tests/langgraph/pipeline/nodes/test_investigation.py:\
      \ - run_investigation skips when proposals.yaml exists (idempotent) - run_investigation\
      \ calls Claude and produces proposals (mock Claude CLI) - run_investigation\
      \ handles Claude output parse failure gracefully\n"
