      stageBadgeHtml function for dynamic updates (D4 -- P2, FR1). Each task
      should use the frontend-coder agent and reference specific P<n>, D<n>.
      All frontend changes are in item.html only.

- id: '1'
  name: 'Backend: Phase Label Mapping and API Exposure'
  status: pending
  tasks:
  - id: '1.1'
    name: Add phase label mapping and expose in API responses
    agent: coder
    status: pending
    target_acs:
    - AC5
    - AC6
    - AC10
    description: >
      Implement requirements P3, FR2 and design decisions D1, D2 from work item:
      tmp/plans/.claimed/01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th.md
      Requirements: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-requirements.md
      Design: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-design.md

      In langgraph_pipeline/web/routes/item.py:
      (1) Add PIPELINE_STAGE_TO_PHASE_LABEL dict mapping pipeline_stage strings
      to user-facing labels (queued->Queued, claimed->Intake, designing->Requirements,
      planning->Planning, executing->Execution, validating->Verification,
      completed->Completed, stuck->Stuck, unknown->Unknown). Add _get_phase_label()
      helper. (D1)
      (2) Add phase_label to the template context dict in GET /item/{slug} handler
      and to the JSONResponse in GET /item/{slug}/dynamic handler. Compute via
      _get_phase_label(pipeline_stage). (D2)
      The existing 10s polling delivers updates without new transport (AC6).
