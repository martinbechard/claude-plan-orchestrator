- id: '0'
  name: 'Phase 0: Phase Badge UI Design Competition'
  status: pending
  tasks:
  - id: '0.1'
    name: 'Systems design: phase badge rendering fix'
    agent: systems-designer
    status: pending
    parallel_group: design-competition
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC7
    - AC8
    - AC9
    description: >
      Produce a systems design for fixing the phase status badge rendering.
      Work item: tmp/plans/.claimed/01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th.md
      Requirements: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-requirements.md
      Design: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-design.md

      Focus on P1 (badge not displayed properly), P2 (plan item shown instead of
      phase badge), and FR1 (live phase badge). Design decisions D3, D4, D5.

      The bug is in langgraph_pipeline/web/templates/item.html. The stage badge
      (lines 1181-1196 Jinja, lines 1835-1848 JS stageBadgeHtml) currently shows
      active_worker.current_task (a plan task name like "#0.1 Systems design...")
      instead of the pipeline phase. There is also a hardcoded "intake / planning"
      fallback. Focus on: how the Jinja template and JS function should render
      phase_label instead of task name, visual treatment of phase badges (colors,
      shape), and how current_task info should be presented (worker banner only,
      not in the status badge).

  - id: '0.2'
    name: 'UX design: phase badge visual treatment'
    agent: ux-designer
    status: pending
    parallel_group: design-competition
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC7
    - AC8
    description: >
      Produce a UX design for the corrected phase status badge.
      Work item: tmp/plans/.claimed/01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th.md
      Requirements: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-requirements.md
      Design: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-design.md

      Focus on P1 (badge display), P2 (plan item vs phase badge), FR1 (live badge).
      Design decisions D3, D5.

      The badge must show the pipeline phase name (Intake, Requirements, Planning,
      Execution, Verification, etc.) rather than a plan task name. Consider: visual
      distinction from plan item content (AC2), badge label clarity for phase names,
      color coding using phase-specific colors on dark theme (#1a1a2e background),
      pill-shaped badges with distinct colors per phase, and whether the current
      task name should appear alongside the phase badge or only in the worker
      banner below.

  - id: '0.3'
    name: 'Frontend design: phase badge implementation approach'
    agent: frontend-coder
    status: pending
    parallel_group: design-competition
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC4
    - AC8
    - AC9
    - AC10
    description: >
      Produce a frontend implementation design for the phase badge fix.
      Work item: tmp/plans/.claimed/01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th.md
      Requirements: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-requirements.md
      Design: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-design.md

      Focus on P1, P2, FR1. Design decisions D3, D4, D5.

      Provide concrete code changes for langgraph_pipeline/web/templates/item.html.
      Two locations need fixing: (1) Jinja template lines 1181-1196 where
      active_worker.current_task overrides the badge text -- replace with
      phase_label rendering using a "phase-badge" CSS class, (2) JavaScript
      stageBadgeHtml function lines 1835-1848 with the same bug -- update to
      accept and render phase_label from /dynamic JSON. Both must always render
      phase_label as the badge label. Remove the hardcoded "intake / planning"
      fallback. Specify exact before/after code diffs. Add phase-specific CSS
      color classes. Ensure the dynamic refresh path continues to update the
      badge correctly as phases transition.

  - id: '0.4'
    name: 'Judge: select winning phase badge design'
    agent: design-judge
    status: pending
    dependencies:
