      The bug is in langgraph_pipeline/web/templates/item.html. The stage badge
      (lines 1181-1196 Jinja, lines 1835-1848 JS stageBadgeHtml) currently shows
      active_worker.current_task (a plan task name like "#0.1 Systems design...")
      instead of the pipeline phase (executing, validating, etc.). There is also a
      hardcoded "intake / planning" fallback. Focus on: the data flow from
      _derive_pipeline_stage() through template rendering to dynamic refresh,
      ensuring the badge always shows the correct pipeline phase, and how current_task
      info should be presented (worker banner vs badge).
  - id: '0.2'
    name: 'UX design: phase badge visual treatment'
    agent: ux-designer
    status: pending
    parallel_group: design-competition
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC5
    description: >
      Produce a UX design for the corrected phase status badge.
      Work item: tmp/plans/.claimed/01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th.md
      Requirements: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-requirements.md
      Design: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-design.md

      The badge must show the pipeline phase name (Intake, Requirements, Planning,
      Execution, Verification, etc.) rather than a plan task name. Consider: visual
      distinction from plan item content (AC2), badge label clarity for phase names,
      color coding using existing status-{stage} CSS classes (dark theme: #1a1a2e
      background), and whether the current task name should appear alongside the
      phase badge or only in the worker banner below.
