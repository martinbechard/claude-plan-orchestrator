      Provide concrete code changes for langgraph_pipeline/web/templates/item.html.
      Two locations need fixing: (1) Jinja template lines 1181-1196 where
      active_worker.current_task overrides the badge text, and (2) JavaScript
      stageBadgeHtml function lines 1835-1848 with the same bug. Both must always
      render pipeline_stage as the badge label. Also fix the hardcoded
      "intake / planning" fallback. Specify exact before/after code diffs. Ensure
      the dynamic refresh path (/item/{slug}/dynamic) continues to update the badge
      correctly as phases transition.
