    - '0.2'
    - '0.3'
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC4
    - AC7
    - AC8
    - AC9
    - AC10
    description: >
      Judge the three competing designs for the phase status badge fix.
      Work item: tmp/plans/.claimed/01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th.md
      Requirements: docs/plans/2026-04-02-01-in-the-work-item-page-during-the-processing-of--the-work-item-the-status-of-th-requirements.md

      Score each design against AC1-AC10 from the requirements file. Consider:
      correctness of pipeline phase display (AC1, AC3), visual distinction from
      plan items (AC2), phase label accuracy (AC7), dynamic refresh behavior
      (AC4, AC9, AC10), continuous visibility (AC8), handling of all pipeline
      stages (queued, claimed, designing, planning, executing, validating,
      completed, stuck), and minimal change footprint. Select the winner and
      write judgment to worker output.

