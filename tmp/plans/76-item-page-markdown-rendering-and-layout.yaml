    description: 'Implement P1, P2, FR1, FR2 per D1, D2, D3 from work item: tmp/plans/.claimed/76-item-page-markdown-rendering-and-layout.md
      Design: docs/plans/2026-04-02-76-item-page-markdown-rendering-and-layout-design.md
      Requirements: docs/plans/2026-04-02-76-item-page-markdown-rendering-and-layout-requirements.md

      D1: Add marked.js via CDN with SRI hash to item.html. Create a shared renderArtifactContent(pre,
      mdDiv, text, path) JS helper. In loadStageArtifacts(), after fetching text,
      call the helper which checks data-artifact-path for .md extension. For .md files:
      render through marked.parse(), display as innerHTML in div.md-rendered (hide
      pre, show div). For non-.md files: display as textContent in pre. Apply the
      same logic in the artifact-path-link click handler for output artifact viewer
      entries. Add div.md-rendered sibling elements next to each pre in both the step
      explorer and output artifact sections.

      D2: Add min-width: 0 to .item-layout > * (grid children). Add max-width: 100%
      and overflow-x: auto to .step-artifact-content, .artifact-viewer-pre, and .md-rendered
      containers. Add overflow: hidden to .step-explorer. These are static CSS rules
      that stabilize the layout regardless of expand/collapse state.

      D3: Add .md-rendered CSS rules for dark theme: headings with scaled sizes (h1
      1.3em to h6 0.85em), lists with indentation, code blocks with slightly darker
      background + monospace, inline code with subtle bg, links with visible color,
      tables with cell borders, blockquotes with left-border accent. Use same background
      (#1a1a2e), text color (#e2e8f0), padding, and border-radius as pre.step-artifact-content.

      '
