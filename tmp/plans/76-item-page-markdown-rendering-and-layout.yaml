- id: '1'
  name: Backend - Markdown Rendering Endpoint
  status: pending
  tasks:
  - id: '1.1'
    name: Add render=html support to artifact-content endpoint
    agent: coder
    dependencies:
    - '0.5'
    status: pending
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC4
    - AC5
    - AC6
    description: >
      Implement D1 for requirements P1, FR1 from work item:
      tmp/plans/.claimed/76-item-page-markdown-rendering-and-layout.md
      Design: docs/plans/2026-03-30-76-item-page-markdown-rendering-and-layout-design.md

      Modify the GET /item/{slug}/artifact-content endpoint in item.py to accept an
      optional render=html query parameter. When the file has a .md extension and
      render=html is set, use _render_md_to_html() to return an HTMLResponse instead
      of PlainTextResponse. Include unit tests for the new parameter behavior.
- id: '2'
  name: Frontend - Markdown Display and Layout Fix
  status: pending
  tasks:
  - id: '2.1'
    name: Update artifact viewers for markdown-aware display and fix grid overflow
    agent: frontend-coder
    dependencies:
    - '1.1'
    status: pending
    target_acs:
    - AC1
    - AC2
    - AC3
    - AC4
    - AC5
    - AC6
    - AC7
    - AC8
    - AC9
    - AC10
    - AC11
    - AC12
    description: >
      Implement D2, D3, D4 for requirements P1, P2, FR1, FR2 from work item:
      tmp/plans/.claimed/76-item-page-markdown-rendering-and-layout.md
      Design: docs/plans/2026-03-30-76-item-page-markdown-rendering-and-layout-design.md

      (1) Modify loadStageArtifacts() JS to detect .md file extensions and fetch
      with render=html, displaying returned HTML via innerHTML in a styled div
      instead of textContent in pre (D2).

      (2) Apply the same .md detection logic to the output artifacts sidebar
      click handler (D2).

      (3) Add min-width: 0 to .item-layout left column child and overflow: hidden
      to fix the CSS grid overflow that pushes the sidebar (D3).

      (4) Add overflow-x: auto and max-width: 100% to rendered markdown containers,
      and ensure code blocks within rendered markdown scroll horizontally (D4).

      (5) Style rendered markdown within artifact viewers using or extending the
      existing .requirements-body CSS patterns.
