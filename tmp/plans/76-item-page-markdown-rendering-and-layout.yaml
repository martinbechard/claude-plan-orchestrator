      Focus on: (1) the artifact-content endpoint modification to support optional
      HTML rendering for markdown files (D1), reusing the existing _render_md_to_html()
      function in item.py; (2) the data flow from server-rendered HTML to the client
      display layer; (3) CSS grid containment strategy for the two-column layout
      (D3) including min-width: 0 vs overflow: hidden tradeoffs; (4) how the
      existing .requirements-body CSS styles can be reused for rendered markdown
      in artifact viewers.
  - id: '0.2'
    name: UX design for markdown display and layout preservation
    agent: ux-designer
    parallel_group: design-phase0
