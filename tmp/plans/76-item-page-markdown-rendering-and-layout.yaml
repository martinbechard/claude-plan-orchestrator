    - AC7
    - AC8
    - AC9
    - AC10
    - AC11
    - AC12
    description: >
      Produce a UX design covering P1, P2, FR1, FR2 from work item:
      tmp/plans/.claimed/76-item-page-markdown-rendering-and-layout.md
      Design: docs/plans/2026-03-30-76-item-page-markdown-rendering-and-layout-design.md
      Requirements: docs/plans/2026-03-30-76-item-page-markdown-rendering-and-layout-requirements.md

      Focus on: (1) how rendered markdown should visually integrate within the
      dark-background artifact viewers vs the white-background item cards;
      (2) typography and spacing for rendered headings, lists, and code blocks
      within the constrained artifact width; (3) user experience of switching
      between markdown and non-markdown artifacts (consistent expand/collapse
      behavior); (4) accessibility of rendered markdown content (semantic HTML,
      proper heading hierarchy); (5) graceful handling of wide content via
      horizontal scroll vs line wrapping.
