      Focus on: (1) JavaScript changes to loadStageArtifacts() and output artifact
      click handler to detect .md extensions and switch between innerHTML/div vs
      textContent/pre display (D2); (2) concrete CSS rules for grid overflow
      containment on .item-layout children (D3); (3) CSS for rendered markdown
      within artifact viewers -- whether to reuse .requirements-body styles or
      create artifact-specific markdown styles (D4); (4) how to handle the
      server-side render=html parameter in fetch calls; (5) template changes
      needed in item.html for the dual-mode (pre vs div) artifact display.
