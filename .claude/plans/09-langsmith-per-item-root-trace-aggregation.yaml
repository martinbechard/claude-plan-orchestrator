meta:
  name: 'Feature: LangSmith Per-Item Root Trace Aggregation'
  description: Add a shared root RunTree per work item so all tool call spans across
    intake, plan creation, and every task execution step are grouped under one aggregated
    LangSmith trace per item.
  plan_doc: docs/plans/2026-03-24-09-langsmith-per-item-root-trace-aggregation-design.md
  source_item: docs/feature-backlog/09-langsmith-per-item-root-trace-aggregation.md
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
  status: pending
sections:
- id: phase-1
  name: Phase 1 - Foundation (state schema and API changes)
  status: pending
  tasks:
  - id: '1.1'
    name: Add langsmith_root_run_id to state schemas and update emit_tool_call_traces
    agent: coder
    status: in_progress
    description: 'Implement the work item: docs/feature-backlog/09-langsmith-per-item-root-trace-aggregation.md

      Design doc: docs/plans/2026-03-24-09-langsmith-per-item-root-trace-aggregation-design.md

      Schema changes: add langsmith_root_run_id: Optional[str] to PipelineState in
      langgraph_pipeline/pipeline/state.py and to TaskState in langgraph_pipeline/executor/state.py.

      API change: add optional parent_run_id: Optional[str] = None parameter to emit_tool_call_traces
      in langgraph_pipeline/shared/langsmith.py. When provided, pass it to RunTree(parent_run_id=parent_run_id,
      ...). No behavior change when None.

      Also add two helpers to langsmith.py: create_root_run(item_slug, item_path)
      that reads an existing trace ID from the item file (## LangSmith Trace: <uuid>
      line), returns (run_tree, uuid) -- creating a fresh RunTree if none found, writing
      the uuid line to the file; and finalize_root_run(root_run_id, outputs) that
      reconstructs the RunTree by ID, calls end() and post(). Both helpers degrade
      silently when tracing is inactive or langsmith is not installed.

      Update tests/langgraph/shared/test_langsmith.py to cover: parent_run_id forwarding
      in emit_tool_call_traces, create_root_run (fresh creation + file write, existing
      ID recovery), finalize_root_run. Run pytest to verify no regressions.'
    last_attempt: '2026-03-24T18:15:32.991343'
    attempts: 1
    model_used: sonnet
- id: phase-2
  name: Phase 2 - Lifecycle implementation
  status: pending
  tasks:
  - id: '2.1'
    name: Implement root trace creation in scan_backlog and threading through execute_plan
      and task_runner
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/09-langsmith-per-item-root-trace-aggregation.md

      Design doc: docs/plans/2026-03-24-09-langsmith-per-item-root-trace-aggregation-design.md

      In langgraph_pipeline/pipeline/nodes/scan.py: when an item is found (not empty-backlog
      sentinel), call create_root_run(item_slug, item_path) from shared/langsmith.py
      and include langsmith_root_run_id in the returned state dict. When tracing is
      inactive, set langsmith_root_run_id to None.

      In langgraph_pipeline/pipeline/nodes/execute_plan.py: add langsmith_root_run_id
      to initial_task_state mapped from PipelineState.

      In langgraph_pipeline/executor/nodes/task_runner.py: pass langsmith_root_run_id
      from TaskState as parent_run_id= when calling emit_tool_call_traces.

      Run pytest to verify no regressions.'
  - id: '2.2'
    name: Finalize root trace in archive and strip trace ID line from item file
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/09-langsmith-per-item-root-trace-aggregation.md

      Design doc: docs/plans/2026-03-24-09-langsmith-per-item-root-trace-aggregation-design.md

      In langgraph_pipeline/pipeline/nodes/archival.py: before moving the item file,
      call finalize_root_run(langsmith_root_run_id, outputs) from shared/langsmith.py
      with outcome and item_slug as outputs. Strip the ## LangSmith Trace: line from
      the item file content before the move (read file, remove the line, write back,
      then move). When tracing is inactive or langsmith_root_run_id is None, skip
      both steps silently.

      Update tests/langgraph/pipeline/nodes/test_archival.py to cover trace finalization
      and metadata line stripping. Run pytest to verify no regressions.'
