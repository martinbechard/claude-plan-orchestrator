meta:
  name: Structured Execution Cost Log and Automated Analysis
  description: 'Adds per-task structured cost logs (JSON) capturing token counts,
    tool calls with file paths, and result sizes. After each task, appends a record
    to docs/reports/execution-costs/<item-slug>.json. Also adds an analysis backlog
    template that triggers the pipeline to aggregate the logs and post a Slack report
    identifying token/time waste patterns.

    '
  plan_doc: docs/plans/2026-03-24-12-structured-execution-cost-log-and-analysis-design.md
  source_item: docs/feature-backlog/12-structured-execution-cost-log-and-analysis.md
  created: '2026-03-24'
  item_type: feature
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    validators:
    - validator
    max_validation_attempts: 2
