meta:
  name: Add verbose logging for agent identity message filtering decisions
  description: Add verbose_log() calls to each branch of the agent identity filtering
    block in _handle_polled_messages() so operators can diagnose cross-instance routing
    issues by enabling --verbose.
  plan_doc: docs/plans/2026-02-26-1-cpo-pipeline-feature-request-improve-verbose-mode-logging-for-inbound-slack-me-design.md
  source_item: docs/feature-backlog/1-cpo-pipeline-feature-request-improve-verbose-mode-logging-for-inbound-slack-me.md
  created: '2026-02-26'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Add verbose_log() calls to agent identity filtering
  status: completed
  tasks:
  - id: '1.1'
    name: Add verbose_log() calls to each filtering decision branch
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/1-cpo-pipeline-feature-request-improve-verbose-mode-logging-for-inbound-slack-me.md

      Design doc: docs/plans/2026-02-26-1-cpo-pipeline-feature-request-improve-verbose-mode-logging-for-inbound-slack-me-design.md


      In scripts/plan-orchestrator.py, add verbose_log() calls with prefix "FILTER"

      adjacent to the existing print() statements in the agent identity filtering

      block of _handle_polled_messages() (~lines 5558-5587). Instrument all four

      decision points:

      1. Skip own-agent (self-origin block ~line 5566)

      2. Skip addressed-to-others (~line 5578-5581)

      3. Accept addressed-to-us (~line 5582-5584)

      4. Accept broadcast (~line 5585-5587)


      Each verbose_log() call should include the channel name, decision rationale,

      relevant parsed data (signature/addressees/our_names), and message preview.


      Verify syntax: python3 -c "import py_compile; py_compile.compile(''scripts/plan-orchestrator.py'',
      doraise=True)"

      Files: scripts/plan-orchestrator.py

      '
