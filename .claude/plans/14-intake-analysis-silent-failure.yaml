- id: '1'
  name: Expose failure reason from call_claude
  status: pending
  tasks:
  - id: '1.1'
    name: Add ClaudeResult NamedTuple and update call_claude return type
    agent: coder
    status: completed
    description: 'Implement the fix described in: .claude/plans/.claimed/14-intake-analysis-silent-failure.md

      Design doc: docs/plans/2026-03-26-14-intake-analysis-silent-failure-design.md

      In langgraph_pipeline/shared/claude_cli.py, add a ClaudeResult NamedTuple with
      fields (text: str, failure_reason: Optional[str]). Change call_claude() to return
      ClaudeResult instead of str. On success return ClaudeResult(text=..., failure_reason=None).
      On each failure path (TimeoutExpired, non-zero returncode, JSONDecodeError,
      OSError) set failure_reason to a descriptive string that includes the full stderr
      (not truncated to 200 chars) or the exception message. Update probe_quota_available()
      in langgraph_pipeline/shared/quota.py to use result.text. Update any other direct
      callers of call_claude() in the codebase that treat the return value as a plain
      string.

      '
    last_attempt: '2026-03-26T10:42:40.346290'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-26T10:49:53.044898'
    result_message: 'Added ClaudeResult NamedTuple to claude_cli.py with fields (text:
