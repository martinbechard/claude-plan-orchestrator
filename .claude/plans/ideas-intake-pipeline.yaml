meta:
  name: Ideas Intake Pipeline
  description: Add docs/ideas/ folder support to the LangGraph pipeline. Users drop
    raw notes there; the pipeline classifies and converts them into properly formatted
    backlog items, then moves originals to docs/ideas/processed/.
  source_item: docs/feature-backlog/ideas-intake-pipeline.md
  plan_doc: docs/plans/2026-03-24-ideas-intake-pipeline-design.md
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Core idea classifier module
  status: pending
  tasks:
  - id: '1.1'
    name: Add path constants and create idea_classifier module
    agent: coder
    status: completed
    description: "Implement the work item: docs/feature-backlog/ideas-intake-pipeline.md\n\
      Design reference: docs/plans/2026-03-24-ideas-intake-pipeline-design.md\n\n\
      Steps:\n1. In langgraph_pipeline/shared/paths.py, add after the BACKLOG_DIRS\
      \ block:\n   IDEAS_DIR = \"docs/ideas\"\n   IDEAS_PROCESSED_DIR = \"docs/ideas/processed\"\
      \n\n2. Create langgraph_pipeline/pipeline/nodes/idea_classifier.py with:\n \
      \  - Module docstring referencing the design doc\n   - Import subprocess, os,\
      \ logging, Path from standard library\n   - Import FEATURE_DIR, DEFECT_DIR,\
      \ IDEAS_DIR, IDEAS_PROCESSED_DIR from paths\n   - IDEA_INTAKE_TIMEOUT_SECONDS\
      \ = 300 constant\n   - IDEA_INTAKE_PROMPT template string with placeholders:\n\
      \     {idea_path}, {feature_dir}, {defect_dir}, {processed_dir}\n     The prompt\
      \ must instruct Claude to: read the raw idea, classify as feature/defect/multiple,\n\
      \     assess priority, write formatted backlog .md files with standard headers\n\
      \     (## Status: Open or ## Status: Needs Clarification, ## Priority:,\n  \
      \   ## Summary:, ## Scope:, ## Files Affected:), move the original to\n    \
      \ processed_dir, and git commit with message \"intake: classify idea <filename>\"\
      \n   - scan_ideas() -> list[str]: globs IDEAS_DIR for *.md, skips dotfiles,\n\
      \     skips empty files (os.path.getsize == 0), skips files whose basename\n\
      \     already exists in IDEAS_PROCESSED_DIR; returns empty list if IDEAS_DIR\
      \ absent\n   - classify_idea(idea_path: str, dry_run: bool = False) -> bool:\n\
      \     in dry_run mode logs and returns True; otherwise spawns subprocess.run(\n\
      \     [\"claude\", \"--dangerously-skip-permissions\", \"--print\", prompt])\n\
      \     with timeout=IDEA_INTAKE_TIMEOUT_SECONDS; on success verifies original\n\
      \     was moved to IDEAS_PROCESSED_DIR and returns True; returns False on\n\
      \     any failure\n   - process_ideas(dry_run: bool = False) -> int: calls scan_ideas(),\
      \ processes\n     each sequentially via classify_idea(), logs success/failure,\
      \ returns\n     count of successfully processed ideas\n\n3. Verify syntax:\n\
      \   python3 -c \"import py_compile; py_compile.compile('langgraph_pipeline/pipeline/nodes/idea_classifier.py',\
      \ doraise=True); print('syntax OK')\"\n\nFiles: langgraph_pipeline/shared/paths.py,\
      \ langgraph_pipeline/pipeline/nodes/idea_classifier.py\n"
    last_attempt: '2026-03-24T22:23:45.852765'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T22:25:13.250987'
    result_message: Added IDEAS_DIR and IDEAS_PROCESSED_DIR to paths.py; created idea_classifier.py
      with scan_ideas, classify_idea, and process_ideas functions. Syntax verified
      and committed.
    validation_attempts: 1
    validation_findings: All requirements met. Build OK. Syntax verified. Pre-existing
      test collection errors (test_auto_pipeline.py, test_completed_archive.py) are
      unrelated to this task — confirmed by stash test showing same failures before
      changes. paths.py has IDEAS_DIR and IDEAS_PROCESSED_DIR after BACKLOG_DIRS block.
      idea_classifier.py has all required constants, prompt template with all placeholders,
      scan_ideas/classify_idea/process_ideas with correct signatures and logic. File
      headers comply with CODING-RULES.md.
- id: phase-2
  name: Phase 2 - CLI integration
  status: pending
  tasks:
  - id: '2.1'
    name: Wire process_ideas into the CLI scan loop
    agent: coder
    status: completed
    depends_on:
    - '1.1'
    description: "Implement the work item: docs/feature-backlog/ideas-intake-pipeline.md\n\
      Design reference: docs/plans/2026-03-24-ideas-intake-pipeline-design.md\n\n\
      Steps:\n1. In langgraph_pipeline/cli.py:\n   a. Add import at the top with other\
      \ node imports:\n      from langgraph_pipeline.pipeline.nodes.idea_classifier\
      \ import process_ideas\n   b. In _run_scan_loop(), inside the `while not shutdown_event.is_set()`\
      \ loop,\n      AFTER the _post_pending_suspension_questions(slack) call and\
      \ BEFORE\n      the _pre_scan() call, add:\n\n      ideas_processed = process_ideas(dry_run)\n\
      \      if ideas_processed > 0:\n          logger.info(\"Ideas intake: processed\
      \ %d idea(s) into backlog\", ideas_processed)\n\n2. Verify syntax:\n   python3\
      \ -c \"import py_compile; py_compile.compile('langgraph_pipeline/cli.py', doraise=True);\
      \ print('syntax OK')\"\n\nFiles: langgraph_pipeline/cli.py\n"
    last_attempt: '2026-03-24T22:26:44.696719'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T22:27:32.947788'
    result_message: Added process_ideas import and call in _run_scan_loop() between
      _post_pending_suspension_questions and _pre_scan; syntax verified OK; committed.
    validation_attempts: 1
    validation_findings: Import and call correctly placed in _run_scan_loop(); build
      and syntax checks pass; 1429 tests pass; 3 pre-existing failures in test_plan_orchestrator.py
      and test_slack_notifier.py are unrelated to task 2.1 changes.
- id: phase-3
  name: Phase 3 - Unit tests
  status: pending
  tasks:
  - id: '3.1'
    name: Add unit tests for idea_classifier module
    agent: coder
    status: completed
    depends_on:
    - '1.1'
    description: "Implement the work item: docs/feature-backlog/ideas-intake-pipeline.md\n\
      Design reference: docs/plans/2026-03-24-ideas-intake-pipeline-design.md\n\n\
      Create tests/test_idea_classifier.py with tests for all three public functions.\n\
      \nFor scan_ideas():\n- test_scan_ideas_returns_md_files: tmp ideas dir with\
      \ two .md files -> both returned\n- test_scan_ideas_skips_empty_files: empty\
      \ .md file skipped, non-empty returned\n- test_scan_ideas_skips_already_processed:\
      \ file in processed/ subdir is skipped\n- test_scan_ideas_returns_empty_when_dir_missing:\
      \ non-existent IDEAS_DIR -> []\n- test_scan_ideas_skips_dotfiles: .hidden.md\
      \ skipped, normal.md returned\n\nFor classify_idea():\n- test_classify_idea_dry_run:\
      \ dry_run=True returns True without spawning subprocess\n- test_classify_idea_success:\
      \ monkeypatch subprocess.run to succeed and create processed\n  file; assert\
      \ returns True\n- test_classify_idea_subprocess_failure: subprocess returns\
      \ non-zero; assert returns False\n- test_classify_idea_file_not_moved: subprocess\
      \ succeeds but file not moved to processed/;\n  assert returns False\n\nFor\
      \ process_ideas():\n- test_process_ideas_no_ideas: monkeypatch scan_ideas to\
      \ []; assert returns 0\n- test_process_ideas_all_succeed: scan returns 2 paths,\
      \ classify returns True; assert returns 2\n- test_process_ideas_partial_failure:\
      \ scan returns 2, classify returns True then False;\n  assert returns 1\n\n\
      Use monkeypatch for IDEAS_DIR, IDEAS_PROCESSED_DIR, and subprocess.run.\n\n\
      Run tests and fix any failures:\n  ~/.pyenv/versions/3.11.*/bin/python -m pytest\
      \ tests/test_idea_classifier.py -v\n\nFiles: tests/test_idea_classifier.py\n"
    last_attempt: '2026-03-24T22:29:41.497292'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T22:30:56.883154'
    result_message: Created tests/test_idea_classifier.py with 12 tests covering all
      three public functions (scan_ideas, classify_idea, process_ideas). All 12 tests
      pass.
    validation_attempts: 1
    validation_findings: 'All 12 tests pass. Build clean. Minor: unused ''Path'' import
      at tests/test_idea_classifier.py:8. Pre-existing test collection errors in test_auto_pipeline.py
