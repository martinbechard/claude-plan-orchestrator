sections:
- id: phase-1
  name: Phase 1 - Fix executor routing and initial state
  status: pending
  tasks:
  - id: '1.1'
    name: Fix circuit_check and find_next_task to short-circuit on quota_exhausted
    agent: coder
    status: pending
    description: "Implement the work item: docs/feature-backlog/02-detect-claude-code-quota-exhaustion-and-pause-pipeline-processing.md\n\
      Design reference: docs/plans/2026-03-24-02-detect-claude-code-quota-exhaustion-and-pause-pipeline-processing-design.md\n\
      Fix the executor routing infinite loop described in Gap 1 of the design.\n\
      Files to modify:\n\
      - langgraph_pipeline/executor/edges.py: In circuit_check(), add a guard\n\
        before the consecutive_failures check: if state.get(\"quota_exhausted\"):\n\
        return ROUTE_CIRCUIT_BREAK\n\
      - langgraph_pipeline/executor/nodes/task_selector.py: In find_next_task(),\n\
        add a guard after loading plan_data but before circuit breaker check:\n\
        if state.get(\"quota_exhausted\"): return {\"plan_data\": plan_data, \"current_task_id\": None}\n\
      - langgraph_pipeline/cli.py: In _build_initial_state(), add\n\
        quota_exhausted: False to the state dict (after rate_limit_reset).\n\
      Verify syntax: python3 -c \"import py_compile;\
        py_compile.compile('langgraph_pipeline/executor/edges.py', doraise=True);\
        py_compile.compile('langgraph_pipeline/executor/nodes/task_selector.py', doraise=True);\
        py_compile.compile('langgraph_pipeline/cli.py', doraise=True)\"\n"
- id: phase-2
  name: Phase 2 - Unit tests
  status: pending
  tasks:
