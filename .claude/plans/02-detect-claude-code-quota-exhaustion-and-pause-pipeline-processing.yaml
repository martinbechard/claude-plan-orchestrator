    status: pending
    description: "Implement the work item: docs/feature-backlog/02-detect-claude-code-quota-exhaustion-and-pause-pipeline-processing.md\n\
      Design reference: docs/plans/2026-03-24-02-detect-claude-code-quota-exhaustion-and-pause-pipeline-processing-design.md\n\
      Add unit tests covering all gaps described in Gap 3 of the design.\n\
      Files to create/modify:\n\
      1. CREATE tests/langgraph/shared/test_quota.py with tests for\n\
         detect_quota_exhaustion and probe_quota_available as described in the design.\n\
      2. MODIFY tests/langgraph/executor/test_edges.py: add\n\
         test_quota_exhausted_routes_circuit_break in TestCircuitCheck.\n\
      3. MODIFY tests/langgraph/executor/nodes/test_task_selector.py: add\n\
         test_quota_exhausted_stops_task_selection.\n\
      4. MODIFY tests/langgraph/pipeline/test_edges.py: add\n\
         test_quota_exhausted_routes_end for is_defect.\n\
      Run and fix: ~/.pyenv/versions/3.11.*/bin/python -m pytest\n\
        tests/langgraph/shared/test_quota.py\n\
        tests/langgraph/executor/test_edges.py\n\
        tests/langgraph/executor/nodes/test_task_selector.py\n\
        tests/langgraph/pipeline/test_edges.py -v\n"
