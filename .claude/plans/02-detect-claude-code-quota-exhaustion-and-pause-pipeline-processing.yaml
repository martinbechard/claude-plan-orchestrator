  - id: '1.1'
    name: Fix circuit_check and find_next_task to short-circuit on quota_exhausted
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/02-detect-claude-code-quota-exhaustion-and-pause-pipeline-processing.md

      Design reference: docs/plans/2026-03-24-02-detect-claude-code-quota-exhaustion-and-pause-pipeline-processing-design.md

      Fix the executor routing infinite loop described in Gap 1 of the design.

      Files to modify:

      - langgraph_pipeline/executor/edges.py: In circuit_check(), add a guard

      before the consecutive_failures check: if state.get("quota_exhausted"):

      return ROUTE_CIRCUIT_BREAK

      - langgraph_pipeline/executor/nodes/task_selector.py: In find_next_task(),

      add a guard after loading plan_data but before circuit breaker check:

      if state.get("quota_exhausted"): return {"plan_data": plan_data, "current_task_id":
      None}

      - langgraph_pipeline/cli.py: In _build_initial_state(), add

      quota_exhausted: False to the state dict (after rate_limit_reset).

      Verify syntax: python3 -c "import py_compile;py_compile.compile(''langgraph_pipeline/executor/edges.py'',
      doraise=True);py_compile.compile(''langgraph_pipeline/executor/nodes/task_selector.py'',
      doraise=True);py_compile.compile(''langgraph_pipeline/cli.py'', doraise=True)"

      '
    last_attempt: '2026-03-24T11:55:25.256078'
    attempts: 1
