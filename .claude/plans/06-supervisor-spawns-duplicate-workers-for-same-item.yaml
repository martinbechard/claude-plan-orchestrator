meta:
  name: Supervisor Spawns Duplicate Workers for Same Item
  description: 'Fix RC-2: claim_item() silently succeeds when source == destination
    (already-claimed path), causing duplicate worker spawning. Add same-path guard,
    defensive scan filter for CLAIMED_DIR paths, and item-type sidecar for accurate
    unclaim restoration.

    '
  plan_doc: docs/plans/2026-03-25-06-supervisor-spawns-duplicate-workers-for-same-item-design.md
  source_item: .claude/plans/.claimed/06-supervisor-spawns-duplicate-workers-for-same-item.md
  created: '2026-03-25'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Fix Claim Guard and Scan Filter
  status: pending
  tasks:
  - id: '1.1'
    name: Fix claim_item same-path guard and add CLAIMED_DIR scan filter
    agent: coder
    status: completed
    description: "Implement the work item: .claude/plans/.claimed/06-supervisor-spawns-duplicate-workers-for-same-item.md\n\
      \nRead the design doc first: docs/plans/2026-03-25-06-supervisor-spawns-duplicate-workers-for-same-item-design.md\n\
      \nFix 1 and Fix 2 from the design doc:\n\nIn langgraph_pipeline/pipeline/nodes/scan.py:\n\
      - Add manifest constant CLAIM_META_SUFFIX = \".claim-meta.json\" near the other\
      \ constants.\n- Add optional item_type: str = \"feature\" parameter to claim_item().\n\
      - Before os.rename, guard: if os.path.abspath(item_path) == os.path.abspath(claimed_path),\
      \ return False.\n- In _scan_directory(), skip any md_file whose resolved parent\
      \ equals the resolved CLAIMED_DIR path.\n- In scan_backlog(), when processing\
      \ an in-progress plan's source_item, skip and log a warning\n  if the source_item\
      \ path resolves to inside CLAIMED_DIR (item already claimed, skip this plan).\n\
      \nIn langgraph_pipeline/supervisor.py:\n- In _try_dispatch_one(), pass item_type\
      \ to claim_item(): claim_item(item_path, item_type).\n\nThen run all tests and\
      \ fix any failures:\n  ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/langgraph/test_parallel_items.py\
      \ tests/langgraph/pipeline/nodes/test_scan.py -v\n  ~/.pyenv/versions/3.11.*/bin/python\
      \ -m pytest tests/ -v\n\nAdd new tests in tests/langgraph/test_parallel_items.py\
      \ (TestClaimItem class):\n- test_returns_false_when_item_already_in_claimed_dir:\
      \ call claim_item with a path already inside\n  claimed_dir (source == destination),\
      \ assert returns False and no rename error.\n- test_scan_directory_skips_claimed_dir_files:\
      \ monkeypatch CLAIMED_DIR so it matches a subdir,\n  place an md file inside\
      \ it, call _scan_directory on that dir, assert it returns no items.\n\nGit commit:\n\
      \  git add langgraph_pipeline/pipeline/nodes/scan.py langgraph_pipeline/supervisor.py\
      \ tests/langgraph/test_parallel_items.py\n  git commit -m 'fix: guard claim_item\
      \ against same-path rename and filter CLAIMED_DIR from scan'\n\nFiles: langgraph_pipeline/pipeline/nodes/scan.py,\
      \ langgraph_pipeline/supervisor.py,\n       tests/langgraph/test_parallel_items.py\n"
    last_attempt: '2026-03-25T00:29:48.141580'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-25T00:32:47.782312'
    result_message: Added CLAIM_META_SUFFIX constant, same-path guard in claim_item(),
      CLAIMED_DIR filter in _scan_directory(), source_item CLAIMED_DIR guard in scan_backlog(),
      item_type forwarding in _try_dispatch_one(). Added 2 new tests. All 67 targeted
      tests pass.
- id: phase-2
  name: Phase 2 - Item Type Sidecar for Accurate Unclaim
  status: pending
  tasks:
  - id: '2.1'
    name: Add item-type sidecar to claim/unclaim for correct type restoration
    agent: coder
    status: pending
    depends_on:
    - '1.1'
    description: "Implement Fix 3 from the design doc:\n  docs/plans/2026-03-25-06-supervisor-spawns-duplicate-workers-for-same-item-design.md\n\
      \nRead the work item for context: .claude/plans/.claimed/06-supervisor-spawns-duplicate-workers-for-same-item.md\n\
      \nIn langgraph_pipeline/pipeline/nodes/scan.py:\n- In claim_item(), after a\
      \ successful os.rename, write a sidecar file:\n    sidecar_path = os.path.join(CLAIMED_DIR,\
      \ basename + CLAIM_META_SUFFIX)\n    import json (if not already imported at\
      \ module level)\n    with open(sidecar_path, \"w\") as f: json.dump({\"item_type\"\
      : item_type}, f)\n- In unclaim_item(), after a successful os.rename, delete\
      \ the sidecar (best-effort):\n    sidecar = os.path.join(os.path.dirname(claimed_path),\
      \ os.path.basename(claimed_path) + CLAIM_META_SUFFIX)\n    try: os.remove(sidecar)\n\
      \    except FileNotFoundError: pass\n\nIn langgraph_pipeline/supervisor.py:\n\
      - Import CLAIM_META_SUFFIX from langgraph_pipeline.pipeline.nodes.scan.\n- In\
      \ _unclaim_orphaned_items(), before calling unclaim_item, try to read the sidecar:\n\
      \    sidecar_path = md_file.parent / (md_file.name + CLAIM_META_SUFFIX)\n  \
      \  If sidecar exists: read item_type from it, then unlink sidecar.\n    Else:\
      \ fall back to the existing slug-heuristic (keep existing if/elif/else).\n \
      \   Use the resolved item_type for the unclaim_item call.\n\nThen run all tests\
      \ and fix any failures:\n  ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/langgraph/test_parallel_items.py\
      \ -v\n  ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/ -v\n\nAdd new tests\
      \ in tests/langgraph/test_parallel_items.py:\n- TestClaimItem.test_writes_claim_meta_sidecar:\
      \ after claim_item(path, \"defect\"), assert\n  sidecar file exists in claimed_dir\
      \ with content {\"item_type\": \"defect\"}.\n- TestClaimItem.test_no_sidecar_on_same_path_claim:\
      \ call claim_item with same-path (already\n  claimed), assert no sidecar written\
      \ and False returned.\n- TestUnclaimItem.test_removes_sidecar_on_unclaim: create\
      \ claimed file and sidecar, call\n  unclaim_item, assert sidecar is deleted.\n\
      - Add a TestUnclaimOrphanedItems class in test_parallel_items.py:\n  - test_uses_sidecar_for_item_type_when_present:\
      \ create orphan md + sidecar with item_type defect,\n    call _unclaim_orphaned_items,\
      \ assert file moved to defect backlog dir.\n  - test_falls_back_to_heuristic_when_no_sidecar:\
      \ create orphan md with no sidecar, call\n    _unclaim_orphaned_items, assert\
      \ item ends up in feature backlog dir (heuristic default).\n\nGit commit:\n\
      \  git add langgraph_pipeline/pipeline/nodes/scan.py langgraph_pipeline/supervisor.py\
      \ tests/langgraph/test_parallel_items.py\n  git commit -m 'fix: write item-type\
      \ sidecar at claim time for accurate orphan restoration'\n\nFiles: langgraph_pipeline/pipeline/nodes/scan.py,\
      \ langgraph_pipeline/supervisor.py,\n       tests/langgraph/test_parallel_items.py\n"
- id: phase-3
  name: Phase 3 - Plugin Version Bump
  status: pending
  tasks:
  - id: '3.1'
    name: Bump plugin version and update release notes
    agent: coder
    status: pending
    depends_on:
    - '2.1'
    description: "Read plugin.json to get the current version, then bump the patch\
      \ version.\nRead RELEASE-NOTES.md and add a new entry at the top for the new\
      \ version with:\n  - Fix: prevent duplicate worker spawning when source equals\
      \ claimed path in claim_item()\n  - Fix: filter CLAIMED_DIR paths from scan_backlog\
      \ to prevent re-claiming in-progress items\n  - Fix: write item-type sidecar\
      \ at claim time so orphan unclaim restores to the correct backlog directory\n\
      \nGit commit:\n  git add plugin.json RELEASE-NOTES.md\n  git commit -m 'chore:\
      \ bump version for duplicate-worker fix'\n\nFiles: plugin.json, RELEASE-NOTES.md\n"
