meta:
  name: Embedded Web Server Infrastructure
  description: Add an optional FastAPI+uvicorn embedded HTTP server to the supervisor
    with health endpoint, Jinja2 base layout, static file serving, and CLI/config
    integration. Acts as mount point for future UI features (14-16).
  source_item: .claude/plans/.claimed/13-embedded-web-server-infrastructure.md
  plan_doc: docs/plans/2026-03-25-13-embedded-web-server-infrastructure-design.md
  created: '2026-03-25'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
      - coder
    validators:
      - validator
    max_validation_attempts: 2

sections:
  - id: phase-1
    name: Phase 1 - Web Server Module
    status: pending
    tasks:
      - id: '1.1'
        name: Create web package and server module
        agent: coder
        status: pending
        description: "Implement the work item: .claude/plans/.claimed/13-embedded-web-server-infrastructure.md\n\
          Design reference: docs/plans/2026-03-25-13-embedded-web-server-infrastructure-design.md\n\
          This task creates the web server package and server module.\n\
          Files to create:\n\
          - langgraph_pipeline/web/__init__.py (empty package marker)\n\
          - langgraph_pipeline/web/server.py with:\n\
          \  - WEB_SERVER_DEFAULT_PORT = 7070 constant\n\
          \  - create_app() -> FastAPI: builds and returns the FastAPI app with all routes\n\
          \  - start_web_server(port) -> None: starts uvicorn in a daemon thread; gracefully\n\
          \    degrades with a logged warning if fastapi/uvicorn are not installed\n\
          \  - stop_web_server() -> None: signals the uvicorn server to stop cleanly\n\
          Endpoints per spec: GET / (redirect to /dashboard), GET /health (JSON status),\n\
          static files mounted at /static from langgraph_pipeline/web/static/.\n\
          Verify syntax: python3 -c \"import py_compile; py_compile.compile('langgraph_pipeline/web/server.py', doraise=True)\"\n"

  - id: phase-2
    name: Phase 2 - Templates and Static Assets
    status: pending
    tasks:
      - id: '2.1'
        name: Create base HTML template and CSS
        agent: coder
        status: pending
        depends_on:
          - '1.1'
        description: "Implement the work item: .claude/plans/.claimed/13-embedded-web-server-infrastructure.md\n\
          Design reference: docs/plans/2026-03-25-13-embedded-web-server-infrastructure-design.md\n\
          This task creates the frontend assets (no build step required).\n\
          Files to create:\n\
          - langgraph_pipeline/web/templates/base.html: minimal Jinja2 HTML5 shell with\n\
          \  a nav bar linking Dashboard, Proxy Traces, Cost Analysis. Template blocks:\n\
          \  title, content, extra_head so future features can extend it.\n\
          - langgraph_pipeline/web/static/style.css: minimal CSS reset + nav bar styles.\n\
          No JavaScript frameworks, no bundlers -- plain CSS only.\n"

  - id: phase-3
    name: Phase 3 - CLI and Supervisor Integration
    status: pending
    tasks:
      - id: '3.1'
        name: Add --web and --web-port CLI args
        agent: coder
        status: pending
        depends_on:
          - '2.1'
        description: "Implement the work item: .claude/plans/.claimed/13-embedded-web-server-infrastructure.md\n\
          Design reference: docs/plans/2026-03-25-13-embedded-web-server-infrastructure-design.md\n\
          This task wires the web server into the CLI entry point.\n\
          Changes to langgraph_pipeline/cli.py:\n\
          - Add --web flag (store_true) to _build_arg_parser()\n\
          - Add --web-port PORT argument (int, default WEB_SERVER_DEFAULT_PORT)\n\
          - Read web.enabled / web.port from orchestrator config as fallback\n\
          - CLI flags take precedence over config values\n\
          - Pass web_enabled and web_port through _run_scan_loop() to run_supervisor_loop()\n\
          - Update _log_startup_banner() to show web server status\n\
          Changes to .claude/orchestrator-config.yaml:\n\
          - Add a commented-out web: section documenting enabled and port keys\n\
          Verify syntax: python3 -c \"import py_compile; py_compile.compile('langgraph_pipeline/cli.py', doraise=True)\"\n"

      - id: '3.2'
        name: Integrate web server lifecycle into supervisor
        agent: coder
        status: pending
        depends_on:
          - '3.1'
        description: "Implement the work item: .claude/plans/.claimed/13-embedded-web-server-infrastructure.md\n\
          Design reference: docs/plans/2026-03-25-13-embedded-web-server-infrastructure-design.md\n\
          This task wires start/stop into the supervisor dispatch loop.\n\
          Changes to langgraph_pipeline/supervisor.py:\n\
          - Add web_enabled: bool = False and web_port: int = WEB_SERVER_DEFAULT_PORT\n\
          \  optional parameters to run_supervisor_loop()\n\
          - When web_enabled is True, call start_web_server(web_port) before the\n\
          \  dispatch loop begins\n\
          - Call stop_web_server() in the finally block (after shutdown_event fires)\n\
          - Import start_web_server and stop_web_server from langgraph_pipeline.web.server\n\
          Verify syntax: python3 -c \"import py_compile; py_compile.compile('langgraph_pipeline/supervisor.py', doraise=True)\"\n"

  - id: phase-4
    name: Phase 4 - Unit Tests
    status: pending
    tasks:
      - id: '4.1'
        name: Add unit tests for web server module
        agent: coder
        status: pending
        depends_on:
          - '3.2'
        description: "Implement the work item: .claude/plans/.claimed/13-embedded-web-server-infrastructure.md\n\
          Design reference: docs/plans/2026-03-25-13-embedded-web-server-infrastructure-design.md\n\
          Create tests/langgraph/web/test_server.py with TestClient-based tests:\n\
          - test_create_app_returns_fastapi_instance: create_app() returns a FastAPI object\n\
          - test_health_endpoint_returns_ok: GET /health returns 200 with status=ok JSON\n\
          - test_root_redirects_to_dashboard: GET / returns redirect to /dashboard\n\
          - test_graceful_degradation_no_fastapi: mock ImportError for fastapi; verify\n\
          \  start_web_server() logs a warning and returns without raising\n\
          Run tests: python3 -m pytest tests/langgraph/web/ -v\n\
          Fix any failures before marking complete.\n"
