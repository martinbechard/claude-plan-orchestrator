meta:
  name: UX Designer Opus/Sonnet Loop with Slack Suspension (Part 2 wiring)
  description: Wire the existing suspension infrastructure into the pipeline. Part
    1 (Opus/Sonnet loop in ux-designer/ux-implementer agents) is already complete.
    This plan connects the "suspended" task status to marker creation, Slack posting,
    and reinstatement with answer injection.
  source_item: docs/feature-backlog/10-ux-designer-opus-sonnet-loop-with-slack-suspension.md
  plan_doc: docs/plans/2026-03-24-10-ux-designer-opus-sonnet-loop-with-slack-suspension-design.md
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Suspension Marker Creation in task_runner
  status: pending
  tasks:
  - id: '1.1'
    name: Create suspension marker when task is suspended
    agent: coder
    status: completed
    description: "Implement the work item: docs/feature-backlog/10-ux-designer-opus-sonnet-loop-with-slack-suspension.md\n\
      Design reference: docs/plans/2026-03-24-10-ux-designer-opus-sonnet-loop-with-slack-suspension-design.md\n\
      This task wires suspension marker creation into task_runner.py.\nFile: langgraph_pipeline/executor/nodes/task_runner.py\n\
      Steps:\n1. Import create_suspension_marker from langgraph_pipeline.shared.suspension\n\
      2. In the block that handles outcome == _STATUS_SUSPENDED (around line 516),\
      \ after task[status] = suspended, add:\n   - Read question = status_dict.get(question,\
      \ empty)\n   - Read question_context = status_dict.get(question_context, empty)\n\
      \   - Read source_item = plan_data.get(meta, {}).get(source_item, empty) if\
      \ plan_data else empty\n   - Derive slug = Path(source_item).stem if source_item\
      \ else empty\n   - Derive item_type from source_item (defect if defect in source_item.lower()\
      \ else feature)\n   - If slug and question, call create_suspension_marker(slug,\
      \ item_type, source_item, plan_path, task_id, question, question_context)\n\
      \   - Log the marker creation\n3. Verify build: python -m py_compile langgraph_pipeline/executor/nodes/task_runner.py\n"
    last_attempt: '2026-03-24T20:22:55.749976'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T20:24:21.130099'
    result_message: 'Added suspension marker creation in task_runner.py: imports Path
      and create_suspension_marker, extracts question/question_context/source_item
      from status_dict/plan_data, derives slug and item_type, calls create_suspension_marker()
      when slug and question are both non-empty, logs the marker path.'
    validation_attempts: 1
    validation_findings: 'All requirements satisfied: Path and create_suspension_marker
      imported, suspension block in task_runner.py correctly extracts question/question_context/source_item,
      derives slug and item_type, calls create_suspension_marker when slug and question
      are non-empty, and logs the marker path. Build and syntax checks pass. Pre-existing
      test collection errors in test_auto_pipeline.py and test_completed_archive.py
      are unrelated to this task.'
- id: phase-2
  name: Phase 2 - Slack Posting and Reinstatement in cli.py
  status: pending
  tasks:
  - id: '2.1'
    name: Add suspension helper functions to cli.py
    agent: coder
    status: completed
    depends_on:
    - '1.1'
    description: 'Implement the work item: docs/feature-backlog/10-ux-designer-opus-sonnet-loop-with-slack-suspension.md

      Design reference: docs/plans/2026-03-24-10-ux-designer-opus-sonnet-loop-with-slack-suspension-design.md

      This task adds two helper functions to cli.py and calls them in the scan loop.

      File: langgraph_pipeline/cli.py

      Steps:

      1. Add imports: glob, json from stdlib; SUSPENDED_DIR, clear_suspension_marker
      from langgraph_pipeline.shared.suspension.

      2. Add constant: SUSPENDED_GLOB pattern for scanning suspended dir.

      3. Add function _post_pending_suspension_questions(slack) that scans for markers
      without slack_thread_ts and calls slack.post_suspension_question() then updates
      the marker with thread_ts. To get channel_id, expose get_channel_for_type(item_type)
      on SlackNotifier in slack/__init__.py.

      4. Add function _reinstate_answered_suspensions() that scans for markers with
      non-empty answer field, resets task status to pending in the YAML, writes human_answer
      and human_question fields onto the task dict, saves the YAML, and deletes the
      marker.

      5. In _run_scan_loop(), at the top of the while loop before _pre_scan(), call
      both helpers.

      6. Verify build: python -m py_compile langgraph_pipeline/cli.py

      '
    last_attempt: '2026-03-24T20:25:39.520540'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T20:29:25.452505'
    result_message: Added _post_pending_suspension_questions(slack) and _reinstate_answered_suspensions()
      to cli.py. Both called at top of _run_scan_loop() while loop before _pre_scan().
      Added glob/json/yaml imports, SUSPENDED_GLOB constant, and SUSPENDED_DIR/clear_suspension_marker
      imports. Build verified with py_compile.
- id: phase-3
  name: Phase 3 - ux-designer Agent Resumption Logic
  status: pending
  tasks:
  - id: '3.1'
    name: Update ux-designer agent to handle human_answer on resumption
    agent: coder
    status: pending
    depends_on:
    - '2.1'
    description: 'Implement the work item: docs/feature-backlog/10-ux-designer-opus-sonnet-loop-with-slack-suspension.md

      Design reference: docs/plans/2026-03-24-10-ux-designer-opus-sonnet-loop-with-slack-suspension-design.md

      This task updates the ux-designer agent to handle resumption when a human answer
      has been injected. File: .claude/agents/ux-designer.md

      Steps:

      1. In Step 1 (Analyze and Brief), before generating the design brief, add a
      check for human_answer in the current task data. If present, pre-populate Q&A
      history with: Q1: <human_question> / A1: <human_answer> [provided by human via
      Slack].

      2. Add a Resumption from Suspension section documenting the behavior: treat
      human_answer as a resolved question, include it in Q&A history from the start,
      do not re-raise the same question to Sonnet.

      3. Commit the updated file.

      '
- id: phase-4
  name: Phase 4 - Unit Tests
  status: pending
  tasks:
  - id: '4.1'
    name: Add unit tests for suspension wiring
    agent: coder
    status: pending
    depends_on:
    - '2.1'
    description: 'Implement the work item: docs/feature-backlog/10-ux-designer-opus-sonnet-loop-with-slack-suspension.md

      Design reference: docs/plans/2026-03-24-10-ux-designer-opus-sonnet-loop-with-slack-suspension-design.md

      This task adds unit tests. File: tests/langgraph/test_suspension_wiring.py (new
      file).

      Tests for _reinstate_answered_suspensions(): test that answered markers reset
      the task to pending with human_answer/human_question fields and delete the marker;
      test that unanswered markers are skipped; test that missing plan or task_id
      does not crash.

      Tests for _post_pending_suspension_questions(): test that markers without thread_ts
      trigger slack.post_suspension_question and update the marker; test that markers
      with existing thread_ts are skipped; test that slack=None skips posting.

      Tests for task_runner marker creation: mock status_dict with suspended status,
      question, question_context, and plan_data with source_item, verify create_suspension_marker
      called with correct args.

      Run: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/langgraph/ -v and fix
      any failures.

      '
