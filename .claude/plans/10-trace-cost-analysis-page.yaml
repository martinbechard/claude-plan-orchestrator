      '
  - id: '2.2'
    name: Replace analysis.html template with trace-based cost page
    agent: frontend-coder
    status: pending
    description: 'Implement the work item: .claude/plans/.claimed/10-trace-cost-analysis-page.md


      Design doc: docs/plans/2026-03-26-10-trace-cost-analysis-page-design.md


      Replace langgraph_pipeline/web/templates/analysis.html. The new template

      extends base.html and renders: (1) summary cards row (total cost all-time,

      today, this week, most expensive slug), (2) SVG cost-over-time bar chart,

      (3) sortable/filterable paginated top-runs table with columns: slug, node

      name, model, exclusive cost, inclusive cost, tokens in/out, duration,

      timestamp, (4) cost-by-work-item aggregated table, (5) cost-by-node-type

      bar chart and table. Include filter form (slug text input, item_type select,

      date_from/date_to inputs, sort select) consistent with completions.html style.

      Show a clear note that tool calls carry no direct cost.

      '
