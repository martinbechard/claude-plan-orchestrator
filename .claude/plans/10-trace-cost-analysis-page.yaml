    agent: coder
    status: pending
    description: 'Implement the work item: .claude/plans/.claimed/10-trace-cost-analysis-page.md


      Design doc: docs/plans/2026-03-26-10-trace-cost-analysis-page-design.md


      Replace langgraph_pipeline/web/routes/analysis.py entirely. The new route

