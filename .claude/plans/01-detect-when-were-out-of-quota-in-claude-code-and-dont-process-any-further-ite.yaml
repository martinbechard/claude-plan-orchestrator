meta:
  name: 'Feature: Graceful quota-exhaustion handling'
  description: Detect Claude Code quota exhaustion and put the pipeline into a probe-based
    idle mode. Blocks new intake, resets the in-flight task to pending, routes to
    END (skipping archive), and auto-resumes when the LLM becomes available again.
  plan_doc: docs/plans/2026-03-24-01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite-design.md
  source_item: docs/feature-backlog/01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite.md
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
  status: pending
sections:
- id: phase-1
  name: Phase 1 - Quota module and state extension
  status: pending
  tasks:
  - id: '1.1'
    name: Create quota.py module and extend TaskState and PipelineState
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite.md
      Design doc: docs/plans/2026-03-24-01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite-design.md

      Create langgraph_pipeline/shared/quota.py with: - QUOTA_PROBE_INTERVAL_SECONDS
      = 300 constant - QUOTA_PROBE_PROMPT constant (minimal prompt like ''Reply with
      only the word OK'') - detect_quota_exhaustion(output: str) -> bool: returns
      True when check_rate_limit(output) returns (True, None) meaning rate limited
      with no parseable reset time - probe_quota_available() -> bool: calls call_claude(QUOTA_PROBE_PROMPT,
      timeout=30) and returns True if non-empty response

      Add quota_exhausted: bool field to TaskState in langgraph_pipeline/executor/state.py.
      Add quota_exhausted: bool field to PipelineState in langgraph_pipeline/pipeline/state.py.

      Run pytest to verify no regressions.'
    last_attempt: '2026-03-24T01:19:06.494724'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T01:20:38.929426'
    result_message: 'Created langgraph_pipeline/shared/quota.py with detect_quota_exhaustion()
      and probe_quota_available(). Added quota_exhausted: bool to TaskState and PipelineState.
      No new test regressions.'
- id: phase-2
  name: Phase 2 - Detection, propagation, and routing
  status: pending
  tasks:
  - id: '2.1'
    name: Detect quota exhaustion in task_runner, propagate via execute_plan, route
      in edges
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite.md
      Design doc: docs/plans/2026-03-24-01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite-design.md

      In langgraph_pipeline/executor/nodes/task_runner.py, after _run_claude() returns:
      - Call detect_quota_exhaustion(_stdout + _stderr) - If True: reset task[''status'']
      back to ''pending'' in plan_data, save plan YAML, and return {quota_exhausted:
      True, plan_data: plan_data} without incrementing failure counters or committing

      In langgraph_pipeline/pipeline/nodes/execute_plan.py: - Map final_task_state.get(''quota_exhausted'',
      False) into the returned state dict

      In langgraph_pipeline/pipeline/edges.py, modify is_defect() to check quota_exhausted
      first: if state.get(''quota_exhausted'') is True return END (import END from
      langgraph.graph).

      Run pytest to verify no regressions.'
- id: phase-3
  name: Phase 3 - CLI probe loop
  status: pending
  tasks:
  - id: '3.1'
    name: Add quota probe idle loop to cli.py
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite.md
      Design doc: docs/plans/2026-03-24-01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite-design.md

      In langgraph_pipeline/cli.py: - Add _run_quota_probe_loop(shutdown_event: threading.Event,
      slack: Optional[SlackNotifier]) -> None that logs a warning, sends a Slack notification
      if enabled, then loops calling shutdown_event.wait(QUOTA_PROBE_INTERVAL_SECONDS)
      then probe_quota_available(). Breaks on successful probe or shutdown. Logs and
      optionally sends Slack notification on resume. - In _run_scan_loop(): after
      graph.invoke() returns, if final_state.get(''quota_exhausted'') is True call
      _run_quota_probe_loop(shutdown_event, slack) before next iteration. - In _run_once():
      after graph.invoke() returns, if final_state.get(''quota_exhausted'') log a
      warning and return EXIT_CODE_CLEAN (item stays in backlog). - In _run_single_item():
      same -- log warning and return EXIT_CODE_CLEAN. - Thread slack through to _run_quota_probe_loop;
      update _run_scan_loop signature to accept slack: Optional[SlackNotifier].

      Run pytest to verify no regressions.'
- id: phase-4
  name: Phase 4 - Tests
  status: pending
  tasks:
  - id: '4.1'
    name: Write unit tests for quota module and integration points
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite.md
      Design doc: docs/plans/2026-03-24-01-detect-when-were-out-of-quota-in-claude-code-and-dont-process-any-further-ite-design.md

      Create tests/langgraph/shared/test_quota.py covering: - detect_quota_exhaustion()
      returns True for rate-limit output with no reset time - detect_quota_exhaustion()
      returns False for output with a parseable reset time - detect_quota_exhaustion()
      returns False for unrelated output - probe_quota_available() returns True when
      call_claude returns non-empty string - probe_quota_available() returns False
      when call_claude returns empty string

      Add tests to tests/langgraph/executor/test_task_runner.py (or create if missing)
      covering execute_task returning quota_exhausted=True and task reset to pending
      when Claude output triggers detect_quota_exhaustion.

      Add tests to tests/langgraph/test_cli.py (or create if missing) covering _run_quota_probe_loop
      exiting on successful probe, and _run_scan_loop calling _run_quota_probe_loop
      when quota_exhausted is True in final_state.

      Run pytest to verify all tests pass.'
