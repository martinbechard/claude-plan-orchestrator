- id: '1'
  name: Backend token counts in DashboardState and proxy
  status: pending
  tasks:
  - id: '1.1'
    name: Extend WorkerInfo and DashboardState with token fields
    agent: coder
    status: completed
    description: 'Implement the work item: .claude/plans/.claimed/16-worker-velocity-tracking.md
      -- Read the design doc at docs/plans/2026-03-26-16-worker-velocity-tracking-design.md
      for full details. In langgraph_pipeline/web/dashboard_state.py: (1) add tokens_in:
      int = 0 and tokens_out: int = 0 fields to WorkerInfo; (2) add update_worker_tokens(pid,
      tokens_in, tokens_out) method mirroring update_worker_run_id; (3) extend snapshot()
      to compute tokens_per_minute per active worker (elapsed_min = max(elapsed_s/60,
      0.001); tpm = (tokens_in + tokens_out) / elapsed_min, set 0.0 when both token
      fields are 0) and include tokens_in, tokens_out, tokens_per_minute in each active_workers
      entry. Run the full test suite and fix any failures.'
    last_attempt: '2026-03-26T15:01:06.275427'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-26T15:03:00.736374'
    result_message: Added tokens_in/tokens_out fields to WorkerInfo, update_worker_tokens()
      method to DashboardState, and tokens_per_minute computation (with 0.0 when both
      token fields are 0) in snapshot(). All 1563 tests pass.
    validation_attempts: 1
    validation_findings: 'PASS: All good'
  - id: '1.2'
    name: Add get_worker_token_counts and extend completions in proxy
    agent: coder
    status: completed
    description: 'Implement the work item: .claude/plans/.claimed/16-worker-velocity-tracking.md
      -- Read the design doc at docs/plans/2026-03-26-16-worker-velocity-tracking-design.md
      for full details. In langgraph_pipeline/web/proxy.py: (1) add ALTER TABLE migration
      in _init_db() for completions.tokens_per_minute REAL NOT NULL DEFAULT 0.0 with
      OperationalError guard; (2) add get_worker_token_counts(run_id) using a recursive
      CTE to sum input_tokens and output_tokens from metadata_json across all traces
      in the run subtree, returning a tuple (int, int); (3) add optional tokens_per_minute:
      float = 0.0 param to record_completion() and persist it; (4) include tokens_per_minute
      in the SELECT of list_completions() and list_completions_by_slug() return dicts.
      Run the full test suite and fix any failures.'
    last_attempt: '2026-03-26T15:04:51.264044'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-26T15:06:57.796571'
    result_message: Added get_worker_token_counts(run_id) with recursive CTE, ALTER
      TABLE migration for tokens_per_minute with OperationalError guard, extended
      record_completion() with optional tokens_per_minute param, and included tokens_per_minute
      in list_completions() and list_completions_by_slug() SELECTs. All 1295 tests
      pass.
    validation_attempts: 1
    validation_findings: 'All 4 requirements verified: ALTER TABLE migration with
      OperationalError guard (lines 69-71, 260-263), get_worker_token_counts with
      recursive CTE returning tuple[int,int] (lines 115-131, 639-660), optional tokens_per_minute
      param in record_completion (line 442), tokens_per_minute in SELECT of list_completions
      and list_completions_by_slug (lines 500, 600). Build compiles cleanly. All 1295
      tests pass. No placeholder or test-data leaks found.'
- id: '2'
  name: Backend supervisor token refresh and velocity on reap
  status: pending
  tasks:
  - id: '2.1'
    name: Refresh token counts each poll cycle and record final velocity
    agent: coder
    status: completed
    description: 'Implement the work item: .claude/plans/.claimed/16-worker-velocity-tracking.md
      -- Read the design doc at docs/plans/2026-03-26-16-worker-velocity-tracking-design.md
      for full details. In langgraph_pipeline/supervisor.py: (1) add _refresh_worker_token_counts(
      active_workers) that iterates active workers with a known run_id, calls proxy.get_worker_token_counts(run_id),
      and calls dashboard.update_worker_tokens(pid, tokens_in, tokens_out); call it
      each poll iteration after _refresh_worker_run_ids(); (2) in _reap_one_worker()
      compute final velocity from the WorkerInfo token fields and pass tokens_per_minute
      to proxy.record_completion(). Run the full test suite and fix any failures.'
    last_attempt: '2026-03-26T15:09:21.444164'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-26T15:12:07.136634'
    result_message: Added _refresh_worker_token_counts() called each poll cycle after
      _refresh_worker_run_ids(), and _compute_final_velocity() helper. Final velocity
      is now passed to proxy.record_completion() in all reap paths. All 1295 tests
      pass.
    validation_attempts: 1
    validation_findings: All requirements met. _refresh_worker_token_counts() added
      and called after _refresh_worker_run_ids() each poll cycle. _compute_final_velocity()
      computes final velocity from WorkerInfo token fields. All three record_completion()
      call sites pass tokens_per_minute. All 1295 tests pass.
