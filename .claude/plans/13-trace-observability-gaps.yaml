- id: '1'
  name: Subprocess exit code and invocation metadata
  status: pending
  tasks:
  - id: '1.1'
    name: Add subprocess_exit_code, failure_reason, claude_invoked to execute_task
      traces
    agent: coder
    status: completed
    description: 'Implement Gaps 1 and 5 from: .claude/plans/.claimed/13-trace-observability-gaps.md


      Design doc: docs/plans/2026-03-26-13-trace-observability-gaps-design.md


      Modify task_runner.py: extend _run_claude() to return returncode (int) as the
      second element of its 6-tuple (after success). Return process.returncode on
      normal exit, -1 on TimeoutExpired, -2 on Exception. Compute failure_reason from
      returncode ("ok", "timeout", or "exit_code_N"). Add subprocess_exit_code, subprocess_error
      (first 500 chars of stderr, empty on success), failure_reason, and claude_invoked=True
      to the add_trace_metadata call. For early-exit paths (task_id is None, task/section
      not found, quota exhausted reset), call add_trace_metadata with claude_invoked=False
      and an appropriate skip_reason before returning. Run the full test suite after
      changes.

      '
    last_attempt: '2026-03-26T12:18:21.729446'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-26T12:22:54.818884'
    result_message: 'PASS: All good'
    validation_attempts: 1
    validation_findings: 'All requirements met: _run_claude returns 6-tuple with returncode,
      early-exit paths call add_trace_metadata with claude_invoked=False, normal execution
      includes subprocess_exit_code/failure_reason/claude_invoked=True. Build passes,
      all 1551 tests pass.'
