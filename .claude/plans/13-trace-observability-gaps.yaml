      found) with completed_count and total_count.


      Modify execute_plan.py: before invoking the executor subgraph, read the plan
      YAML and add plan_tasks (list of {task_id, description, status}), completed_count,
      and total_count to add_trace_metadata. After the subgraph returns, if plan_data
      is available in final_task_state, add a second snapshot with the final task
      statuses. Run the full test suite after changes.

      '
