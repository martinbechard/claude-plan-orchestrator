  - id: '3.1'
    name: Add stop-decision trace in find_next_task and plan snapshot in execute_plan
    agent: coder
    status: pending
    description: 'Implement Gaps 3 and 4 from: .claude/plans/.claimed/13-trace-observability-gaps.md


      Design doc: docs/plans/2026-03-26-13-trace-observability-gaps-design.md


      Modify task_selector.py: when find_next_task returns current_task_id=None for
      any reason, call add_trace_metadata with decision="stop", reason (one of: "quota_exhausted",
