meta:
  name: 'Defect Fix: Backlog Slug Pattern Too Strict — Silently Ignores Items'
  description: Relax BACKLOG_SLUG_PATTERN in scan.py from r"^\d{2,}-[\w-]+$" to r"^[\w][\w-]*$"
    so that single-digit prefixes (9-foo.md) and prose slugs (cost-analysis.md) are
    accepted. Add a logging.warning for .md files that still fail the relaxed check,
    replacing silent ignoring with a visible signal. Update tests to match the new
    behavior.
  plan_doc: docs/plans/2026-03-24-03-backlog-slug-pattern-too-strict-silently-ignores-items-design.md
  source_item: docs/defect-backlog/03-backlog-slug-pattern-too-strict-silently-ignores-items.md
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
