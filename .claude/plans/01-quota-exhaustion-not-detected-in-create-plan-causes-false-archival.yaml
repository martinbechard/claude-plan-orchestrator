meta:
  name: 'Defect Fix: Quota Exhaustion Not Detected in create_plan Causes False Archival'
  description: 'Add detect_quota_exhaustion() checks to intake_analyze and create_plan
    nodes so quota exhaustion detected during plan creation routes to END instead
    of flowing forward and falsely archiving backlog items with no work done.

    '
  plan_doc: docs/plans/2026-03-24-01-quota-exhaustion-not-detected-in-create-plan-causes-false-archival-design.md
  source_item: docs/defect-backlog/01-quota-exhaustion-not-detected-in-create-plan-causes-false-archival.md
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Add Quota Detection to Nodes
  status: pending
  tasks:
  - id: '1.1'
    name: Add quota detection to intake_analyze node
    agent: coder
    status: completed
    description: "Implement the work item: docs/defect-backlog/01-quota-exhaustion-not-detected-in-create-plan-causes-false-archival.md\n\
      \nFocus on langgraph_pipeline/pipeline/nodes/intake.py:\n- Import detect_quota_exhaustion\
      \ from langgraph_pipeline.shared.quota\n- In intake_analyze(), after each _invoke_claude()\
      \ call that produces output,\n  call detect_quota_exhaustion() on the result\
      \ and return {\"quota_exhausted\": True}\n  immediately if detected (before\
      \ any state updates or further processing)\n- See the design doc for exact placement\
      \ guidance"
    last_attempt: '2026-03-24T17:24:24.183501'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T17:25:30.496268'
    result_message: 'Added detect_quota_exhaustion import and checks after _verify_defect_symptoms()
      and _run_five_whys_analysis() calls in intake_analyze(). Returns {"quota_exhausted":
      True} immediately on detection, before any state updates.'
    validation_attempts: 1
    validation_findings: 'detect_quota_exhaustion imported and called correctly after
      _verify_defect_symptoms() and _run_five_whys_analysis() in intake_analyze(),
      returning {quota_exhausted: True} before any state updates. Build passes. Pre-existing
      test collection errors in test_auto_pipeline.py and test_completed_archive.py
      are unrelated to this change.'
  - id: '1.2'
    name: Add quota detection to create_plan node
    agent: coder
    status: completed
    depends_on:
    - '1.1'
    description: "Implement the work item: docs/defect-backlog/01-quota-exhaustion-not-detected-in-create-plan-causes-false-archival.md\n\
      \nFocus on langgraph_pipeline/pipeline/nodes/plan_creation.py:\n- Import detect_quota_exhaustion\
      \ from langgraph_pipeline.shared.quota\n- In create_plan(), after _run_subprocess()\
      \ returns combined_output,\n  call detect_quota_exhaustion(combined_output)\
      \ immediately after the existing\n  is_rate_limited check and return {\"quota_exhausted\"\
      : True} if detected\n- See the design doc for exact placement guidance"
    last_attempt: '2026-03-24T17:27:21.991178'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T17:29:23.495551'
    result_message: 'Added quota exhaustion detection to create_plan node. Fixed rate_limited
      branch to only fire when reset_time is not None, so quota exhaustion (rate limit
      with no reset time) correctly returns quota_exhausted: True. Updated test to
      reflect correct behavior.'
    validation_attempts: 1
    validation_findings: detect_quota_exhaustion imported and called correctly after
      rate limit check (with reset_time guard). All 20 unit tests pass including new
      quota exhaustion test. Build clean. Two pre-existing unrelated collection errors
      in test_auto_pipeline.py and test_completed_archive.py.
- id: phase-2
  name: Phase 2 - Add Routing Functions and Rewire Graph
  status: pending
  tasks:
  - id: '2.1'
    name: Add after_intake and after_create_plan edge routing functions
    agent: coder
    status: completed
    depends_on:
    - '1.2'
    description: 'Implement the work item: docs/defect-backlog/01-quota-exhaustion-not-detected-in-create-plan-causes-false-archival.md


      Focus on langgraph_pipeline/pipeline/edges.py:

      - Add NODE_EXECUTE_PLAN constant

      - Add after_intake(state) routing function: returns END if quota_exhausted else
      NODE_CREATE_PLAN

      - Add after_create_plan(state) routing function: returns END if quota_exhausted
      else NODE_EXECUTE_PLAN

      - See the design doc for exact implementation'
    last_attempt: '2026-03-24T17:30:23.807711'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T17:31:09.039444'
    result_message: Added NODE_EXECUTE_PLAN constant and after_intake/after_create_plan
      routing functions to edges.py. All 28 existing tests pass.
    validation_attempts: 1
    validation_findings: NODE_EXECUTE_PLAN constant and after_intake/after_create_plan
      routing functions implemented correctly in edges.py per design spec. Build passes.
      All 60 edge-related tests pass. Pre-existing test collection errors in test_auto_pipeline.py
      and test_completed_archive.py are unrelated. Tests for new functions are scoped
      to task 3.1.
  - id: '2.2'
    name: Rewire graph to use conditional edges for intake and create_plan
    agent: coder
    status: completed
    depends_on:
    - '2.1'
    description: "Implement the work item: docs/defect-backlog/01-quota-exhaustion-not-detected-in-create-plan-causes-false-archival.md\n\
      \nFocus on langgraph_pipeline/pipeline/graph.py:\n- Import after_intake and\
      \ after_create_plan from edges.py\n- Replace graph.add_edge(NODE_INTAKE_ANALYZE,\
      \ NODE_CREATE_PLAN) with\n  graph.add_conditional_edges(NODE_INTAKE_ANALYZE,\
      \ after_intake)\n- Replace graph.add_edge(NODE_CREATE_PLAN, NODE_EXECUTE_PLAN)\
      \ with\n  graph.add_conditional_edges(NODE_CREATE_PLAN, after_create_plan)\n\
      - Update the module docstring graph topology comment to reflect the new conditional\
      \ edges"
    last_attempt: '2026-03-24T17:33:42.675803'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T17:34:54.998389'
    result_message: 'Rewired graph.py: imported after_intake and after_create_plan
      from edges.py; replaced add_edge for intake_analyze->create_plan and create_plan->execute_plan
      with add_conditional_edges; updated module docstring topology to reflect new
      conditional routing.'
    validation_attempts: 1
    validation_findings: 'All requirements satisfied: after_intake and after_create_plan
      imported in graph.py, both fixed edges replaced with add_conditional_edges,
      module docstring topology updated. Build passes. Test suite errors are pre-existing
      and unrelated to this task.'
