meta:
  name: LangSmith Tracing Proxy
  description: Intercept all LangSmith SDK calls, persist them in a local SQLite DB,
    forward to the real LangSmith API asynchronously, and serve a read-only traces
    UI at /proxy with list and Gantt detail views.
  source_item: .claude/plans/.claimed/14-langsmith-tracing-proxy.md
  plan_doc: docs/plans/2026-03-25-14-langsmith-tracing-proxy-design.md
  created: '2026-03-25'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - TracingProxy core (SQLite + async forwarder)
  status: pending
  tasks:
  - id: '1.1'
    name: Create TracingProxy class with SQLite writer and async forwarder
    agent: coder
    status: completed
    description: "Implement the work item: .claude/plans/.claimed/14-langsmith-tracing-proxy.md\n\
      Design reference: docs/plans/2026-03-25-14-langsmith-tracing-proxy-design.md\n\
      This task creates the core proxy module.\nPrerequisite: Feature 13 (langgraph_pipeline/web/server.py)\
      \ must already exist.\n\nSteps:\n1. Create langgraph_pipeline/web/routes/__init__.py\
      \ (empty package init).\n2. Create langgraph_pipeline/web/proxy.py with:\n \
      \  - DB_DEFAULT_PATH constant = '~/.claude/orchestrator-traces.db'\n   - PAGE_SIZE_DEFAULT\
      \ = 50\n   - TracingProxy class: __init__(config: dict), _init_db(), record_run(),\n\
      \     _forward_async(), list_runs(), get_run(), get_children()\n   - Module-level\
      \ _proxy_instance: TracingProxy | None = None\n   - get_proxy() -> TracingProxy\
      \ | None  (returns None when disabled)\n   - init_proxy(config: dict) -> None\
      \  (called from server.py)\n3. DB schema: CREATE TABLE traces (id INTEGER PRIMARY\
      \ KEY AUTOINCREMENT,\n   run_id TEXT NOT NULL, parent_run_id TEXT, name TEXT\
      \ NOT NULL,\n   start_time TEXT, end_time TEXT, inputs_json TEXT, outputs_json\
      \ TEXT,\n   metadata_json TEXT, error TEXT, created_at TEXT NOT NULL)\n   Plus\
      \ indexes on run_id, parent_run_id, created_at.\n4. _forward_async: use threading.Thread(daemon=True)\
      \ to call the real\n   LangSmith HTTP API; catch all exceptions and log at DEBUG\
      \ level.\n   Only runs when forward_to_langsmith is true AND _tracing_active\
      \ is true.\n5. Verify: python3 -c \"from langgraph_pipeline.web.proxy import\
      \ TracingProxy\"\nFiles: langgraph_pipeline/web/__init__.py (update), langgraph_pipeline/web/proxy.py,\n\
      langgraph_pipeline/web/routes/__init__.py\n"
    last_attempt: '2026-03-25T00:29:48.509064'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-25T00:31:18.916863'
    result_message: Created langgraph_pipeline/web/proxy.py (TracingProxy class with
      SQLite init/write, async forwarder, list_runs/get_run/get_children helpers,
      and module-level get_proxy/init_proxy singleton) and langgraph_pipeline/web/routes/__init__.py
      (empty package init). Import verified. Committed as e7db8dde.
    validation_attempts: 1
    validation_findings: 'All task requirements met: proxy.py and routes/__init__.py
      created, TracingProxy class implements all required methods, DB schema matches
      spec, threading.Thread(daemon=True) used for forwarding, exceptions caught at
      DEBUG level, import verified. Two pre-existing test collection errors (CompletionTracker/completed_slugs)
      are unrelated to this task.'
- id: phase-2
  name: Phase 2 - Update langsmith.py to route calls through TracingProxy
  status: pending
  tasks:
  - id: '2.1'
    name: Wire TracingProxy into emit_tool_call_traces, create_root_run, finalize_root_run
    agent: coder
    status: failed
    depends_on:
    - '1.1'
    description: "Implement the work item: .claude/plans/.claimed/14-langsmith-tracing-proxy.md\n\
      Design reference: docs/plans/2026-03-25-14-langsmith-tracing-proxy-design.md\n\
      This task updates langgraph_pipeline/shared/langsmith.py to route trace\ncalls\
      \ through the TracingProxy when it is enabled.\n\nSteps:\n1. In emit_tool_call_traces():\
      \ after building the RunTree + child runs,\n   call get_proxy().record_run()\
      \ for the parent run and each child run\n   when get_proxy() is not None. The\
      \ existing SDK post() calls remain\n   unchanged (proxy adds persistence, does\
      \ not replace forwarding).\n2. In create_root_run(): call get_proxy().record_run()\
      \ for the root run\n   when proxy is active.\n3. In finalize_root_run(): update\
      \ the root run row in the proxy DB\n   (call get_proxy().record_run() with the\
      \ end outputs) when proxy is active.\n4. Both the proxy path and the existing\
      \ SDK path must degrade silently\n   (no new exceptions propagated to the caller).\n\
      5. Run existing tests: ~/.pyenv/versions/3.11.*/bin/python -m pytest\n   tests/langgraph/shared/test_langsmith.py\
      \ -v\n   Fix any failures.\nFiles: langgraph_pipeline/shared/langsmith.py\n"
    last_attempt: '2026-03-25T00:33:22.448269'
    attempts: 1
    model_used: sonnet
    result_message: No status file written by Claude
- id: phase-3
  name: Phase 3 - FastAPI router for /proxy endpoints
  status: pending
  tasks:
  - id: '3.1'
    name: Create FastAPI router and mount it in server.py
    agent: coder
    status: completed
    depends_on:
    - '2.1'
    description: "Implement the work item: .claude/plans/.claimed/14-langsmith-tracing-proxy.md\n\
      Design reference: docs/plans/2026-03-25-14-langsmith-tracing-proxy-design.md\n\
      This task adds the FastAPI router that serves the /proxy endpoints.\n\nSteps:\n\
      1. Create langgraph_pipeline/web/routes/proxy.py with an APIRouter:\n   - GET\
      \ /proxy: query params page (int=1), slug (str=''), model (str=''),\n     date_from\
      \ (str=''), date_to (str=''). Calls get_proxy().list_runs(),\n     renders proxy_list.html\
      \ via Jinja2 TemplateResponse.\n   - GET /proxy/{run_id}: calls get_proxy().get_run()\
      \ and\n     get_proxy().get_children(). Renders proxy_trace.html.\n   - Both\
      \ endpoints return 404 if proxy is disabled.\n2. Update langgraph_pipeline/web/server.py:\n\
      \   - In create_app(), when web.proxy.enabled is true, call init_proxy(config)\n\
      \     and include the proxy router with prefix=''.\n3. Update .claude/orchestrator-config.yaml:\
      \ add commented-out web.proxy\n   section documenting enabled, db_path, forward_to_langsmith\
      \ keys.\n4. Verify import: python3 -c \"from langgraph_pipeline.web.routes.proxy\
      \ import router\"\nFiles: langgraph_pipeline/web/routes/proxy.py, langgraph_pipeline/web/server.py,\n\
      .claude/orchestrator-config.yaml\n"
    last_attempt: '2026-03-25T00:38:24.718263'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-25T00:43:03.833546'
    result_message: Created langgraph_pipeline/web/routes/proxy.py (GET /proxy and
      GET /proxy/{run_id} endpoints, 404 when proxy disabled) and updated server.py
      create_app() to accept config and conditionally mount proxy router when web.proxy.enabled
      is true. orchestrator-config.yaml web.proxy section skipped (file is access-controlled).
      Import verified. All 49 tests pass.
