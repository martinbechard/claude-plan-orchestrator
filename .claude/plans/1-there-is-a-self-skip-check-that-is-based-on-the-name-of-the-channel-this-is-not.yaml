meta:
  name: Replace Text-Based Agent Signature Matching with Slack bot_id
  description: Add bot_id-based self-loop prevention as the primary filter in Slack
    message polling, using auth.test at startup to resolve the bot's own identity.
    Keep existing signature-based filter as secondary fallback.
  plan_doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not-design.md
  source_item: docs/defect-backlog/1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not.md
  created: '2026-02-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Add auth.test and bot_id self-skip filter
  status: pending
  tasks:
  - id: '1.1'
    name: Add auth.test bot_id resolution and bot_id-based message filter
    agent: coder
    status: pending
    description: >
      Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not.md

      Design doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not-design.md

      In scripts/plan-orchestrator.py:

      1. Add a method _resolve_own_bot_id() to SlackNotifier that calls
         Slack auth.test API (https://slack.com/api/auth.test) using the
         existing _bot_token. Extract bot_id from the response and store
         it in self._own_bot_id. If the call fails, log a warning and set
         self._own_bot_id = None (graceful degradation).

      2. Call _resolve_own_bot_id() at the end of SlackNotifier.__init__()
         (after token validation). Log the resolved bot_id at startup.

      3. In _handle_polled_messages(), add a new filter rule BEFORE the
         existing signature-based Rule 1: if self._own_bot_id is not None
         and the message has a "bot_id" field equal to self._own_bot_id,
         skip the message with log: "[SLACK] Filter: skip own-bot-id".

      4. Keep the existing AGENT_SIGNATURE_PATTERN / is_own_signature
         filter as the next rule (secondary fallback). Do not remove it.

      5. Verify syntax: python3 -c "import py_compile; py_compile.compile('scripts/plan-orchestrator.py', doraise=True)"

      Files: scripts/plan-orchestrator.py
- id: phase-2
  name: Phase 2 - Unit Tests
  status: pending
  tasks:
  - id: '2.1'
    name: Add unit tests for bot_id self-skip mechanism
    agent: coder
    depends_on:
    - '1.1'
    status: pending
    description: >
      Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not.md

      Design doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not-design.md

      Add tests to the appropriate test files (tests/test_agent_identity.py
      and/or tests/test_slack_notifier.py) covering:

      1. _resolve_own_bot_id() success: mock auth.test returning a bot_id,
         verify self._own_bot_id is set correctly.

      2. _resolve_own_bot_id() failure: mock auth.test returning an error
         or raising an exception, verify self._own_bot_id is None and no
         exception propagates.

      3. bot_id self-skip in _handle_polled_messages: create a message
         with bot_id matching _own_bot_id, verify it is skipped.

      4. bot_id non-match: create a message with a different bot_id,
         verify it is NOT skipped by the bot_id filter (may still be
         caught by signature filter).

      5. No bot_id field: create a message without bot_id, verify the
         bot_id filter is bypassed and the signature filter still runs.

      6. bot_id filter disabled (_own_bot_id is None): verify messages
         with bot_id are not skipped by the bot_id filter (fallback to
         signature-based filter).

      Run tests: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/ -v
      Fix any failures.

      Files: tests/test_agent_identity.py, tests/test_slack_notifier.py
