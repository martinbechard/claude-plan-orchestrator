meta:
  name: Replace Text-Based Agent Signature Matching with Slack bot_id
  description: Add bot_id-based self-loop prevention as the primary filter in Slack
    message polling, using auth.test at startup to resolve the bot's own identity.
    Keep existing signature-based filter as secondary fallback.
  plan_doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not-design.md
  source_item: docs/defect-backlog/1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not.md
  created: '2026-02-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Add auth.test and bot_id self-skip filter
  status: pending
  tasks:
  - id: '1.1'
    name: Add auth.test bot_id resolution and bot_id-based message filter
    agent: coder
    status: in_progress
    description: "Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not.md\n\
      Design doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not-design.md\n\
      In scripts/plan-orchestrator.py:\n1. Add a method _resolve_own_bot_id() to SlackNotifier\
      \ that calls\n   Slack auth.test API (https://slack.com/api/auth.test) using\
      \ the\n   existing _bot_token. Extract bot_id from the response and store\n\
      \   it in self._own_bot_id. If the call fails, log a warning and set\n   self._own_bot_id\
      \ = None (graceful degradation).\n\n2. Call _resolve_own_bot_id() at the end\
      \ of SlackNotifier.__init__()\n   (after token validation). Log the resolved\
      \ bot_id at startup.\n\n3. In _handle_polled_messages(), add a new filter rule\
      \ BEFORE the\n   existing signature-based Rule 1: if self._own_bot_id is not\
      \ None\n   and the message has a \"bot_id\" field equal to self._own_bot_id,\n\
      \   skip the message with log: \"[SLACK] Filter: skip own-bot-id\".\n\n4. Keep\
      \ the existing AGENT_SIGNATURE_PATTERN / is_own_signature\n   filter as the\
      \ next rule (secondary fallback). Do not remove it.\n\n5. Verify syntax: python3\
      \ -c \"import py_compile; py_compile.compile('scripts/plan-orchestrator.py',\
      \ doraise=True)\"\nFiles: scripts/plan-orchestrator.py\n"
    attempts: 3
    last_attempt: '2026-02-24T21:14:34.536414'
    model_used: sonnet
    validation_findings: 'Validator ''validator'' failed to execute: No status file
      written by Claude'
    validation_attempts: 2
- id: phase-2
  name: Phase 2 - Unit Tests
  status: pending
  tasks:
  - id: '2.1'
    name: Add unit tests for bot_id self-skip mechanism
    agent: coder
    depends_on:
    - '1.1'
    status: pending
    description: "Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not.md\n\
      Design doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-is-based-on-the-name-of-the-channel-this-is-not-design.md\n\
      Add tests to the appropriate test files (tests/test_agent_identity.py and/or\
      \ tests/test_slack_notifier.py) covering:\n1. _resolve_own_bot_id() success:\
      \ mock auth.test returning a bot_id,\n   verify self._own_bot_id is set correctly.\n\
      \n2. _resolve_own_bot_id() failure: mock auth.test returning an error\n   or\
      \ raising an exception, verify self._own_bot_id is None and no\n   exception\
      \ propagates.\n\n3. bot_id self-skip in _handle_polled_messages: create a message\n\
      \   with bot_id matching _own_bot_id, verify it is skipped.\n\n4. bot_id non-match:\
      \ create a message with a different bot_id,\n   verify it is NOT skipped by\
      \ the bot_id filter (may still be\n   caught by signature filter).\n\n5. No\
      \ bot_id field: create a message without bot_id, verify the\n   bot_id filter\
      \ is bypassed and the signature filter still runs.\n\n6. bot_id filter disabled\
      \ (_own_bot_id is None): verify messages\n   with bot_id are not skipped by\
      \ the bot_id filter (fallback to\n   signature-based filter).\n\nRun tests:\
      \ ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/ -v Fix any failures.\n\
      Files: tests/test_agent_identity.py, tests/test_slack_notifier.py\n"
