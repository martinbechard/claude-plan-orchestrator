sections:
- id: phase-1
  name: Phase 1 - SPEC_DIR Config and Prompt Enrichment
  status: pending
  tasks:
  - id: '1.1'
    name: Add SPEC_DIR constant and enrich build_validation_prompt
    agent: coder
    status: completed
    description: "Implement the work item: docs/feature-backlog/11-spec-aware-validator-with-e2e-logging.md\n\
      Design reference: docs/plans/2026-03-24-11-spec-aware-validator-with-e2e-logging-design.md\n\
      \nThis task adds SPEC_DIR config support and injects spec-aware context into\n\
      the validation prompt in scripts/plan-orchestrator.py.\n\nSteps:\n1. Read scripts/plan-orchestrator.py.\
      \ Find the constants section around lines 55-62\n   where DEFAULT_AGENTS_DIR\
      \ and DEFAULT_E2E_COMMAND are defined.\n\n2. After DEFAULT_AGENTS_DIR (line\
      \ 61), add:\n   DEFAULT_SPEC_DIR = \"\"\n\n3. Find the config reading section\
      \ around lines 369-375 where E2E_COMMAND is read.\n   After the E2E_COMMAND\
      \ line, add:\n   SPEC_DIR = _config.get(\"spec_dir\", DEFAULT_SPEC_DIR)\n\n\
      4. Find the build_validation_prompt() function (around line 1661). Locate the\n\
      \   return f-string. Before the IMPORTANT line that says \"Write .claude/plans/task-status.json\n\
      \   when done\", insert a conditional spec-aware context block:\n\n   a. Before\
      \ the return statement, build a spec_context variable:\n\n      spec_context\
      \ = \"\"\n      if SPEC_DIR:\n          spec_context = f\"\"\"\n\n## Spec-Aware\
      \ Validation (E2E Tests)\n\nThis project has functional specifications in: {SPEC_DIR}\n\
      E2E test command: {E2E_COMMAND}\n\nAfter the standard validation checks above,\
      \ perform these additional steps:\n\n1. Run: git diff --name-only HEAD~1 HEAD\n\
      \   Look for any files under {SPEC_DIR} in the diff output.\n\n2. If spec files\
      \ were modified, read each changed spec file and find all\n   ### Verification\
      \ blocks.\n\n3. For each block with **Type: Testable** and a **Test file(s):**\
      \ reference:\n   - Run the E2E test: {E2E_COMMAND} <test_file> --reporter=json\n\
      \   - Capture the JSON output to logs/e2e/ with a timestamped filename\n   \
      \  (format: YYYY-MM-DDTHHMMSS.json)\n   - Parse the JSON to determine pass/fail\
      \ counts\n\n4. Include E2E test results in your findings:\n   - [PASS] E2E:\
      \ <test_file> - all N tests passed\n   - [FAIL] E2E: <test_file> - M of N tests\
      \ failed\n\n5. If no spec files were changed in the diff, skip E2E testing and\
      \ note:\n   - [PASS] E2E: No functional spec changes detected, E2E tests skipped\n\
      \n6. E2E failures should result in a WARN verdict (not FAIL) unless the\n  \
      \ failing tests are directly related to the task requirements.\n\"\"\"\n\n \
      \  b. Include spec_context in the returned f-string just before the\n      \"\
      IMPORTANT: Write .claude/plans/task-status.json\" line.\n\n5. Verify syntax:\n\
      \   python3 -c \"import py_compile; py_compile.compile('scripts/plan-orchestrator.py',\
      \ doraise=True); print('syntax OK')\"\n\n6. Git commit:\n   git add scripts/plan-orchestrator.py\n\
      \   git commit -m \"feat: add SPEC_DIR config and spec-aware validation prompt\
      \ enrichment\"\n\nFiles: scripts/plan-orchestrator.py\n"
    last_attempt: '2026-03-24T20:52:01.001030'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T20:53:01.276080'
    result_message: Added DEFAULT_SPEC_DIR constant, SPEC_DIR config read from orchestrator-config.yaml,
      and spec_context injection into build_validation_prompt() that triggers E2E
      spec validation when SPEC_DIR is configured.
    validation_attempts: 1
    validation_findings: 'All requirements met: DEFAULT_SPEC_DIR constant added at
      line 63, SPEC_DIR config read at line 377, spec_context injected into build_validation_prompt()
      at line 1755. Build passes, pre-existing test failures in test_auto_pipeline.py
      and test_completed_archive.py are unrelated to this task.'
