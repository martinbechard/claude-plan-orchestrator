- id: phase-3
  name: Phase 3 - Unit Tests
  status: pending
  tasks:
  - id: '3.1'
    name: Add build_validation_prompt spec-context unit tests
    agent: coder
    status: completed
    depends_on:
    - '1.1'
    description: "Implement the work item: docs/feature-backlog/11-spec-aware-validator-with-e2e-logging.md\n\
      Design reference: docs/plans/2026-03-24-11-spec-aware-validator-with-e2e-logging-design.md\n\
      \nThis task adds unit tests verifying that build_validation_prompt() injects\n\
      spec-aware context when SPEC_DIR is configured, and omits it when not.\n\nSteps:\n\
      1. Read tests/test_plan_orchestrator.py to understand existing test patterns\n\
      \   for build_validation_prompt() (look for test_build_validation_prompt_*).\n\
      \n2. Read scripts/plan-orchestrator.py to check the updated build_validation_prompt()\n\
      \   signature and the SPEC_DIR module-level variable.\n\n3. Add the following\
      \ tests after the existing build_validation_prompt tests:\n\n   a. test_build_validation_prompt_includes_spec_context(monkeypatch):\n\
      \      - Monkeypatch the module's SPEC_DIR to \"docs/specs/\"\n      - Create\
      \ minimal task, section, and TaskResult objects (reuse patterns\n        from\
      \ existing build_validation_prompt tests)\n      - Call build_validation_prompt(task,\
      \ section, task_result, \"validator\")\n      - Assert result contains \"Spec-Aware\
      \ Validation\"\n      - Assert result contains \"docs/specs/\"\n\n   b. test_build_validation_prompt_omits_spec_when_unconfigured(monkeypatch):\n\
      \      - Monkeypatch SPEC_DIR to \"\" (empty string)\n      - Call build_validation_prompt()\n\
      \      - Assert result does NOT contain \"Spec-Aware Validation\"\n\n   c. test_build_validation_prompt_standard_checks_with_spec(monkeypatch):\n\
      \      - Monkeypatch SPEC_DIR to \"docs/specs/\"\n      - Call build_validation_prompt()\n\
      \      - Assert result contains BUILD_COMMAND\n      - Assert result contains\
      \ TEST_COMMAND\n\n4. Run the tests:\n   ~/.pyenv/versions/3.11.*/bin/python\
      \ -m pytest tests/test_plan_orchestrator.py -v -k \"spec_context or spec_when\"\
      \n   Fix any failures before marking complete.\n\nFiles: tests/test_plan_orchestrator.py\n"
    last_attempt: '2026-03-24T20:57:54.707041'
    attempts: 1
    model_used: opus
    completed_at: '2026-03-24T20:59:08.033370'
    result_message: 'Added 3 unit tests for build_validation_prompt spec-context:
