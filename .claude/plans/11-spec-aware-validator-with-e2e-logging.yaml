meta:
  name: Spec-Aware Validator with E2E Test Logging
  description: Complete the spec-aware validator feature by adding SPEC_DIR config,
    injecting spec-aware context into the validation prompt, updating the validator
    agent with E2E-from-spec instructions, and adding unit tests.
  source_item: docs/feature-backlog/11-spec-aware-validator-with-e2e-logging.md
  plan_doc: docs/plans/2026-03-24-11-spec-aware-validator-with-e2e-logging-design.md
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
      - coder
    validators:
      - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - SPEC_DIR Config and Prompt Enrichment
  status: pending
  tasks:
  - id: '1.1'
    name: Add SPEC_DIR constant and enrich build_validation_prompt
    agent: coder
    status: pending
    description: |
      Implement the work item: docs/feature-backlog/11-spec-aware-validator-with-e2e-logging.md
      Design reference: docs/plans/2026-03-24-11-spec-aware-validator-with-e2e-logging-design.md

      This task adds SPEC_DIR config support and injects spec-aware context into
      the validation prompt in scripts/plan-orchestrator.py.

      Steps:
      1. Read scripts/plan-orchestrator.py. Find the constants section around lines 55-62
         where DEFAULT_AGENTS_DIR and DEFAULT_E2E_COMMAND are defined.

      2. After DEFAULT_AGENTS_DIR (line 61), add:
         DEFAULT_SPEC_DIR = ""

      3. Find the config reading section around lines 369-375 where E2E_COMMAND is read.
         After the E2E_COMMAND line, add:
         SPEC_DIR = _config.get("spec_dir", DEFAULT_SPEC_DIR)

      4. Find the build_validation_prompt() function (around line 1661). Locate the
         return f-string. Before the IMPORTANT line that says "Write .claude/plans/task-status.json
         when done", insert a conditional spec-aware context block:

         a. Before the return statement, build a spec_context variable:

            spec_context = ""
            if SPEC_DIR:
                spec_context = f"""

      ## Spec-Aware Validation (E2E Tests)

      This project has functional specifications in: {SPEC_DIR}
      E2E test command: {E2E_COMMAND}

      After the standard validation checks above, perform these additional steps:

      1. Run: git diff --name-only HEAD~1 HEAD
         Look for any files under {SPEC_DIR} in the diff output.

      2. If spec files were modified, read each changed spec file and find all
         ### Verification blocks.

      3. For each block with **Type: Testable** and a **Test file(s):** reference:
         - Run the E2E test: {E2E_COMMAND} <test_file> --reporter=json
         - Capture the JSON output to logs/e2e/ with a timestamped filename
           (format: YYYY-MM-DDTHHMMSS.json)
         - Parse the JSON to determine pass/fail counts

      4. Include E2E test results in your findings:
         - [PASS] E2E: <test_file> - all N tests passed
         - [FAIL] E2E: <test_file> - M of N tests failed

      5. If no spec files were changed in the diff, skip E2E testing and note:
         - [PASS] E2E: No functional spec changes detected, E2E tests skipped

      6. E2E failures should result in a WARN verdict (not FAIL) unless the
         failing tests are directly related to the task requirements.
      """

         b. Include spec_context in the returned f-string just before the
            "IMPORTANT: Write .claude/plans/task-status.json" line.

      5. Verify syntax:
         python3 -c "import py_compile; py_compile.compile('scripts/plan-orchestrator.py', doraise=True); print('syntax OK')"

      6. Git commit:
         git add scripts/plan-orchestrator.py
         git commit -m "feat: add SPEC_DIR config and spec-aware validation prompt enrichment"

      Files: scripts/plan-orchestrator.py
- id: phase-2
  name: Phase 2 - Validator Agent Update
  status: pending
  tasks:
  - id: '2.1'
    name: Add spec-aware step to validator.md
    agent: coder
    status: pending
    depends_on:
      - '1.1'
    description: |
      Implement the work item: docs/feature-backlog/11-spec-aware-validator-with-e2e-logging.md
      Design reference: docs/plans/2026-03-24-11-spec-aware-validator-with-e2e-logging-design.md

      This task updates .claude/agents/validator.md to add spec-aware validation
      instructions between the unit tests step and the existing E2E step.

      Steps:
      1. Read .claude/agents/validator.md to understand its current structure.

      2. In the "## Validation Steps" section, after "### Step 2: Unit Tests"
         and before "### Step 3: E2E Test", insert a new step:

         ### Step 3: Spec-Aware E2E (if configured)
         If the validation prompt includes a "Spec-Aware Validation" section:
         a. Run git diff --name-only HEAD~1 HEAD to find changed files
         b. Filter for files under the spec directory named in the prompt
         c. For each changed spec file, read it and find ### Verification blocks
         d. For each block with Type: Testable and a Test file(s): reference:
            - Run the E2E test command with --reporter=json
            - Save JSON output to logs/e2e/<YYYY-MM-DDTHHMMSS>.json
            - Parse pass/fail counts from the JSON
         e. If no spec files changed, note that spec-aware E2E was skipped
         If the prompt does not include a Spec-Aware Validation section, skip this step.

      3. Renumber the existing steps 3, 4, and 5 to become 4, 5, and 6.

      4. In the "## Constraints" section, add:
         - When running spec-aware E2E tests, always use --reporter=json and
           save output to logs/e2e/ with a timestamped filename (YYYY-MM-DDTHHMMSS.json).
         - Only run spec-aware E2E when the validation prompt includes a
           Spec-Aware Validation section. Do not search for spec files independently.

      5. Git commit:
         git add .claude/agents/validator.md
         git commit -m "feat: add spec-aware E2E step to validator agent"

      Files: .claude/agents/validator.md
- id: phase-3
  name: Phase 3 - Unit Tests
  status: pending
  tasks:
  - id: '3.1'
    name: Add build_validation_prompt spec-context unit tests
    agent: coder
    status: pending
    depends_on:
      - '1.1'
    description: |
      Implement the work item: docs/feature-backlog/11-spec-aware-validator-with-e2e-logging.md
      Design reference: docs/plans/2026-03-24-11-spec-aware-validator-with-e2e-logging-design.md

      This task adds unit tests verifying that build_validation_prompt() injects
      spec-aware context when SPEC_DIR is configured, and omits it when not.

      Steps:
      1. Read tests/test_plan_orchestrator.py to understand existing test patterns
         for build_validation_prompt() (look for test_build_validation_prompt_*).

      2. Read scripts/plan-orchestrator.py to check the updated build_validation_prompt()
         signature and the SPEC_DIR module-level variable.

      3. Add the following tests after the existing build_validation_prompt tests:

         a. test_build_validation_prompt_includes_spec_context(monkeypatch):
            - Monkeypatch the module's SPEC_DIR to "docs/specs/"
            - Create minimal task, section, and TaskResult objects (reuse patterns
              from existing build_validation_prompt tests)
            - Call build_validation_prompt(task, section, task_result, "validator")
            - Assert result contains "Spec-Aware Validation"
            - Assert result contains "docs/specs/"

         b. test_build_validation_prompt_omits_spec_when_unconfigured(monkeypatch):
            - Monkeypatch SPEC_DIR to "" (empty string)
            - Call build_validation_prompt()
            - Assert result does NOT contain "Spec-Aware Validation"

         c. test_build_validation_prompt_standard_checks_with_spec(monkeypatch):
            - Monkeypatch SPEC_DIR to "docs/specs/"
            - Call build_validation_prompt()
            - Assert result contains BUILD_COMMAND
            - Assert result contains TEST_COMMAND

      4. Run the tests:
         ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/test_plan_orchestrator.py -v -k "spec_context or spec_when"
         Fix any failures before marking complete.

      Files: tests/test_plan_orchestrator.py
- id: phase-4
  name: Phase 4 - Plugin Version Bump
  status: pending
  tasks:
  - id: '4.1'
    name: Bump plugin version and update release notes
    agent: coder
    status: pending
    depends_on:
      - '2.1'
      - '3.1'
    description: |
      Implement the work item: docs/feature-backlog/11-spec-aware-validator-with-e2e-logging.md

      Bump the plugin version in plugin.json and update RELEASE-NOTES.md for the
      spec-aware validator completion.

      Steps:
      1. Read plugin.json to find the current version.
      2. Bump the patch version (completing a partially-shipped feature).
      3. Read RELEASE-NOTES.md. Add a new entry at the top:
         - Spec-aware validator (complete): Validator now reads SPEC_DIR from
           orchestrator-config.yaml, runs E2E tests referenced in Verification
           blocks of changed functional spec files, and saves timestamped JSON
           results to logs/e2e/.
      4. Git commit both files:
         git add plugin.json RELEASE-NOTES.md
         git commit -m "chore: bump version for spec-aware-validator completion"

      Files: plugin.json, RELEASE-NOTES.md
