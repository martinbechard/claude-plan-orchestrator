  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: s1
  name: 'Backend: per-item output capture'
  tasks:
  - id: '1.1'
    name: Add WORKER_OUTPUT_DIR constant and slug-keyed output writing in task_runner.py
    agent: coder
    status: failed
    description: 'Implement the work item: docs/feature-backlog/43-capture-raw-worker-output-per-item.md

      Scope for this task: Add a WORKER_OUTPUT_DIR constant to shared/paths.py pointing
      to docs/reports/worker-output/. Extend _write_task_log() in task_runner.py to
      accept slug and task_id parameters and write a copy of the output to WORKER_OUTPUT_DIR/<slug>/task-<task_id>-<timestamp>.log.
      Derive slug from state["plan_path"] in execute_task() and pass it through. See
      design: docs/plans/2026-03-26-43-capture-raw-worker-output-per-item-design.md

      '
    last_attempt: '2026-03-26T19:57:04.188680'
    attempts: 1
    model_used: sonnet
    result_message: Unknown status
  - id: '1.2'
    name: Add output capture to parallel task runner
    agent: coder
    status: completed
    dependencies:
    - '1.1'
    description: 'Implement the work item: docs/feature-backlog/43-capture-raw-worker-output-per-item.md

      Scope for this task: Extend _run_claude_in_worktree() in langgraph_pipeline/executor/nodes/parallel.py
      to write per-item output files using the same slug-keyed pattern added in task
      1.1. Currently parallel.py skips log writing entirely. See design: docs/plans/2026-03-26-43-capture-raw-worker-output-per-item-design.md

      '
    last_attempt: '2026-03-26T19:59:13.790263'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-26T20:02:29.598593'
    result_message: Extended _run_claude_in_worktree() to accept slug and task_id
      params and write per-item output logs via _write_task_log(). Also derives slug
      from plan_path in execute_parallel_task() and passes it through. All 1290 tests
      pass.
    validation_attempts: 1
    validation_findings: parallel.py correctly extended to write per-item output files
      via _write_task_log(). Slug derived from plan_path, task_id passed through.
      All 1290 tests pass. No placeholders, no test data leaks.
- id: s2
  name: 'Web UI: expose console output on item detail page'
  tasks:
  - id: '2.1'
    name: Add output file discovery and raw content endpoint to item route
    agent: coder
    status: completed
    dependencies:
    - '1.1'
    description: 'Implement the work item: docs/feature-backlog/43-capture-raw-worker-output-per-item.md

      Scope for this task: In langgraph_pipeline/web/routes/item.py, add a helper
      to list log files from docs/reports/worker-output/<slug>/. Pass the list to
      the template context. Add a GET /item/{slug}/output/{filename} endpoint that
      returns a log file as text/plain. Include path traversal protection on the filename
      parameter. See design: docs/plans/2026-03-26-43-capture-raw-worker-output-per-item-design.md

      '
    last_attempt: '2026-03-26T20:04:35.210928'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-26T20:07:04.855198'
    result_message: Added _list_output_files() helper, output_files template context,
      and GET /item/{slug}/output/{filename} endpoint with path traversal protection
      to item.py
    validation_attempts: 1
    validation_findings: 'Task 2.1 implementation is functionally complete. _list_output_files()
      helper, output_files template context, and GET /item/{slug}/output/{filename}
      endpoint with path traversal protection are all correctly implemented. Two warnings:
      (1) build command references non-existent scripts/plan-orchestrator.py (stale);
      (2) WORKER_OUTPUT_DIR is imported in the committed item.py but the constant
      only exists in uncommitted working-tree changes to paths.py from task 1.1 -
      the committed code would fail with ImportError if the working tree changes were
      reverted. All 1290 tests pass.'
  - id: '2.2'
    name: Add console output section to item.html template
    agent: frontend-coder
    status: completed
    dependencies:
    - '2.1'
    description: 'Implement the work item: docs/feature-backlog/43-capture-raw-worker-output-per-item.md

      Scope for this task: Add a collapsible "Console Output" section to langgraph_pipeline/web/templates/item.html
      that lists all captured output files with task ID, timestamp, and a link to
      the raw content endpoint. Include an inline expandable preview for each file.
      See design: docs/plans/2026-03-26-43-capture-raw-worker-output-per-item-design.md

      '
    last_attempt: '2026-03-26T20:12:09.080079'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-26T20:16:45.112892'
    result_message: Added collapsible Console Output section to item.html. Lists all
      captured log files with task ID, formatted timestamp, and raw-content link.
      Each file has an inline expandable preview that lazy-loads via fetch() on open.
      All 1290 tests pass.
