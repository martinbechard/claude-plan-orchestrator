meta:
  name: 'Defect Fix: Replace rate-limited self-skip with unconditional self-origin
    skip'
  description: Replace the rate-limited self-origin window (MAX_SELF_REPLIES_PER_WINDOW
    + LOOP_DETECTION_WINDOW_SECONDS) with an unconditional self-origin skip. The bot
    never needs to process its own output, so all self-origin messages should be skipped
    without rate limiting. This removes complexity and eliminates the bug where legitimate
    messages were being dropped.
  plan_doc: docs/plans/2026-02-26-3-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel-the-idea-w-design.md
  source_item: docs/defect-backlog/3-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel-the-idea-w.md
  created: '2026-02-26'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
