meta:
  name: 'Defect Fix: Replace rate-limited self-skip with unconditional self-origin skip'
  description: Replace the rate-limited self-origin window (MAX_SELF_REPLIES_PER_WINDOW
    + LOOP_DETECTION_WINDOW_SECONDS) with an unconditional self-origin skip. The bot
    never needs to process its own output, so all self-origin messages should be skipped
    without rate limiting. This removes complexity and eliminates the bug where legitimate
    messages were being dropped.
  plan_doc: docs/plans/2026-02-26-3-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel-the-idea-w-design.md
  source_item: docs/defect-backlog/3-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel-the-idea-w.md
  created: '2026-02-26'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Simplify self-origin filter and update tests
  status: pending
  tasks:
  - id: '1.1'
    name: Replace rate-limited self-origin window with unconditional self-origin skip
    agent: coder
    status: pending
    description: |
      Implement the work item: docs/defect-backlog/3-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel-the-idea-w.md
      Design doc: docs/plans/2026-02-26-3-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel-the-idea-w-design.md

      In scripts/plan-orchestrator.py:
      1. Remove constants MAX_SELF_REPLIES_PER_WINDOW and LOOP_DETECTION_WINDOW_SECONDS
      2. Remove self._self_reply_window from __init__
      3. In _handle_polled_messages(), replace the self-origin + loop detection block
         (lines ~5555-5565) with an unconditional skip:
           if is_self_origin:
               print(f"[SLACK] Filter: skip self-origin #{ch_log}: {preview!r}")
               if ts:
                   self._processed_message_ts.add(ts)
               continue
      4. Remove the self-reply window append after routing (line ~5650-5651)
      5. In _prune_message_tracking(), remove the _self_reply_window pruning block
      6. Verify syntax: python3 -c "import py_compile; py_compile.compile('scripts/plan-orchestrator.py', doraise=True)"

      Then update tests in tests/test_agent_identity.py:
      1. Remove or update any tests for loop detection windowing / MAX_SELF_REPLIES_PER_WINDOW
      2. Update self-origin tests to verify unconditional skip (no rate threshold)
      3. Ensure non-self-origin messages are not affected
      4. Run tests: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/ -v
         Fix any failures.

      Files: scripts/plan-orchestrator.py, tests/test_agent_identity.py
