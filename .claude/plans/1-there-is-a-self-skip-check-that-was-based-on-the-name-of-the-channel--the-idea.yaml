meta:
  name: Replace Signature-Based Self-Skip with Sent-Message Tracking
  description: Remove the fragile text-based AGENT_SIGNATURE_PATTERN filter (Rule 1)
    from _handle_polled_messages() and replace it with structural sent-message-ts
    tracking. Keep bot_id (Rule 0) as primary filter. This eliminates false positive
    message drops caused by regex matching on message text.
  plan_doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea-design.md
  source_item: docs/defect-backlog/1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea.md
  created: '2026-02-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Replace signature filter with sent-message-ts tracking
  status: pending
  tasks:
  - id: '1.1'
    name: Add sent-ts tracking and replace Rule 1 in message filtering
    agent: coder
    status: pending
    description: >
      Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea.md

      Design doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea-design.md

      In scripts/plan-orchestrator.py:

      1. Add a constant SENT_TS_CACHE_MAX = 500 near the other Slack constants.

      2. Add self._sent_message_ts: set[str] = set() in SlackNotifier.__init__().

      3. Add a method _track_sent_ts(self, ts: Optional[str]) -> None that:
         - Returns immediately if ts is None
         - If len(self._sent_message_ts) >= SENT_TS_CACHE_MAX, calls .clear()
         - Adds ts to the set

      4. Modify _post_message() to capture the ts from the API response and call
         self._track_sent_ts(result.get("ts")) before returning.

      5. Modify _post_message_get_ts() to call self._track_sent_ts(ts) after
         extracting ts from the response, before returning it.

      6. In _handle_polled_messages(), REPLACE Rule 1 (the AGENT_SIGNATURE_PATTERN
         block at approximately lines 4925-4930) with a sent-ts check:
         if msg.get("ts") in self._sent_message_ts:
             print(f"[SLACK] Filter: skip sent-message-ts #{ch_log}: {preview!r}")
             continue

      7. Update the comment in poll_messages() that references "agent signatures"
         to reference "sent-message tracking" instead.

      8. Verify syntax: python3 -c "import py_compile; py_compile.compile('scripts/plan-orchestrator.py', doraise=True)"

      Files: scripts/plan-orchestrator.py
- id: phase-2
  name: Phase 2 - Unit Tests
  status: pending
  tasks:
  - id: '2.1'
    name: Update unit tests for new sent-ts filter mechanism
    agent: coder
    depends_on:
    - '1.1'
    status: pending
    description: >
      Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea.md

      Design doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea-design.md

      Update tests to reflect the replacement of signature-based Rule 1 with
      sent-message-ts tracking.

      In tests/test_agent_identity.py:
      1. Remove or update tests in TestMessagePatterns that test AGENT_SIGNATURE_PATTERN
         for FILTERING purposes (keep tests for pattern matching itself if any test
         the pattern in isolation for signing purposes).
      2. Add a new test class TestSentMessageTsFilter with these tests:
         - test_sent_ts_match_skips_message: post a message, verify its ts is in
           _sent_message_ts, verify message with that ts would be skipped in filtering
         - test_non_sent_ts_not_skipped: verify a message whose ts is NOT in
           _sent_message_ts is not skipped by Rule 1
         - test_sent_ts_cache_cleared_on_overflow: add SENT_TS_CACHE_MAX entries,
           add one more, verify the set was cleared and only has the new entry

      In tests/test_slack_notifier.py:
      1. Add tests for _track_sent_ts():
         - test_track_sent_ts_records_ts: call _track_sent_ts with a ts, verify
           it appears in _sent_message_ts
         - test_track_sent_ts_ignores_none: call with None, verify set is empty
         - test_post_message_tracks_ts: mock chat.postMessage response, verify
           _track_sent_ts was called with the returned ts
         - test_post_message_get_ts_tracks_ts: same for _post_message_get_ts

      Run tests: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/ -v
      Fix any failures.

      Files: tests/test_agent_identity.py, tests/test_slack_notifier.py
