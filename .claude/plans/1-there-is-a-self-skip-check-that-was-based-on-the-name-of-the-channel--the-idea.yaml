meta:
  name: Replace Signature-Based Self-Skip with Sent-Message Tracking
  description: Remove the fragile text-based AGENT_SIGNATURE_PATTERN filter (Rule
    1) from _handle_polled_messages() and replace it with structural sent-message-ts
    tracking. Keep bot_id (Rule 0) as primary filter. This eliminates false positive
    message drops caused by regex matching on message text.
  plan_doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea-design.md
  source_item: docs/defect-backlog/1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea.md
  created: '2026-02-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Replace signature filter with sent-message-ts tracking
  status: pending
  tasks:
  - id: '1.1'
    name: Add sent-ts tracking and replace Rule 1 in message filtering
    agent: coder
    status: in_progress
    description: "Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea.md\n\
      Design doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea-design.md\n\
      In scripts/plan-orchestrator.py:\n1. Add a constant SENT_TS_CACHE_MAX = 500\
      \ near the other Slack constants.\n2. Add self._sent_message_ts: set[str] =\
      \ set() in SlackNotifier.__init__().\n3. Add a method _track_sent_ts(self, ts:\
      \ Optional[str]) -> None that:\n   - Returns immediately if ts is None\n   -\
      \ If len(self._sent_message_ts) >= SENT_TS_CACHE_MAX, calls .clear()\n   - Adds\
      \ ts to the set\n\n4. Modify _post_message() to capture the ts from the API\
      \ response and call\n   self._track_sent_ts(result.get(\"ts\")) before returning.\n\
      \n5. Modify _post_message_get_ts() to call self._track_sent_ts(ts) after\n \
      \  extracting ts from the response, before returning it.\n\n6. In _handle_polled_messages(),\
      \ REPLACE Rule 1 (the AGENT_SIGNATURE_PATTERN\n   block at approximately lines\
      \ 4925-4930) with a sent-ts check:\n   if msg.get(\"ts\") in self._sent_message_ts:\n\
      \       print(f\"[SLACK] Filter: skip sent-message-ts #{ch_log}: {preview!r}\"\
      )\n       continue\n\n7. Update the comment in poll_messages() that references\
      \ \"agent signatures\"\n   to reference \"sent-message tracking\" instead.\n\
      \n8. Verify syntax: python3 -c \"import py_compile; py_compile.compile('scripts/plan-orchestrator.py',\
      \ doraise=True)\"\nFiles: scripts/plan-orchestrator.py\n"
    attempts: 1
    last_attempt: '2026-02-24T23:06:30.606801'
- id: phase-2
  name: Phase 2 - Unit Tests
  status: pending
  tasks:
  - id: '2.1'
    name: Update unit tests for new sent-ts filter mechanism
    agent: coder
    depends_on:
    - '1.1'
    status: pending
    description: "Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea.md\n\
      Design doc: docs/plans/2026-02-24-1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea-design.md\n\
      Update tests to reflect the replacement of signature-based Rule 1 with sent-message-ts\
      \ tracking.\nIn tests/test_agent_identity.py: 1. Remove or update tests in TestMessagePatterns\
      \ that test AGENT_SIGNATURE_PATTERN\n   for FILTERING purposes (keep tests for\
      \ pattern matching itself if any test\n   the pattern in isolation for signing\
      \ purposes).\n2. Add a new test class TestSentMessageTsFilter with these tests:\n\
      \   - test_sent_ts_match_skips_message: post a message, verify its ts is in\n\
      \     _sent_message_ts, verify message with that ts would be skipped in filtering\n\
      \   - test_non_sent_ts_not_skipped: verify a message whose ts is NOT in\n  \
      \   _sent_message_ts is not skipped by Rule 1\n   - test_sent_ts_cache_cleared_on_overflow:\
      \ add SENT_TS_CACHE_MAX entries,\n     add one more, verify the set was cleared\
      \ and only has the new entry\n\nIn tests/test_slack_notifier.py: 1. Add tests\
      \ for _track_sent_ts():\n   - test_track_sent_ts_records_ts: call _track_sent_ts\
      \ with a ts, verify\n     it appears in _sent_message_ts\n   - test_track_sent_ts_ignores_none:\
      \ call with None, verify set is empty\n   - test_post_message_tracks_ts: mock\
      \ chat.postMessage response, verify\n     _track_sent_ts was called with the\
      \ returned ts\n   - test_post_message_get_ts_tracks_ts: same for _post_message_get_ts\n\
      \nRun tests: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/ -v Fix any\
      \ failures.\nFiles: tests/test_agent_identity.py, tests/test_slack_notifier.py\n"
