    agent: coder
    status: pending
    description: >
      Implement the work item: docs/defect-backlog/1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea.md

      Design doc: docs/plans/2026-02-25-1-there-is-a-self-skip-check-that-was-based-on-the-name-of-the-channel--the-idea-design.md

      The dedup + loop detection code is already implemented in plan-orchestrator.py.
      This task focuses on cleanup and test alignment:

      1. In scripts/plan-orchestrator.py:
         - Remove the AGENT_SIGNATURE_PATTERN constant (line ~183)
         - Remove the is_own_signature() method from AgentIdentity class (line ~1027-1029)
         - Verify no other code references these removed items

      2. In tests/test_agent_identity.py:
         - Remove TestBotIdSelfSkipFilter class (tests old Rule 0 bot_id blanket skip)
         - Remove is_own_signature tests from TestAgentIdentity
         - Remove AGENT_SIGNATURE_PATTERN tests from TestRegexPatterns
         - Add new tests for the current dedup + loop detection logic:
           a. Dedup: same ts processed twice is skipped on second encounter
           b. Self-origin accepted when under rate limit
           c. Loop detected and skipped when exceeding MAX_SELF_REPLIES_PER_WINDOW
           d. _prune_message_tracking() cleans old entries
           e. _post_message records ts in _own_sent_ts

      3. Run all tests: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/ -v
         Fix any failures.

      4. Verify syntax: python3 -c "import py_compile; py_compile.compile(
         'scripts/plan-orchestrator.py', doraise=True)"

      Files: scripts/plan-orchestrator.py, tests/test_agent_identity.py
