meta:
  name: 'Feature: Task Execution Subgraph'
  description: Implement the task execution subgraph that replaces the subprocess
    call to plan-orchestrator.py with LangGraph nodes for task selection, Claude CLI
    execution, validation, parallel worktree execution, circuit breaking, and model
    escalation.
  plan_doc: docs/plans/2026-02-26-05-task-execution-subgraph-design.md
  source_item: docs/feature-backlog/05-task-execution-subgraph.md
  created: '2026-02-26'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - e2e-test-agent
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
  status: pending
sections:
- id: phase-1
  name: Phase 1 - State schema, circuit breaker, and escalation
  status: completed
  tasks:
  - id: '1.1'
    name: Create TaskState schema, circuit breaker, and escalation modules
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/05-task-execution-subgraph.md
      Design doc: docs/plans/2026-02-26-05-task-execution-subgraph-design.md

      Create langgraph_pipeline/executor/state.py with TaskState TypedDict, executor/circuit_breaker.py
      with consecutive failure tracking and threshold check, and executor/escalation.py
      with EscalationConfig and model progression (haiku -> sonnet -> opus). Add unit
      tests in tests/langgraph/executor/ for state, circuit_breaker, and escalation.
      Run pytest to verify.

      '
    attempts: 3
    last_attempt: '2026-02-26T04:55:22.156719'
    model_used: sonnet
    validation_findings: 'Validator ''validator'' failed to execute: No status file
      written by Claude'
    validation_attempts: 2
    completed_at: '2026-02-26T04:56:01.605091'
    result_message: Created state.py (TaskState TypedDict), circuit_breaker.py (consecutive
      failure tracking), and escalation.py (EscalationConfig + haiku->sonnet->opus
      progression). All 49 unit tests pass.
- id: phase-2
  name: Phase 2 - Core node implementations
  status: completed
  tasks:
  - id: '2.1'
    name: Implement task_selector node (find_next_task)
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/05-task-execution-subgraph.md
      Design doc: docs/plans/2026-02-26-05-task-execution-subgraph-design.md

      Create langgraph_pipeline/executor/nodes/task_selector.py with find_next_task
      node that loads plan YAML, finds next pending task, checks dependency satisfaction,
      budget guard, circuit breaker, and deadlock detection. Create executor/edges.py
      with conditional edge functions (all_done, parallel_check, retry_check, circuit_check).
      Add unit tests in tests/langgraph/executor/nodes/test_task_selector.py and tests/langgraph/executor/test_edges.py.
      Run pytest to verify.

      '
    attempts: 3
    last_attempt: '2026-02-26T05:13:23.926440'
    model_used: sonnet
    validation_findings: 'Validator ''validator'' failed to execute: No status file
      written by Claude'
    validation_attempts: 2
    completed_at: '2026-02-26T05:14:12.441231'
    result_message: 'task_selector.py and edges.py already implemented and verified.
      All 66 tests pass (task_selector: 7 tests, edges: 38 tests, plus 21 from prior
      phase). Status file was missing from previous attempts.'
  - id: '2.2'
    name: Implement task_runner node (execute_task)
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/05-task-execution-subgraph.md
      Design doc: docs/plans/2026-02-26-05-task-execution-subgraph-design.md

      Create langgraph_pipeline/executor/nodes/task_runner.py with execute_task node
      that loads agent definitions, builds prompts, spawns Claude CLI via shared/claude_cli.py,
      parses token usage, updates plan YAML task status, git commits on success, and
      handles Slack suspension via interrupt(). Add unit tests in tests/langgraph/executor/nodes/test_task_runner.py
      with mocked Claude CLI. Run pytest to verify.

      '
    attempts: 1
    last_attempt: '2026-02-26T05:14:14.639651'
    model_used: sonnet
    completed_at: '2026-02-26T05:26:00.898815'
    result_message: Created task_runner.py with execute_task node (agent loading,
      prompt building, Claude CLI subprocess, token usage parsing, plan YAML update,
      git commit on success, interrupt() for suspension). Added 40 unit tests - all
      774 tests pass.
  - id: '2.3'
    name: Implement validator node (validate_task)
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/05-task-execution-subgraph.md
      Design doc: docs/plans/2026-02-26-05-task-execution-subgraph-design.md

      Create langgraph_pipeline/executor/nodes/validator.py with validate_task node
      that runs validation if enabled in plan config, spawns Claude CLI with validator
      agent, parses PASS/WARN/FAIL verdict, and increments task_attempt on failure.
      Add unit tests in tests/langgraph/executor/nodes/test_validator.py. Run pytest
      to verify.

      '
    attempts: 1
    last_attempt: '2026-02-26T05:26:03.159705'
    model_used: sonnet
    completed_at: '2026-02-26T05:39:04.787630'
    result_message: Created langgraph_pipeline/executor/nodes/validator.py with validate_task
      node (validation config guards, status file clearing, Claude CLI spawning, PASS/WARN/FAIL
      verdict parsing, task_attempt increment on FAIL, findings storage, cost accumulation).
      Added 49 unit tests in tests/langgraph/executor/nodes/test_validator.py. All
      823 tests pass.
- id: phase-3
  name: Phase 3 - Parallel execution with worktrees
  status: completed
  tasks:
  - id: '3.1'
    name: Implement parallel fan_out and fan_in nodes
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/05-task-execution-subgraph.md
      Design doc: docs/plans/2026-02-26-05-task-execution-subgraph-design.md

      Create langgraph_pipeline/executor/nodes/parallel.py with fan_out and fan_in
      nodes. fan_out detects parallel_group tasks, checks exclusive_resource conflicts,
      and uses LangGraph Send() API for dynamic branches. Each branch creates a git
      worktree via shared/git.py, executes the task, copies artifacts back, and cleans
      up. fan_in merges task_results using operator.add reducer. Add unit tests in
      tests/langgraph/executor/nodes/test_parallel.py. Run pytest to verify.

      '
    attempts: 3
    last_attempt: '2026-02-26T06:00:51.283785'
    model_used: sonnet
    validation_findings: 'Validator ''validator'' failed to execute: No status file
      written by Claude'
    validation_attempts: 2
    completed_at: '2026-02-26T06:01:28.704045'
    result_message: parallel.py with fan_out, execute_parallel_task, and fan_in nodes
      already implemented. All 45 unit tests in test_parallel.py pass. Previous attempts
      failed only due to missing status file.
- id: phase-4
  name: Phase 4 - Graph assembly and pipeline integration
  status: pending
  tasks:
  - id: '4.1'
    name: Assemble executor subgraph and integrate with pipeline
    agent: coder
    status: in_progress
    description: 'Implement the work item: docs/feature-backlog/05-task-execution-subgraph.md
      Design doc: docs/plans/2026-02-26-05-task-execution-subgraph-design.md

      Create langgraph_pipeline/executor/graph.py that assembles the full executor
      StateGraph wiring all nodes (find_next_task, execute_task, validate_task, fan_out,
      fan_in) with conditional edges. Update langgraph_pipeline/pipeline/nodes/execute_plan.py
      to use the compiled subgraph instead of spawning plan-orchestrator.py as a subprocess.
      Update pipeline/graph.py wiring as needed. Add integration test in tests/langgraph/executor/test_graph_integration.py
      that runs a multi-task plan through the subgraph with mocked Claude CLI. Run
      pytest to verify all tests pass.

      '
    attempts: 3
    last_attempt: '2026-02-26T06:28:29.121867'
    model_used: sonnet
    validation_findings: 'Validator ''validator'' failed to execute: No status file
      written by Claude'
    validation_attempts: 2
