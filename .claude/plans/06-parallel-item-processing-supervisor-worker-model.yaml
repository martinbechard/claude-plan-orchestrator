    description: 'Implement the work item: docs/feature-backlog/06-parallel-item-processing-supervisor-worker-model.md
      Design doc: docs/plans/2026-03-24-06-parallel-item-processing-supervisor-worker-model-design.md


      Add two functions to langgraph_pipeline/pipeline/nodes/scan.py:


      claim_item(item_path: str) -> bool -- creates CLAIMED_DIR if absent, then calls
      os.rename(item_path, CLAIMED_DIR/<basename>). Returns True on success, False
      if FileNotFoundError (another process won the race). Propagates other OSError.


      unclaim_item(claimed_path: str) -> None -- renames the file back from CLAIMED_DIR
      to its original location (item_type directory inferred from filename prefix
      or passed as parameter). Used by the supervisor on worker crash to return the
      item to the backlog.


      Run pytest to verify no regressions.'
    last_attempt: '2026-03-24T16:51:52.163018'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T16:53:55.684783'
