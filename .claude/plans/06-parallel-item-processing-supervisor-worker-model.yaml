- id: phase-2
  name: Phase 2 - claim_item / unclaim_item in scan.py
  status: pending
  tasks:
  - id: '2.1'
    name: Implement atomic item claiming in scan.py
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/06-parallel-item-processing-supervisor-worker-model.md
      Design doc: docs/plans/2026-03-24-06-parallel-item-processing-supervisor-worker-model-design.md


      Add two functions to langgraph_pipeline/pipeline/nodes/scan.py:


      claim_item(item_path: str) -> bool -- creates CLAIMED_DIR if absent, then calls
      os.rename(item_path, CLAIMED_DIR/<basename>). Returns True on success, False
      if FileNotFoundError (another process won the race). Propagates other OSError.


      unclaim_item(claimed_path: str) -> None -- renames the file back from CLAIMED_DIR
      to its original location (item_type directory inferred from filename prefix
      or passed as parameter). Used by the supervisor on worker crash to return the
      item to the backlog.


      Run pytest to verify no regressions.'
    last_attempt: '2026-03-24T16:51:52.163018'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T16:53:55.684783'
    result_message: Added claim_item() and unclaim_item() to scan.py. claim_item()
      uses atomic os.rename() into CLAIMED_DIR, returning False on FileNotFoundError
      (race loss) and propagating other OSErrors. unclaim_item() reverses the rename
      using BACKLOG_DIRS[item_type]. 5 new tests added, all 34 scan tests pass.
- id: phase-3
  name: Phase 3 - Worker entry point
  status: pending
  tasks:
  - id: '3.1'
    name: Create langgraph_pipeline/worker.py
    agent: coder
    status: pending
    description: "Implement the work item: docs/feature-backlog/06-parallel-item-processing-supervisor-worker-model.md\
      \ Design doc: docs/plans/2026-03-24-06-parallel-item-processing-supervisor-worker-model-design.md\n\
      \nCreate langgraph_pipeline/worker.py -- the subprocess entry point for processing\
      \ a single backlog item.\n\nCLI: accepts --item-path PATH and --result-file\
      \ PATH arguments.\n\nBehavior:\n1. Load dotenv files and configure logging.\n\
      2. Build initial PipelineState with item_path set (no budget cap).\n3. Invoke\
      \ pipeline_graph().invoke() for that one item.\n4. On completion (success or\
      \ known failure), write the result JSON to --result-file with fields:\n   {success,\
      \ item_path, cost_usd, input_tokens, output_tokens, duration_s, message}\n5.\
      \ On unhandled exception, write the result JSON with success=false before exiting.\n\
      6. Exit 0 on success, 1 on error.\n\nThe result file is always written before\
      \ exit so the supervisor can distinguish a crash (no file) from a handled failure\
      \ (file with success=false).\n\nRun pytest to verify no regressions."
- id: phase-4
  name: Phase 4 - Supervisor module
  status: pending
  tasks:
  - id: '4.1'
    name: Create langgraph_pipeline/supervisor.py
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/06-parallel-item-processing-supervisor-worker-model.md
      Design doc: docs/plans/2026-03-24-06-parallel-item-processing-supervisor-worker-model-design.md


      Create langgraph_pipeline/supervisor.py with run_supervisor_loop(max_workers,
      budget_cap_usd, dry_run, shutdown_event, slack) -> int.


      The supervisor loop:

      1. Maintains a dict of active workers: {pid: (claimed_path, result_file_path,
      start_time)}.

      2. Each iteration: reap any finished workers (non-blocking os.waitpid with WNOHANG),
      read their result JSON, update cumulative cost, check budget cap, un-claim or
      archive item as appropriate.

      3. While len(active_workers) < max_workers: scan backlog (call scan_backlog_fn),
      claim the item (claim_item), spawn a worker subprocess (langgraph_pipeline.worker
      via python -m), track PID.

      4. When backlog is empty and no active workers, sleep SCAN_SLEEP_SECONDS.

      5. Check shutdown_event between iterations.

      6. Budget cap checked after each worker result is read; stop dispatching new
      items when exceeded.

      7. A worker subprocess that exits non-zero with no result file is treated as
      a crash: call unclaim_item() to return the item to the backlog.


      Return EXIT_CODE_CLEAN, EXIT_CODE_BUDGET_EXHAUSTED, or EXIT_CODE_ERROR.'
