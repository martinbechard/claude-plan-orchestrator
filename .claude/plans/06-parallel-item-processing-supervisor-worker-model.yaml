- id: phase-4
  name: Phase 4 - Supervisor module
  status: pending
  tasks:
  - id: '4.1'
    name: Create langgraph_pipeline/supervisor.py
    agent: coder
    status: completed
    description: 'Implement the work item: docs/feature-backlog/06-parallel-item-processing-supervisor-worker-model.md
      Design doc: docs/plans/2026-03-24-06-parallel-item-processing-supervisor-worker-model-design.md


      Create langgraph_pipeline/supervisor.py with run_supervisor_loop(max_workers,
      budget_cap_usd, dry_run, shutdown_event, slack) -> int.


      The supervisor loop:

      1. Maintains a dict of active workers: {pid: (claimed_path, result_file_path,
      start_time)}.

      2. Each iteration: reap any finished workers (non-blocking os.waitpid with WNOHANG),
      read their result JSON, update cumulative cost, check budget cap, un-claim or
      archive item as appropriate.

      3. While len(active_workers) < max_workers: scan backlog (call scan_backlog_fn),
      claim the item (claim_item), spawn a worker subprocess (langgraph_pipeline.worker
      via python -m), track PID.

      4. When backlog is empty and no active workers, sleep SCAN_SLEEP_SECONDS.

      5. Check shutdown_event between iterations.

      6. Budget cap checked after each worker result is read; stop dispatching new
      items when exceeded.

      7. A worker subprocess that exits non-zero with no result file is treated as
      a crash: call unclaim_item() to return the item to the backlog.


      Return EXIT_CODE_CLEAN, EXIT_CODE_BUDGET_EXHAUSTED, or EXIT_CODE_ERROR.'
    last_attempt: '2026-03-24T17:01:30.529721'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-24T17:06:47.704253'
    result_message: Created langgraph_pipeline/supervisor.py with run_supervisor_loop(max_workers,
      budget_cap_usd, dry_run, shutdown_event, slack) -> int. Implements non-blocking
      worker reaping via os.waitpid(WNOHANG), UUID-based result file naming (avoids
      PID-before-spawn paradox), budget cap enforcement after each result, and unclaim
      on crash or handled failure. All 42 scan-related tests pass.
    validation_attempts: 1
    validation_findings: supervisor.py compiles cleanly, all 1317 passing tests continue
      to pass, all 7 task requirements implemented correctly. Pre-existing failures
      (3 test failures, 2 collection errors) predate this commit and are unrelated
      to supervisor.py.
