      uses atomic os.rename() into CLAIMED_DIR, returning False on FileNotFoundError
      (race loss) and propagating other OSErrors. unclaim_item() reverses the rename
      using BACKLOG_DIRS[item_type]. 5 new tests added, all 34 scan tests pass.
