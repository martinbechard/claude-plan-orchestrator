      _run_intake_analysis_inner, _parse_intake_response. Add unit tests in tests/langgraph/slack/test_suspension.py.
      Run pytest to verify.

      '
- id: phase-3
  name: Phase 3 - Facade and script migration
  status: pending
  tasks:
  - id: '3.1'
    name: Create SlackNotifier facade in slack/__init__.py
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/03-extract-slack-modules.md
      Design doc: docs/plans/2026-02-26-03-extract-slack-modules-design.md

      Replace the empty langgraph_pipeline/slack/__init__.py with a SlackNotifier
      facade class that delegates to the four submodule classes (identity, notifier,
      poller, suspension). The facade must expose the same public API as the original
      SlackNotifier so existing scripts work without changes. Run pytest to verify
      all slack module tests still pass.

      '
  - id: '3.2'
    name: Migrate plan-orchestrator.py and auto-pipeline.py to use slack facade
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/03-extract-slack-modules.md
      Design doc: docs/plans/2026-02-26-03-extract-slack-modules-design.md

      Update plan-orchestrator.py to import SlackNotifier from langgraph_pipeline.slack
      instead of defining it inline. Remove the original SlackNotifier class, IntakeState,
      AgentIdentity, and related constants from plan-orchestrator.py. Update auto-pipeline.py
      to import from langgraph_pipeline.slack, removing the importlib.util hack. Verify
      no Slack-related code remains in the scripts except import statements. Run all
      existing tests to verify no regressions.

      '
