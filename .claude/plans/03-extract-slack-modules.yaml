- id: phase-2
  name: Phase 2 - Poller and suspension modules
  status: pending
  tasks:
  - id: '2.1'
    name: Create slack/poller.py with polling and loop prevention layers
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/03-extract-slack-modules.md
      Design doc: docs/plans/2026-02-26-03-extract-slack-modules-design.md

      Extract inbound polling into langgraph_pipeline/slack/poller.py: poll_messages,
      _discover_channels, _get_channel_role, _load_last_read_all, _save_last_read_all,
      start_background_polling, stop_background_polling, _prune_message_tracking,
      _handle_polled_messages, _route_message_via_llm, _execute_routed_action, create_backlog_item,
      handle_control_command. Port all 4 safety layers: A1 chain detection (_is_chain_loop_artifact,
      _load/_save_intake_history), A2 self-reply window, A3 BOT_NOTIFICATION_PATTERN
      regex, A4 intake rate limiter. Add unit tests in tests/langgraph/slack/test_poller.py.
      Run pytest to verify.

      '
  - id: '2.2'
    name: Create slack/suspension.py with question and intake flows
    agent: coder
    status: pending
    description: 'Implement the work item: docs/feature-backlog/03-extract-slack-modules.md
      Design doc: docs/plans/2026-02-26-03-extract-slack-modules-design.md

      Extract human-in-the-loop logic into langgraph_pipeline/slack/suspension.py:
      IntakeState dataclass, send_question, post_suspension_question, check_suspension_reply,
