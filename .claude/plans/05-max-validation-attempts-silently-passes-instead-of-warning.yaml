meta:
  name: Max Validation Attempts Silently Passes Instead of Warning
  description: >
    Fix validator.py to return WARN instead of PASS when max_validation_attempts is
    exceeded. The fix is already in the working tree as an unstaged change. This plan
    commits the fix, runs tests to confirm, and bumps the plugin version.
  plan_doc: docs/plans/2026-03-24-05-max-validation-attempts-silently-passes-instead-of-warning-design.md
  source_item: ".claude/plans/.claimed/05-max-validation-attempts-silently-passes-instead-of-warning.md"
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
      - coder
      - e2e-test-agent
      - frontend-coder
    validators:
      - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Commit the Fix
  status: pending
  tasks:
  - id: '1.1'
    name: Verify tests pass and commit validator.py fix
    agent: coder
    status: pending
    description: |
      Implement the work item: .claude/plans/.claimed/05-max-validation-attempts-silently-passes-instead-of-warning.md

      The fix is already present as an unstaged change in
      langgraph_pipeline/executor/nodes/validator.py (PASS to WARN at lines 317-322).

      Steps:
      1. Run: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/langgraph/executor/nodes/test_validator.py -v
         Confirm test_returns_warn_when_max_validation_attempts_exceeded passes.
         Fix any failures.
      2. Run: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/ -v
         Fix any failures introduced by this change.
      3. Git commit:
         git add langgraph_pipeline/executor/nodes/validator.py
         git commit -m 'fix: return WARN instead of PASS when max validation attempts exceeded'

      Files: langgraph_pipeline/executor/nodes/validator.py

- id: phase-2
  name: Phase 2 - Plugin Version Bump
  status: pending
  tasks:
  - id: '2.1'
    name: Bump plugin version to 1.9.1 and update release notes
    agent: coder
    status: pending
    depends_on:
    - '1.1'
    description: |
      Bump the plugin version in plugin.json and update RELEASE-NOTES.md.

      Steps:
      1. Read plugin.json. Current version is 1.9.0. Bump patch version to 1.9.1.
      2. Read RELEASE-NOTES.md. Add a new entry at the top for 1.9.1 with:
         - Fix: max validation attempts now returns WARN. When validation is
           abandoned after exhausting all retry attempts, the verdict is now WARN
           instead of PASS, accurately reflecting inconclusive validation in the
           plan record.
      3. Git commit:
         git add plugin.json RELEASE-NOTES.md
         git commit -m 'chore: bump version to 1.9.1 for max-attempts WARN fix'

      Files: plugin.json, RELEASE-NOTES.md
