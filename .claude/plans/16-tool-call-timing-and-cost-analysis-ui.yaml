meta:
  name: Tool Call Timing and Cost Analysis UI
  description: Read-only /analysis page that reads docs/reports/execution-costs/ JSON
    logs and renders SVG charts and tables for token waste analysis. No build step;
    server-side SVG; always-on route.
  source_item: .claude/plans/.claimed/16-tool-call-timing-and-cost-analysis-ui.md
  plan_doc: docs/plans/2026-03-25-16-tool-call-timing-and-cost-analysis-ui-design.md
  created: '2026-03-25'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Data Layer
  status: pending
  tasks:
  - id: '1.1'
    name: Create CostLogReader and aggregation helpers
    agent: coder
    status: completed
    description: "Implement the work item: .claude/plans/.claimed/16-tool-call-timing-and-cost-analysis-ui.md\n\
      Design reference: docs/plans/2026-03-25-16-tool-call-timing-and-cost-analysis-ui-design.md\n\
      This task creates the data layer module.\nFile to create: langgraph_pipeline/web/cost_log_reader.py\n\
      - CostLogReader class with load_all() method that reads\n  docs/reports/execution-costs/*.json\
      \ and returns a CostData dataclass\n- CostData dataclass with fields: top_files\
      \ (list of (path, bytes) tuples),\n  cost_by_agent (dict[str, int] tokens),\
      \ cost_by_item (list of ItemCost),\n  wasted_reads (list of WastedRead), has_data\
      \ (bool)\n- ItemCost dataclass: item_slug, item_type, agent_types, input_tokens,\n\
      \  output_tokens, cost_usd, num_tasks, num_wasted_reads, tasks (list of TaskCost)\n\
      - TaskCost dataclass: task_id, agent_type, model, input_tokens, output_tokens,\n\
      \  cost_usd, duration_s\n- WastedRead dataclass: item_slug, file_path, task_count\n\
      - svg_bar_chart(labels, values, width, bar_height, title) -> str: renders\n\
      \  a horizontal SVG bar chart as a string; encodes file path in title attr\n\
      Verify syntax: python3 -c \"import py_compile; py_compile.compile('langgraph_pipeline/web/cost_log_reader.py',\
      \ doraise=True)\"\n"
    last_attempt: '2026-03-25T02:13:00.561609'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-25T02:16:02.973792'
    result_message: Created langgraph_pipeline/web/cost_log_reader.py with CostLogReader,
      all aggregation dataclasses (CostData, ItemCost, TaskCost, WastedRead), and
      svg_bar_chart(). Two-pass load_all() detects wasted reads. Syntax verified.
    validation_attempts: 1
    validation_findings: 'Frontend assets created and functional. Build passes. Two
      pre-existing test collection errors (unrelated to this task - caused by earlier
      auto_pipeline.py refactor). Minor gaps: worker cards omit cost ticker and model
      tier fields from backlog req 4; queue count is in session summary bar rather
      than a dedicated panel section.'
- id: phase-2
  name: Phase 2 - Analysis Route and Template
  status: pending
  tasks:
  - id: '2.1'
    name: Create analysis FastAPI router
    agent: coder
    status: failed
    depends_on:
    - '1.1'
    description: 'Implement the work item: .claude/plans/.claimed/16-tool-call-timing-and-cost-analysis-ui.md

      Design reference: docs/plans/2026-03-25-16-tool-call-timing-and-cost-analysis-ui-design.md

      This task creates the /analysis FastAPI router.

      File to create: langgraph_pipeline/web/routes/analysis.py

      - APIRouter with GET /analysis endpoint

      - Accepts optional ?agent= query param to filter per-item table by agent type

      - Calls CostLogReader().load_all() on every request (no caching)

      - Generates SVG charts via svg_bar_chart() from cost_log_reader

      - Returns Jinja2TemplateResponse(''analysis.html'') with all chart data

      - When CostData.has_data is False, passes has_data=False to template

      Verify syntax: python3 -c "import py_compile; py_compile.compile(''langgraph_pipeline/web/routes/analysis.py'',
      doraise=True)"

      '
    last_attempt: '2026-03-25T02:25:41.912918'
    attempts: 1
    model_used: sonnet
    result_message: No status file written by Claude
  - id: '2.2'
    name: Create analysis HTML template
    agent: frontend-coder
    status: completed
    depends_on:
    - '2.1'
    description: "Implement the work item: .claude/plans/.claimed/16-tool-call-timing-and-cost-analysis-ui.md\n\
      Design reference: docs/plans/2026-03-25-16-tool-call-timing-and-cost-analysis-ui-design.md\n\
      This task creates the Jinja2 HTML template.\nFile to create: langgraph_pipeline/web/templates/analysis.html\n\
      - Extends base.html; block title = 'Cost Analysis - Plan Orchestrator'\n- 'No\
      \ data yet' section shown when has_data is False; explains cost logs appear\n\
      \  once pipeline processes items with the cost log writer enabled\n- Top files\
      \ by read volume: embed top_files_svg as inline SVG\n- Token cost by agent type:\
      \ embed agent_cost_svg as inline SVG; each agent bar\n  links to ?agent=<agent_type>\
      \ for filtering; active agent highlighted\n- Per-item cost table: columns item\
      \ slug, agent types, input tokens,\n  output tokens, cost, tasks, wasted reads;\
      \ rows have a toggle button that\n  reveals a nested per-task breakdown (uses\
      \ analysis.js expand/collapse)\n- Wasted reads panel: table with item slug,\
      \ file path, task count; sorted\n  by count descending; hidden when list is\
      \ empty\n- Duration histogram note: explain per-tool-call duration is not yet\n\
      \  available in the log schema\nNo JavaScript framework; no bundler; plain HTML\
      \ only in this file.\n"
    last_attempt: '2026-03-25T02:27:35.739792'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-25T02:29:59.801993'
    result_message: 'Created analysis.html Jinja2 template extending base.html. Includes:
      no-data empty state, top-files SVG chart, agent-cost SVG chart with ?agent=
      filter links, per-item cost table with expand/collapse task detail rows (data-*
      attrs for analysis.js sort), wasted reads panel (hidden when empty), duration
      histogram note. Jinja2 syntax verified.'
    validation_attempts: 1
    validation_findings: 'analysis.html meets all task requirements: extends base.html,
      no-data empty state, top_files_svg and agent_cost_svg inline SVG embeds, agent
