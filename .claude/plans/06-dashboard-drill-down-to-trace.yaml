      The supervisor needs to import this to read the trace UUID from claimed item
      files. See design doc: docs/plans/2026-03-26-06-dashboard-drill-down-to-trace-design.md'
    status: in_progress
    last_attempt: '2026-03-26T01:26:39.949188'
    attempts: 1
    model_used: sonnet
  - id: '1.2'
    name: Add run_id to WorkerInfo, CompletionRecord, and DashboardState snapshot
    agent: coder
    description: 'Implement the work item: .claude/plans/.claimed/06-dashboard-drill-down-to-trace.md

      Focus on langgraph_pipeline/web/dashboard_state.py. Add Optional[str] run_id
      field to WorkerInfo and CompletionRecord dataclasses (default None). Update
      add_active_worker() to accept run_id keyword arg. Include run_id in the active_workers
      dicts produced by snapshot(). Include run_id in the in-memory completions_list
      fallback path in snapshot(). See design doc: docs/plans/2026-03-26-06-dashboard-drill-down-to-trace-design.md'
    status: pending
  - id: '1.3'
    name: Add run_id column to completions table and update proxy methods
    agent: coder
    description: 'Implement the work item: .claude/plans/.claimed/06-dashboard-drill-down-to-trace.md

      Focus on langgraph_pipeline/web/proxy.py. Add a nullable run_id TEXT column
      to the _CREATE_COMPLETIONS_SQL schema. In TracingProxy.__init__ (or _connect),
      add an ALTER TABLE migration that adds run_id if the column does not already
      exist (use pragma_table_info to guard). Update record_completion() to accept
      and store run_id. Update list_completions() SELECT to include run_id. See design
      doc: docs/plans/2026-03-26-06-dashboard-drill-down-to-trace-design.md'
    status: pending
  - id: '1.4'
    name: Read trace_id in supervisor at dispatch and reap; pass to dashboard state
      and proxy
    agent: coder
    description: 'Implement the work item: .claude/plans/.claimed/06-dashboard-drill-down-to-trace.md

      Focus on langgraph_pipeline/supervisor.py. Import read_trace_id_from_file from
      langgraph_pipeline.shared.langsmith. In _try_dispatch_one(), after claiming,
      call read_trace_id_from_file(claimed_path) and pass the result to add_active_worker(run_id=...).
