meta:
  name: Spec-Aware Validator with E2E Test Logging (Completion)
  description: >
    Complete the spec-aware validator feature. Most infrastructure is already in
    place (parse_verification_blocks, SPEC_DIR config, build_validation_prompt
    spec context injection, e2e-analyzer agent, unit tests). Remaining work:
    update validator.md to add the spec-aware E2E step, fix 2 pre-existing test
    failures from a zero-padding refactor, and bump the plugin version.
  plan_doc: docs/plans/2026-03-24-spec-aware-validator-with-e2e-logging-design.md
  source_item: ".claude/plans/.claimed/spec-aware-validator-with-e2e-logging.md"
  created: '2026-03-24'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
      - coder
      - e2e-test-agent
      - frontend-coder
    validators:
      - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - Validator Agent Update
  status: pending
  tasks:
  - id: '1.1'
    name: Add spec-aware E2E step to validator.md
    agent: coder
    status: pending
    description: |
      Implement the work item: .claude/plans/.claimed/spec-aware-validator-with-e2e-logging.md

      Focus: Update .claude/agents/validator.md to add a spec-aware E2E validation
      step. Read the design document first:
      docs/plans/2026-03-24-spec-aware-validator-with-e2e-logging-design.md

      What to do:
      1. Read .claude/agents/validator.md.
      2. Insert a new ### Step 3: Spec-Aware E2E Tests between Step 2 and the current Step 3.
         The new step must instruct the agent to:
         - Only run this step if the validation prompt contains a '## Spec-Aware Validation' section
         - Run: git diff --name-only HEAD~1 HEAD
         - Filter results for files under the SPEC_DIR listed in the prompt
         - For each changed spec file: read it and find ### Verification blocks
         - For each block with Type: Testable and a Test file(s): line:
             Run: <E2E_COMMAND> <test_file> --reporter=json
             Save JSON output to logs/e2e/<YYYY-MM-DDTHHMMSS>.json
             Parse pass/fail counts from the JSON
         - If no spec files changed: note E2E skipped, continue
         - Include E2E results in Findings: [PASS] or [FAIL] lines
      3. Renumber the existing Step 3 (E2E Test) and Step 4 (Code Review) to Step 4 and Step 5.
      4. In ## Verdict Rules, under WARN add: E2E test failures for tests not directly
         related to the task's spec changes.
         Under FAIL add: E2E test failures for tests directly referenced by the
         task's changed spec files.
      5. In ## Constraints, add:
         - When running spec-aware E2E tests, always use --reporter=json and save
           output to logs/e2e/ with filename YYYY-MM-DDTHHMMSS.json.
         - Only run spec-aware E2E when the validation prompt includes a
           '## Spec-Aware Validation' section.
      6. Git commit: git add .claude/agents/validator.md
         git commit -m 'feat: add spec-aware E2E step to validator agent'

      Files: .claude/agents/validator.md

- id: phase-2
  name: Phase 2 - Fix Failing Tests
  status: pending
  tasks:
  - id: '2.1'
    name: Fix pre-existing unit test failures for backlog item filename format
    agent: coder
    status: pending
    depends_on:
    - '1.1'
    description: |
      Fix 2 failing unit tests in tests/test_plan_orchestrator.py.

      Background: The backlog item filename format changed from '1-slug.md' to
      '01-slug.md' (zero-padded), but the tests still assert the old format.

      Steps:
      1. Run: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/test_plan_orchestrator.py
         -v -k 'test_create_backlog_item' to confirm the 2 failures.
      2. Read the failing tests: test_create_backlog_item_returns_dict and
         test_create_backlog_item_increments_number.
      3. Read scripts/plan-orchestrator.py to find the create_backlog_item() function
         and verify the current zero-padded filename format.
      4. Update the assertions:
         - test_create_backlog_item_returns_dict: assert filename.startswith('01-')
         - test_create_backlog_item_increments_number: assert filename.startswith('02-')
      5. Run: ~/.pyenv/versions/3.11.*/bin/python -m pytest tests/test_plan_orchestrator.py -v
         Fix any remaining failures.
      6. Git commit: git add tests/test_plan_orchestrator.py
         git commit -m 'fix: update backlog filename assertions to zero-padded format'

      Files: tests/test_plan_orchestrator.py

- id: phase-3
  name: Phase 3 - Plugin Version Bump
  status: pending
  tasks:
  - id: '3.1'
    name: Bump plugin version and update release notes
    agent: coder
    status: pending
    depends_on:
    - '2.1'
    description: |
      Bump the plugin version in plugin.json and update RELEASE-NOTES.md
      for the spec-aware validator feature.

      Steps:
      1. Read plugin.json. Current version is 1.9.0. Bump minor version to 1.10.0.
      2. Read RELEASE-NOTES.md. Add a new entry at the top for 1.10.0 with:
         - **Spec-aware validator**: Validator reads functional spec verification
           blocks and runs referenced Playwright E2E tests when spec files are changed.
           Results captured as timestamped JSON in logs/e2e/ for trend analysis.
         - **E2E analyzer agent**: New on-demand agent (e2e-analyzer) for reviewing
           accumulated E2E test logs to identify flaky tests, regressions, and trends.
         - **Verification block template**: Reference format at docs/templates/
           verification-block.md for annotating functional specs with testable checks.
      3. Git commit:
         git add plugin.json RELEASE-NOTES.md
         git commit -m 'chore: bump version to 1.10.0 for spec-aware validator feature'

      Files: plugin.json, RELEASE-NOTES.md
