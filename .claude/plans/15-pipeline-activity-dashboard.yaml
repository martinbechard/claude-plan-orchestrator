meta:
  name: Pipeline Activity Dashboard
  description: Live-updating /dashboard showing active workers, queue, recent completions,
    session cost, and error stream. Uses SSE for browser push. Builds on the Feature
    13 embedded web server.
  source_item: .claude/plans/.claimed/15-pipeline-activity-dashboard.md
  plan_doc: docs/plans/2026-03-25-15-pipeline-activity-dashboard-design.md
  created: '2026-03-25'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
    - coder
    - frontend-coder
    validators:
    - validator
    max_validation_attempts: 2
sections:
- id: phase-1
  name: Phase 1 - DashboardState Singleton
  status: pending
  tasks:
  - id: '1.1'
    name: Create DashboardState module
    agent: coder
    status: completed
    description: "Implement the work item: .claude/plans/.claimed/15-pipeline-activity-dashboard.md\n\
      Design reference: docs/plans/2026-03-25-15-pipeline-activity-dashboard-design.md\n\
      This task creates the thread-safe DashboardState singleton.\nFiles to create:\n\
      - langgraph_pipeline/web/dashboard_state.py with:\n  - WorkerInfo dataclass\
      \ (pid, slug, item_type, start_time, estimated_cost_usd)\n  - CompletionRecord\
      \ dataclass (slug, item_type, outcome, cost_usd, duration_s, finished_at)\n\
      \  - DashboardState class with threading.Lock, active_workers dict, recent_completions\
      \ list (MAX_RECENT_COMPLETIONS=20), session_cost_usd, session_start, recent_errors\
      \ list (MAX_RECENT_ERRORS=50)\n  - Methods: add_active_worker(), remove_active_worker(),\
      \ add_error(), snapshot()\n  - snapshot() computes queue_count by globbing *.md\
      \ in BACKLOG_DIRS (no scan graph)\n  - Module-level singleton via get_dashboard_state()\
      \ and reset_dashboard_state()\nVerify syntax: python3 -c \"import py_compile;\
      \ py_compile.compile('langgraph_pipeline/web/dashboard_state.py', doraise=True)\"\
      \n"
    last_attempt: '2026-03-25T02:11:00.948573'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-25T02:14:54.607074'
    result_message: Created langgraph_pipeline/web/dashboard_state.py with WorkerInfo
      and CompletionRecord dataclasses, DashboardState class (threading.Lock, active_workers,
      recent_completions capped at 20, session_cost_usd, session_start, recent_errors
      capped at 50, total_processed counter), add_active_worker/remove_active_worker/add_error/snapshot()
      methods, queue_count computed by globbing BACKLOG_DIRS, and module-level singleton
      via get_dashboard_state()/reset_dashboard_state().
- id: phase-2
  name: Phase 2 - Dashboard Router and SSE Endpoint
  status: pending
  tasks:
  - id: '2.1'
    name: Create dashboard FastAPI router
    agent: coder
    status: completed
    depends_on:
    - '1.1'
    description: "Implement the work item: .claude/plans/.claimed/15-pipeline-activity-dashboard.md\n\
      Design reference: docs/plans/2026-03-25-15-pipeline-activity-dashboard-design.md\n\
      This task creates the FastAPI router and SSE endpoint.\nFiles to create:\n-\
      \ langgraph_pipeline/web/routes/dashboard.py with:\n  - SSE_INTERVAL_SECONDS\
      \ = 2 constant\n  - GET /dashboard: renders dashboard.html via Jinja2Templates\n\
      \  - GET /api/stream: SSE StreamingResponse; async generator sends event: state\n\
      \    data: <json snapshot> every SSE_INTERVAL_SECONDS; exits on request.is_disconnected()\n\
      Files to update:\n- langgraph_pipeline/web/server.py: import dashboard_router\
      \ from\n  langgraph_pipeline.web.routes.dashboard and call app.include_router(dashboard_router)\n\
      \  unconditionally inside create_app() (after the health endpoint, before proxy\
      \ check)\nVerify syntax: python3 -c \"import py_compile; py_compile.compile('langgraph_pipeline/web/routes/dashboard.py',\
      \ doraise=True)\"\n"
    last_attempt: '2026-03-25T02:16:11.379848'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-25T02:17:58.127425'
    result_message: Created langgraph_pipeline/web/routes/dashboard.py with GET /dashboard
      (Jinja2 HTML) and GET /api/stream (SSE StreamingResponse, async generator, exits
      on disconnect). Updated server.py to unconditionally mount dashboard_router
      after the health endpoint.
    validation_attempts: 1
    validation_findings: dashboard.py created with SSE_INTERVAL_SECONDS=2, GET /dashboard
      and GET /api/stream endpoints. server.py unconditionally mounts dashboard_router
      after health endpoint, before proxy check. Build and syntax checks pass. Test
      collection errors (CompletionTracker, completed_slugs) are pre-existing and
      unrelated to this task.
- id: phase-3
  name: Phase 3 - Dashboard HTML Template and JS
  status: pending
  tasks:
  - id: '3.1'
    name: Create dashboard.html template and dashboard.js
    agent: frontend-coder
    status: completed
    depends_on:
    - '2.1'
    description: "Implement the work item: .claude/plans/.claimed/15-pipeline-activity-dashboard.md\n\
      Design reference: docs/plans/2026-03-25-15-pipeline-activity-dashboard-design.md\n\
      This task creates the frontend assets. No build step -- vanilla HTML + JS only.\n\
      Files to create:\n- langgraph_pipeline/web/templates/dashboard.html: extends\
      \ base.html.\n  Contains four <template> elements (#tpl-worker-card, #tpl-completion-row,\n\
      \  #tpl-error-row, inline session summary bar). Shows five panels:\n  session\
      \ summary (pinned top), active workers, queue (item count), recent\n  completions,\
      \ error stream (collapsible).\n- langgraph_pipeline/web/static/dashboard.js:\
      \ opens EventSource('/api/stream');\n  on 'state' event calls renderAll(data)\
      \ which stamps each <template> and\n  replaces container innerHTML. No external\
      \ libraries.\nUpdate langgraph_pipeline/web/static/style.css with styles for:\n\
      \  worker cards, outcome badges (success/warn/fail), item-type badges\n  (defect/feature/analysis\
      \ colour-coded), collapsible error panel.\n"
    last_attempt: '2026-03-25T02:20:20.237876'
    attempts: 1
    model_used: sonnet
    completed_at: '2026-03-25T02:23:57.736681'
    result_message: 'dashboard.html, dashboard.js, and style.css all implemented.
      dashboard.html extends base.html with session summary bar (pinned top), active
      workers panel, recent completions table, and collapsible error stream panel,
      plus four template elements (#tpl-worker-card, #tpl-completion-row, #tpl-error-row,
      inline session summary). dashboard.js opens EventSource("/api/stream"), handles
      state events with renderAll(), stamps templates for each panel. style.css includes
      all worker card, outcome badge, item-type badge, and error panel styles.'
- id: phase-4
  name: Phase 4 - Supervisor Integration
  status: pending
  tasks:
  - id: '4.1'
    name: Feed DashboardState from supervisor dispatch loop
    agent: coder
    status: pending
    depends_on:
    - '3.1'
    description: "Implement the work item: .claude/plans/.claimed/15-pipeline-activity-dashboard.md\n\
      Design reference: docs/plans/2026-03-25-15-pipeline-activity-dashboard-design.md\n\
      This task wires the supervisor into DashboardState.\nChanges to langgraph_pipeline/supervisor.py:\n\
      - Import get_dashboard_state from langgraph_pipeline.web.dashboard_state\n-\
      \ In _try_dispatch_one(): after active_workers[pid] = ... call\n  get_dashboard_state().add_active_worker(pid,\
      \ item_slug, item_type, time.monotonic())\n- In _reap_one_worker(): after determining\
      \ success/failure outcome call\n  get_dashboard_state().remove_active_worker(pid,\
      \ outcome, cost_usd, duration_s)\n- In _reap_one_worker() crash/failure paths:\
      \ call get_dashboard_state().add_error(message)\nVerify syntax: python3 -c \"\
      import py_compile; py_compile.compile('langgraph_pipeline/supervisor.py', doraise=True)\"\
      \n"
- id: phase-5
  name: Phase 5 - Unit Tests
  status: pending
  tasks:
  - id: '5.1'
    name: Add unit tests for DashboardState
    agent: coder
    status: pending
    depends_on:
    - '4.1'
    description: "Implement the work item: .claude/plans/.claimed/15-pipeline-activity-dashboard.md\n\
      Design reference: docs/plans/2026-03-25-15-pipeline-activity-dashboard-design.md\n\
      Create tests/langgraph/web/test_dashboard_state.py with:\n- test_add_and_remove_active_worker:\
      \ add a worker then remove it; confirm active_workers\n  is empty and recent_completions\
      \ has one entry with correct outcome\n- test_completions_capped_at_max: add\
      \ MAX_RECENT_COMPLETIONS+1 completions; confirm list len == MAX_RECENT_COMPLETIONS\n\
      - test_errors_capped_at_max: add MAX_RECENT_ERRORS+1 errors; confirm list len\
      \ == MAX_RECENT_ERRORS\n- test_snapshot_returns_serialisable_dict: call snapshot();\
      \ confirm all expected keys present\n- test_reset_clears_state: call reset_dashboard_state();\
      \ confirm empty active_workers and completions\n- test_thread_safety: two threads\
      \ concurrently call add_active_worker and remove_active_worker;\n  assert no\
      \ exception and final state is consistent\nAlso create tests/langgraph/web/test_dashboard_routes.py\
      \ with TestClient:\n- test_dashboard_html_returns_200: GET /dashboard returns\
      \ 200 with HTML content\n- test_stream_sends_state_event: consume one SSE chunk\
      \ from GET /api/stream;\n  verify it starts with 'event: state'\nRun tests:\
      \ python3 -m pytest tests/langgraph/web/ -v\nFix any failures before marking\
      \ complete.\n"
