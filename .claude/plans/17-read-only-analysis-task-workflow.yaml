meta:
  name: Read-Only Analysis Task Workflow
  description: >-
    Add a new task workflow type for read-only analysis tasks that produce reports
    instead of code changes. The core implementation (constants, agent mapping,
    analysis processing, report delivery, Slack channel) is already in place.
    This plan adds missing unit test coverage for the execution and delivery paths.
  source_item: "docs/feature-backlog/17-read-only-analysis-task-workflow.md"
  plan_doc: docs/plans/2026-02-26-17-read-only-analysis-task-workflow-design.md
  created: '2026-02-26'
  max_attempts_default: 3
  validation:
    enabled: true
    run_after:
      - coder
      - e2e-test-agent
      - frontend-coder
    validators:
      - validator
    max_validation_attempts: 2
sections:
  - id: phase-1
    name: Phase 1 - Unit Tests for Analysis Execution and Delivery
    status: pending
    tasks:
      - id: '1.1'
        name: Add unit tests for process_analysis_item and _deliver_analysis_report
        agent: coder
        status: pending
        description: >-
          Add unit tests for the analysis execution and report delivery functions
          in tests/test_auto_pipeline.py. The core constants and parse/scan tests
          already exist. This task adds coverage for process_analysis_item(),
          _process_analysis_inner(), and _deliver_analysis_report().

          Work item: docs/feature-backlog/17-read-only-analysis-task-workflow.md
          Design: docs/plans/2026-02-26-17-read-only-analysis-task-workflow-design.md
