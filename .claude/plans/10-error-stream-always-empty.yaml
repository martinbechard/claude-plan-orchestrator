    name: Implement DashboardErrorHandler and wire it into cli.py
    agent: coder
    description: >-
      Implement the work item: .claude/plans/.claimed/10-error-stream-always-empty.md

      Add a DashboardErrorHandler(logging.Handler) subclass to
      langgraph_pipeline/web/dashboard_state.py. Its emit() method should call
      get_dashboard_state().add_error() with a formatted message that includes
      the log level, logger name, and message text. In langgraph_pipeline/cli.py,
      after _configure_logging() returns, install the handler on the
      langgraph_pipeline logger (not the root logger) so only pipeline-internal
      records reach the dashboard. Add unit tests in
      tests/langgraph/web/test_dashboard_state.py covering: handler forwards
      WARNING/ERROR records, handler ignores DEBUG/INFO records, and multiple
      records accumulate in recent_errors. See the design doc at
      docs/plans/2026-03-26-10-error-stream-always-empty-design.md.
